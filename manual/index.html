        <div style="display:flex;align-items:flex-start;gap:6px;padding:5px 10px;border-bottom:1px solid rgb(var(--c-border));cursor:pointer" onclick="execToggle(${it.id})">
          <input type="checkbox" ${it.checked ? 'checked' : ''} style="accent-color:rgb(var(--c-accent));margin-top:2px;pointer-events:none">
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:600;color:rgb(var(--c-txt))">${it.name}</div>
            <div style="font-size:9px;color:rgb(var(--c-txt3));font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.path}</div>
            ${it.args ? `<div style="font-size:9px;color:rgb(var(--c-blue))">args: ${it.args}</div>` : ''}
          </div>
        </div>`).join('')}
        <div class="is-row" style="padding:5px 10px"><div class="is-btn full" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue))" onclick="toast('➕ 새 항목 추가 폼 (이름·경로·인수 입력)','info')">➕ 새 항목 추가</div></div>
      </div>
      <div class="is-sec">
        <div class="is-row" style="padding-bottom:6px"><div class="is-btn full" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 12%,transparent);color:rgb(var(--c-green))" onclick="execRun()">▶ 선택 학생에 실행 (${checkedItems.length}개)</div></div>
      </div>
    `);

    // 우측 패널: 학생 PC에서 실행 결과 모니터링
    const pcRows = pcs.map(p => {
      const st = pcStatus[p];
      const ico = st === 'done' ? '✅' : st === 'error' ? '❌' : st === 'running' ? '⚙️' : '⏳';
      const c = st === 'done' ? '#6ee7b7' : st === 'error' ? '#fca5a5' : st === 'running' ? '#fbbf24' : '#64748b';
      const lbl = st === 'done' ? '실행 성공' : st === 'error' ? '실패 — 경로 확인' : st === 'running' ? '실행 중...' : '대기';
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-bottom:1px solid rgba(255,255,255,.06);font-size:10px;color:' + c + '"><span>' + ico + '</span><span style="font-weight:600;color:#cbd5e1">' + p + '</span><span style="flex:1">' + lbl + '</span></div>';
    }).join('');

    const stu = '<div class="ps-title"><span>📊 학생 PC 실행 결과</span></div>' +
      '<div style="background:#0f172a;height:240px;overflow-y:auto">' +
        '<div style="padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:9px;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)">' +
          '<span>📋 실행할 항목: ' + checkedItems.length + '개</span>' +
          (running ? '<span style="margin-left:auto;color:#fbbf24">⚙️ ' + progress + '%</span>' : '<span style="margin-left:auto;color:#64748b">대기</span>') +
        '</div>' +
        pcRows +
        '<div style="padding:5px 10px;font-size:9px;color:#64748b;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);position:sticky;bottom:0">실행 성공/실패가 실시간으로 회신됩니다</div>' +
      '</div>';

    div.innerHTML = '<h2>▶ 파일 실행</h2><div class="sub">학생 PC 프로그램/파일 원격 실행</div>';
    div.innerHTML += iSection('실행 항목을 체크하고 ▶ 버튼을 눌러보세요', sidebar, iStu(stu),
      '<b>▶ 파일 실행</b>은 학생 PC에 <b>이미 설치된 프로그램</b>(또는 파일)을 원격으로 실행시킵니다. 설치는 안 함 — 경로를 알려주면 학생 PC가 그걸 실행할 뿐. 자주 쓰는 항목(Chrome, 한글, IDE 등)을 <b>최대 10개까지 등록</b>해 두고 한 번 클릭으로 일괄 실행. 인수(args)도 함께 보낼 수 있어 특정 URL이나 파일을 열게 할 수 있음.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>📋 항목 등록 (최대 10)</h3><p>이름·경로·인수를 입력해 자주 쓰는 프로그램을 등록합니다. 환경변수(<code>%USERNAME%</code> 등) 사용 가능. 등록한 항목은 다음 실행에도 유지.</p></div>' +
      '<div class="card"><h3>✅ 체크박스로 선택 실행</h3><p>등록된 10개 중 <b>이번 시간에 쓸 것만</b> 체크해서 실행. 예: 코딩 시간엔 VSCode만, 글쓰기 시간엔 한글만.</p></div>' +
      '<div class="card"><h3>⚙ 인수(Arguments)</h3><p>실행 시 함께 보낼 명령행 인수. 예: 크롬 <code>https://수업자료.com</code>, VSCode <code>--folder C:\\Class</code>. 특정 페이지·파일을 자동으로 띄울 수 있음.</p></div>' +
      '<div class="card"><h3>🎯 일괄 vs 선택 PC</h3><p>학생 탭에서 <b>전체 학생</b> 또는 <b>일부 PC만</b> 선택해 실행. 시험 부정 행위 의심 PC만 화이트리스트 외 프로그램 강제 종료 후 허용 프로그램 실행 등에 활용.</p></div>' +
      '<div class="card"><h3>📊 실시간 결과 회신</h3><p>각 학생 PC에서 실행 성공/실패가 <b>실시간으로 회신</b>됩니다. 실패 사유(경로 없음·권한 부족 등)도 함께 표시되어 즉시 진단 가능.</p></div>' +
      '<div class="card"><h3>📁 일반 파일도 실행</h3><p>.exe뿐 아니라 .hwp, .pdf, .pptx, .xlsx도 가능. 학생 PC의 기본 연결 프로그램으로 자동 실행됩니다(<code>shell.openPath</code>).</p></div>' +
      '<div class="card"><h3>🚫 미설치는 실행 안 됨</h3><p>학생 PC에 그 프로그램이 <b>설치되어 있어야</b> 합니다. 설치까지 하려면 파일 배포 + "전송 후 열기" 또는 학생 프로그램 관리의 패키지 설치를 사용.</p></div>' +
      '<div class="card"><h3>🔄 자주 쓰는 패턴 저장</h3><p>한 번 등록해 두면 다음 학기에도 재사용. 학기 초에 자주 쓰는 프로그램 10개 미리 등록하면 매 수업 한 클릭으로 환경 셋업.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>수업 시작 일괄 셋업</b> — 한 시간 전체 학생에게 한글 + Chrome(수업페이지) 동시 실행 → 학생들이 직접 찾아 켤 시간 절약. 시험 시간엔 한글만 등.</div></div>';
  }

  window.execToggle = function(id) {
    const it = items.find(i => i.id === id);
    if (it) it.checked = !it.checked;
    render();
  };
  window.execRun = function() {
    const checkedItems = items.filter(it => it.checked);
    if (checkedItems.length === 0) { toast('⚠ 실행할 항목을 선택하세요', 'warning'); return; }
    running = true; progress = 0;
    const pcs = ['PC-01','PC-03','PC-05','PC-07','PC-09'];
    pcs.forEach(p => pcStatus[p] = 'running');
    clearInterval(timer);
    toast('▶ ' + checkedItems.length + '개 항목을 5대 학생에게 실행', 'info');
    timer = setInterval(() => {
      progress += 5;
      const doneCount = Math.min(Math.ceil(progress / 20), 5);
      pcs.forEach((p, i) => {
        if (i < doneCount) pcStatus[p] = (i === 3 && Math.random() > 0.5) ? 'error' : 'done';
        else if (i === doneCount && progress < 100) pcStatus[p] = 'running';
      });
      if (progress >= 100) {
        progress = 100; clearInterval(timer); running = false;
        const ok = pcs.filter(p => pcStatus[p] === 'done').length;
        const err = pcs.filter(p => pcStatus[p] === 'error').length;
        toast('✅ 실행 완료 — 성공 ' + ok + ' / 실패 ' + err, err > 0 ? 'warning' : 'success');
      }
      render();
    }, 200);
    render();
  };
  render();
}

// ═══════════════════════════════════════════════
// 9-C. FILE MGMT — 🗑 파일 관리 (삭제)
// ═══════════════════════════════════════════════
function buildFileMgmt(div) {
  let folder = '%USERPROFILE%\\Downloads';
  let mode = 'files-only';
  let emptyBin = false;
  let running = false, prog = 0, timer = null;
  const pcStatus = {}; // 'done' | 'warn' | 'error' | 'blocked'

  const modes = [
    { v:'files-only',     label:'📄 파일만 삭제',  desc:'폴더 구조 유지, 파일만 삭제', danger:false },
    { v:'recursive',      label:'🔁 재귀 삭제',    desc:'하위 폴더 파일까지 삭제 (폴더 유지)', danger:false },
    { v:'recursive-dirs', label:'🗂 재귀+빈폴더',  desc:'파일 + 빈 서브폴더 삭제', danger:false },
    { v:'rmtree',         label:'💣 폴더 통째로',  desc:'폴더 자체를 완전히 삭제', danger:true },
  ];

  function render() {
    const pcs = ['PC-01','PC-03','PC-05','PC-07','PC-09'];
    const sel = modes.find(m => m.v === mode);

    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">🗑 파일 관리 (삭제)</div>
        <div style="font-size:10px;color:rgb(var(--c-txt2));padding:2px 10px 4px">학생 PC의 특정 폴더 내 파일을 원격으로 삭제합니다. 수업 종료 후 정리·디스크 청소에 활용.</div>
      </div>
      <div class="is-sec">
        <div class="is-label">📂 대상 폴더</div>
        <div class="is-row"><input type="text" value="${folder}" class="is-inp" id="mgmt-folder" style="font-family:monospace;font-size:10px"></div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 4px">환경변수 사용 가능 (예: %USERPROFILE%, %APPDATA%)</div>
      </div>
      <div class="is-sec">
        <div class="is-label">⚙ 삭제 방식</div>
        ${modes.map(m => `
        <div style="display:flex;align-items:flex-start;gap:6px;padding:5px 10px;border-bottom:1px solid rgb(var(--c-border));cursor:pointer;${mode===m.v ? 'background:color-mix(in srgb,rgb(var(--c-blue)) 6%,transparent)' : ''}" onclick="mgmtMode('${m.v}')">
          <input type="radio" ${mode===m.v ? 'checked' : ''} style="accent-color:rgb(var(--c-blue));margin-top:2px;pointer-events:none">
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:600;color:${m.danger ? 'rgb(var(--c-red))' : 'rgb(var(--c-txt))'}">${m.label}${m.danger ? ' <span style="font-size:8px;background:rgba(220,38,38,.2);padding:1px 4px;border-radius:3px">위험</span>' : ''}</div>
            <div style="font-size:9px;color:rgb(var(--c-txt3))">${m.desc}</div>
          </div>
        </div>`).join('')}
      </div>
      <div class="is-sec">
        <div class="is-row" style="padding:4px 10px"><label class="is-chk" style="font-size:10px"><input type="checkbox" id="mgmt-bin" ${emptyBin ? 'checked' : ''}> 🗑 휴지통 비우기 (폴더 무관)</label></div>
        <div class="is-row" style="padding-bottom:6px"><div class="is-btn full" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) ${emptyBin || mode === 'rmtree' ? '14' : '10'}%,transparent);color:rgb(var(--c-red))" onclick="mgmtRun()">${emptyBin ? '🗑 휴지통 비우기 실행' : '🗑 ' + sel.label + ' 실행'}</div></div>
      </div>
    `);

    const pcRows = pcs.map(p => {
      const st = pcStatus[p];
      const ico = st === 'done' ? '✅' : st === 'warn' ? '⚠️' : (st === 'error' || st === 'blocked') ? '❌' : st === 'running' ? '⚙️' : '⏳';
      const c = st === 'done' ? '#6ee7b7' : st === 'warn' ? '#fbbf24' : (st === 'error' || st === 'blocked') ? '#fca5a5' : st === 'running' ? '#fbbf24' : '#64748b';
      const lbl = st === 'done' ? '완료 · 삭제 12건' : st === 'warn' ? '일부 잠금 파일' : st === 'error' ? '경로 없음' : st === 'blocked' ? '권한 부족' : st === 'running' ? '삭제 중...' : '대기';
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-bottom:1px solid rgba(255,255,255,.06);font-size:10px;color:' + c + '"><span>' + ico + '</span><span style="font-weight:600;color:#cbd5e1">' + p + '</span><span style="flex:1">' + lbl + '</span></div>';
    }).join('');

    const stu = '<div class="ps-title"><span>📊 학생 PC 삭제 결과</span></div>' +
      '<div style="background:#0f172a;height:240px;overflow-y:auto">' +
        '<div style="padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:9px;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)">' +
          (emptyBin ? '<span style="color:#fbbf24">🗑 휴지통 비우기</span>' : '<span>📂 ' + folder + '</span>') +
          (running ? '<span style="margin-left:auto;color:#fbbf24">⚙️ ' + prog + '%</span>' : '<span style="margin-left:auto;color:#64748b">대기</span>') +
        '</div>' +
        pcRows +
        '<div style="padding:5px 10px;font-size:9px;color:#64748b;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)">상태: ✅완료 / ⚠️일부 / ❌실패</div>' +
      '</div>';

    div.innerHTML = '<h2>🗑 파일 관리 (삭제)</h2><div class="sub">학생 PC 폴더 일괄 정리</div>';
    div.innerHTML += iSection('대상 폴더와 삭제 방식을 골라 실행해보세요', sidebar, iStu(stu),
      '<b>🗑 파일 관리</b>는 학생 PC의 특정 폴더 안 파일을 <b>일괄 삭제</b>합니다. 수업 끝나고 다운로드 폴더 정리, 학기 끝나고 임시 파일 청소, 시험 전 부정 행위 자료 일괄 삭제 등에 활용. <b>4가지 방식</b>(파일만/재귀/재귀+빈폴더/폴더 통째로) 중 선택하며, 별도로 <b>휴지통 비우기</b>도 가능. <b>실행 전 confirm</b>이 떠 실수를 막아줍니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>📄 파일만 삭제</h3><p>지정 폴더의 <b>파일만</b> 삭제. 폴더 구조는 그대로 유지. 가장 안전한 방식 — 폴더 구조를 깨지 않음. 다운로드 폴더 정리에 자주 사용.</p></div>' +
      '<div class="card"><h3>🔁 재귀 삭제</h3><p>하위 폴더의 파일까지 모두 삭제. 폴더(빈 폴더 포함)는 유지. 자료 정리 + 폴더 구조 유지하고 싶을 때.</p></div>' +
      '<div class="card"><h3>🗂 재귀 + 빈 폴더</h3><p>파일 삭제 후 비어 있는 서브 폴더도 함께 삭제. 깔끔한 정리. 단, 최상위 폴더는 유지.</p></div>' +
      '<div class="card"><h3>💣 폴더 통째로 (위험)</h3><p>대상 폴더 자체를 완전히 삭제. <b>되돌릴 수 없음</b> — 시스템 폴더 지정 금지(예: <code>C:\\Windows</code>). confirm 다이얼로그가 한 번 더 경고.</p></div>' +
      '<div class="card"><h3>🗑 휴지통 비우기</h3><p>폴더와 무관하게 <b>학생 PC 휴지통</b>을 비웁니다. 폴더 입력 없이도 단독 실행 가능. 디스크 공간 확보·민감 정보 정리에 활용.</p></div>' +
      '<div class="card"><h3>📂 환경변수 지원</h3><p>경로에 <code>%USERPROFILE%</code>, <code>%APPDATA%</code>, <code>%TEMP%</code> 등 사용 가능. 학생 PC마다 사용자명이 달라도 동일한 명령으로 처리.</p></div>' +
      '<div class="card"><h3>📊 학생별 결과</h3><p>각 학생 PC의 결과가 실시간 표시: <b>✅완료</b>(삭제 건수) / <b>⚠️일부</b>(잠긴 파일 등 일부 실패) / <b>❌실패</b>(경로 없음·권한 부족 등).</p></div>' +
      '<div class="card"><h3>🔒 안전 장치</h3><p>실행 직전 <b>confirm 다이얼로그</b>로 대상 학생 수·방식·폴더를 한 번 더 확인. 폴더 통째로 + 빈 입력 같은 위험한 조합은 자동 차단.</p></div>' +
      '</div>' +
      '<div class="warn-box"><b>주의</b> — 시스템 폴더(<code>C:\\Windows</code>, <code>C:\\Program Files</code>)나 학생 데이터 폴더는 지정하지 마세요. 되돌릴 수 없습니다. 학생 다운로드(<code>%USERPROFILE%\\Downloads</code>)나 임시 폴더(<code>%TEMP%</code>) 같은 안전한 위치만 권장.</div>' +
      '<div class="tip-box"><b>수업 종료 자동화</b> — 다운로드 폴더 + "재귀 삭제"를 마지막 시간에 한 번 실행하면 학생 PC가 다음 수업에 깔끔. 하드보안관 환경이면 재부팅으로 어차피 정리되지만, 일반 환경에선 이 기능이 유용.</div></div>';
    div.querySelector('#mgmt-folder')?.addEventListener('change', function() { folder = this.value; });
    div.querySelector('#mgmt-bin')?.addEventListener('change', function() { emptyBin = this.checked; render(); });
  }

  window.mgmtMode = function(v) { mode = v; render(); };
  window.mgmtRun = function() {
    if (!emptyBin && !folder.trim()) { toast('⚠ 대상 폴더를 입력하세요', 'warning'); return; }
    running = true; prog = 0;
    const pcs = ['PC-01','PC-03','PC-05','PC-07','PC-09'];
    pcs.forEach(p => pcStatus[p] = 'running');
    clearInterval(timer);
    toast(emptyBin ? '🗑 5대 학생 휴지통 비우기' : '🗑 5대 학생에 ' + modes.find(m=>m.v===mode).label + ' 실행', 'info');
    const results = ['done','done','warn','done','error'];
    timer = setInterval(() => {
      prog += 5;
      const doneCount = Math.min(Math.ceil(prog / 20), 5);
      pcs.forEach((p, i) => {
        if (i < doneCount) pcStatus[p] = results[i];
        else if (i === doneCount && prog < 100) pcStatus[p] = 'running';
      });
      if (prog >= 100) {
        prog = 100; clearInterval(timer); running = false;
        const ok = pcs.filter(p => pcStatus[p] === 'done').length;
        const wn = pcs.filter(p => pcStatus[p] === 'warn').length;
        const er = pcs.filter(p => pcStatus[p] === 'error' || pcStatus[p] === 'blocked').length;
        toast('✅ 정리 완료 — 성공 ' + ok + ' / 일부 ' + wn + ' / 실패 ' + er, er > 0 ? 'warning' : 'success');
      }
      render();
    }, 200);
    render();
  };
  render();
}

// 10. TIMER
// ═══════════════════════════════════════════════
function buildTimer(div) {
  let mode = 'countdown', running = false, paused = false;
  let totalSec = 900, remaining = 900, elapsed = 0;
  let timer = null;

  function format(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return m + ':' + sec;
  }

  function render() {
    const display = mode === 'countdown' ? remaining : elapsed;
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">타이머</div>
        <div class="is-row"><div class="is-radio"><label><input type="radio" name="tm" value="countdown" ${mode==='countdown'?'checked':''}> 카운트다운</label></div><div class="is-radio"><label><input type="radio" name="tm" value="stopwatch" ${mode==='stopwatch'?'checked':''}> 스톱워치</label></div></div>
        ${mode === 'countdown' ? '<div class="is-label">⏲️ 시간</div><div class="is-row" style="gap:3px">' +
          ['+1분','+5분','+15분','+30분'].map(t => '<div class="is-btn sm" style="--b:rgb(var(--c-txt2));background:color-mix(in srgb,rgb(var(--c-txt2)) 8%,transparent);color:rgb(var(--c-txt2))" onclick="addTime(' + parseInt(t) + ')">' + t + '</div>').join('') +
          '<div class="is-btn sm" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red))" onclick="resetTime()">↺</div></div>' : ''}
        ${mode === 'countdown' ? '<div class="is-row"><input type="text" placeholder="mm:ss" value="' + format(totalSec) + '" style="width:70px;padding:3px 6px;border-radius:3px;border:1px solid rgb(var(--c-border));background:rgb(var(--c-surface));color:rgb(var(--c-txt));font-size:11px;font-family:monospace" id="tm-inp"></div>' : ''}
        <div class="is-label">▶ 제어</div>
        <div class="is-row" style="padding-bottom:6px">
          ${!running
            ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="startTimer()">▶ 시작</div>'
            : '<div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 10%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="stopTimer()">⏹ 종료</div>'}
          ${running
            ? (paused
              ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="resumeTimer()">▶ 재개</div>'
              : '<div class="is-btn" style="--b:rgb(var(--c-yellow));background:color-mix(in srgb,rgb(var(--c-yellow)) 10%,transparent);color:rgb(var(--c-yellow));flex:1;text-align:center" onclick="pauseTimer()">⏸ 일시정지</div>')
            : ''}
        </div>
        <div class="timer-display"><div class="num" style="color:${display <= 60 && mode === 'countdown' ? '#ef4444' : 'rgb(var(--c-accent))'}">${format(display)}</div></div>
        ${running && mode === 'countdown' && display <= 60 ? '<div style="text-align:center;font-size:10px;color:#ef4444;animation:blink 1s infinite">⚠️ 1분 미만</div>' : ''}
      </div>
    `);
    const stu = running
      ? stuTimer(format(display))
      : stuView('<span style="font-size:28px;margin-bottom:6px">⏱️</span><div style="color:#94a3b8;font-weight:600">타이머 대기 중</div>');
    div.innerHTML = '<h2>⏱️ 타이머 (카운트다운 / 스톱워치)</h2><div class="sub">수업 타이머 — 카운트다운 · 스톱워치</div>';
    div.innerHTML += iSection('카운트다운/스톱워치 버튼을 눌러 학생 화면에 어떻게 보이는지 확인하세요', sidebar, iStu(stu),
      '<b>⏲ 카운트다운</b> — 지정한 시간에서 0까지 감소. 시험 시간·실습 시간 안내에 적합. <b>0초 도달 시 학생 화면에 풀스크린 종료 모달</b>이 떠 시간 만료를 강하게 알립니다(닫을 수 없으며 5분 후 자동 해제). <b>⏱ 스톱워치</b> — 0초부터 증가. 발표 시간 측정·실습 시간 누적에 활용. 학생 화면에는 상단에 작은 칩으로 표시됩니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>⏲ 카운트다운 모드</h3><p>분 단위 추가(+1·+5·+15·+30)나 직접 <code>mm:ss</code> 입력으로 시간 설정. ▶ 시작 → 학생 화면에 함께 표시되며, 1분 미만이면 빨간색으로 강조.</p></div>' +
      '<div class="card"><h3>⏱ 스톱워치 모드</h3><p>0초부터 증가만 합니다. 종료 시간 정해진 게 없을 때 — 자유 발표·실험 시간 측정에 적합.</p></div>' +
      '<div class="card"><h3>🚨 0초 도달 알림</h3><p>카운트다운이 0이 되면 학생 화면에 <b>풀스크린 종료 모달</b>이 떠서 "시간 종료!" 메시지를 강조 표시. 학생이 닫을 수 없으며 다음 중 하나가 일어나면 자동 해제: 새 타이머 시작, 5분 경과, 교사 앱 연결 끊김 3분.</p></div>' +
      '<div class="card"><h3>📌 학생 화면 표시 위치</h3><p>학생 PC 상단 가운데에 작은 칩(28px 높이)으로 표시됩니다. 좌우 영역이 비어 있어 학생이 뒤에 있는 다른 창을 조작하는 데 방해되지 않음.</p></div>' +
      '<div class="card"><h3>⏸ 일시정지</h3><p>카운트다운·스톱워치 모두 일시정지/재개 가능. 일시정지 중에도 학생 화면엔 멈춘 시간이 그대로 표시.</p></div>' +
      '<div class="card"><h3>🔄 재접속 시 자동 동기</h3><p>학생 PC가 늦게 접속했거나 재부팅 후 다시 들어와도 <b>현재 타이머 상태가 자동으로 동기화</b>됩니다. 모두 같은 시간을 봄.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>시험 운영 팁</b> — 시험 시작 시 카운트다운으로 시간 보여주고, 마감 1~2분 전엔 자동으로 빨간색으로 강조됩니다. 종료 모달은 닫을 수 없어 자동으로 "그만"을 시각화해 줍니다.</div></div>';
    div.querySelectorAll('input[name="tm"]').forEach(r => r.addEventListener('change', function() { mode = this.value; if (!running) render(); }));
    div.querySelector('#tm-inp')?.addEventListener('change', function() {
      const parts = this.value.split(':');
      if (parts.length === 2) { totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]); remaining = totalSec; if (!running) render(); }
    });
  }

  window.addTime = function(m) { totalSec += m * 60; remaining = totalSec; render(); };
  window.resetTime = function() { totalSec = 900; remaining = 900; render(); };
  window.startTimer = function() { if (mode === 'countdown' && remaining <= 0) return; running = true; paused = false; clearInterval(timer); timer = setInterval(() => { if (!paused) { if (mode === 'countdown') { remaining--; if (remaining <= 0) { remaining = 0; clearInterval(timer); running = false; toast('⏰ 시간 종료! 학생 모달 표시됨', 'error'); } } else { elapsed++; } render(); } }, 1000); render(); toast('▶ 타이머 시작', 'success'); };
  window.stopTimer = function() { running = false; clearInterval(timer); if (mode === 'countdown') remaining = totalSec; else elapsed = 0; render(); toast('⏹ 타이머 종료', 'info'); };
  window.pauseTimer = function() { paused = true; render(); toast('⏸ 타이머 일시정지', 'warning'); };
  window.resumeTimer = function() { paused = false; render(); toast('▶ 타이머 재개', 'success'); };
  render();
}

      '<div class="card"><h3>🔒 단일 인스턴스</h3><p><code>app.requestSingleInstanceLock()</code>로 교사 PC당 한 인스턴스만 실행됩니다. 두 번째 실행 시 기존 창이 포그라운드로 올라옵니다.</p></div>' +
      '<div class="card"><h3>⚙ 첫 설정</h3><p>설정 메뉴에서 실습실 이름·포트·녹화 저장 위치 등을 입력합니다. <code>config.json</code>이 없으면 첫 설치로 간주되어 초기화 다이얼로그를 띄우지 않습니다.</p></div>' +
      '<div class="card"><h3>🔄 이후 자동 업데이트</h3><p>이후 버전 업데이트도 <b>GitHub Releases 같은 채널</b>로 일원화됩니다. 첫 설치와 운영 중 업데이트 모두 한 곳에서 — 일선 학교 어디서든 인증 없이 동작.</p></div>' +
      '</div>' +
      '<div class="tip-box"><strong>Tip</strong> — 새로 부임한 선생님, 새 실습실 추가 시에만 GitHub Releases를 이용하면 됩니다. 기존 교사 PC는 앱 내 업데이트 알림을 따라 진행하세요.</div>' +
      '</div>';
  }

  window.itGithub   = function() { phase = 'github';  render(); toast('🌐 GitHub Releases 페이지 표시', 'info'); };
  window.itDownload = function() {
    phase = 'downloading'; prog = 0; clearInterval(timer);
    timer = setInterval(() => {
      prog += 4;
      if (prog >= 100) { prog = 100; clearInterval(timer); phase = 'wizard'; toast('✅ 다운로드 완료 · 설치 마법사 준비', 'success'); }
      render();
    }, 80);
    render();
  };
  window.itWizard   = function() { phase = 'firewall'; render(); toast('▶️ NSIS 설치 완료 · 앱 자동 실행', 'success'); };
  window.itFirewall = function() { phase = 'running';  render(); toast('🛡 방화벽 허용 완료 · 9000 포트 listen', 'success'); };
  window.itReset    = function() { phase = 'idle'; prog = 0; clearInterval(timer); render(); };

  render();
}

        <div class="is-row" style="padding-bottom:6px">

        }).join('')}

    let stuHtml;

    } else if (phase === 'installing') {
      stuHtml = '<div class="ps-title"><span>👨‍🎓 학생 PC</span></div>' +

        '<div style="color:#64748b">C:\\&gt; install.bat</div>' +
        '<div style="color:#94a3b8">========================================</div>' +
        '<div style="color:#fbbf24"> ScreenShare Student Setup</div>' +
        '<div style="color:#94a3b8">========================================</div>' +
        (prog>=10 ? '<div>[1/4] Stopping existing processes...</div>' : '') +
        (prog>=30 ? '<div>[2/4] Copying teacher IP config...</div><div style="color:#64748b">  → %APPDATA%\\ScreenShareS\\student-config.json</div>' : '') +
        (prog>=55 ? '<div>[3/4] Running installer...</div><div style="color:#64748b">  → %LOCALAPPDATA%\\Programs\\ScreenShareS\\</div>' : '') +
        (prog>=85 ? `<div style="color:#6ee7b7">[4/4] Done! Teacher IP: ${teacherIp}</div>` : '') +
        '</div>';
    } else {
      stuHtml = stuView(`
        <span style="font-size:28px;margin-bottom:6px">🎉</span>
        <div style="color:#6ee7b7;font-weight:600">설치 완료 · 교사 앱에 자동 연결</div>
        <div style="font-size:10px;color:#475569;margin-top:4px;line-height:1.6">
          작업 스케줄러 <code>ScreenShareS</code> 등록<br>
          워치독 <code>DwmHelper.exe</code> 시작 · 재부팅 후 자동 실행<br>
          트레이/앱 목록 숨김 · 학생 우회 차단
        </div>
      `);
    }

    div.innerHTML = '<h2>👨‍🎓 학생 PC 설치 — 맞춤 패키지</h2><div class="sub">교사 앱이 만든 맞춤 패키지로 설치</div>';
    div.innerHTML += iSection('단계 버튼을 눌러 교사↔학생 동기 흐름을 확인하세요', sidebar, iStu(stuHtml),
      '<b>📦 맞춤 패키지 방식</b> — 학생 앱은 GitHub에서 직접 받지 <b>않습니다</b>. 교사 앱이 자신의 IP·포트를 박은 <code>student-config.json</code> + 학생 setup.exe + <code>install.bat</code> + <code>uninstall.bat</code>을 묶어 폴더와 zip을 만들어 줍니다.<br>' +
      '<b>📂 패키지 산출물</b> — 바탕화면에 <code>학생설치패키지_{교사IP}</code> 폴더(하드보안관용)와 동명의 <code>.zip</code>(USB 배포용)이 동시 생성됩니다.<br>' +

      '<div class="card"><h3>📂 학생 설치 경로</h3><p><code>%LOCALAPPDATA%\\Programs\\ScreenShareS\\</code>(바이너리) · <code>%APPDATA%\\ScreenShareS\\</code>(설정·로그) · <code>C:\\Screen_Share\\학생로그\\</code>(공용 로그)</p></div>' +
      '<div class="card"><h3>🔧 자동 시작 등록</h3><p>설치 시 작업 스케줄러 <code>ScreenShareS</code> 등록 (LogonTrigger + RestartOnFailure 1분/999회). DwmHelper.exe(워치독)가 있으면 우선 등록, 없으면 ScreenShareS.exe. fallback으로 HKCU\\Run.</p></div>' +
      '<div class="card"><h3>🛡 워치독 (DwmHelper)</h3><p>설치 시 ScreenShareS.exe가 DwmHelper.exe로 복사되어 상호감시. 5초 주기 tasklist. Main 사망 시 <code>--from-watchdog</code> 인자로 재실행해 교사 앱에 경고 송신.</p></div>' +
      '<div class="card"><h3>🔒 학생 우회 차단</h3><p>NSIS <code>SystemComponent=1</code> → "앱 및 기능" 목록 숨김 · 트레이 미노출 · 작업표시줄 아이콘 차단(hiddenOwner 부모창) · overlay Alt+F4/F5/F11/F12/Ctrl+Shift+I 차단 · prod에서 devTools 비활성.</p></div>' +
      '<div class="card"><h3>💾 하드보안관 환경</h3><p>학생 PC가 하드보안관 환경이면 재부팅 시 시스템이 초기화됩니다. 설치는 반드시 <b>하드보안관 해제 상태</b>에서 진행하고, 설치 직후 잠그면 영구 유지됩니다.</p></div>' +
      '</div>' +
      '<div class="tip-box"><strong>왜 교사 IP를 미리 박나요?</strong> — 학생 앱이 어느 교사 PC에 접속할지 모르기 때문입니다. 학교마다 교사 PC IP가 다르므로, 교사 앱이 자기 IP가 박힌 student-config.json을 묶어 배포합니다.</div>' +
      '<div class="warn-box"><strong>SmartScreen 경고</strong> — 학생 PC에서 install.bat 실행 시 SmartScreen이 뜨면 <b>추가 정보 → 실행</b>. UAC 다이얼로그는 NSIS 설치 단계에서만 1회 표시됩니다.</div>' +
      '</div>';
  }

  window.isOpenModal = function() { phase = 'make'; render(); toast('🪟 학생 설치 패키지 모달 열림', 'info'); };
  window.isMake = function() {
    phase = 'making'; prog = 0; clearInterval(timer);
    timer = setInterval(() => {
      prog += 5;
      if (prog >= 100) { prog = 100; clearInterval(timer); phase = 'ready'; toast('✅ 패키지 생성 완료 · 바탕화면에 폴더+zip 저장', 'success'); }
      render();
    }, 70);
    render();
  };
  window.isMethod = function(m) { distMethod = m; render(); };
  window.isDistribute = function() {
    phase = 'installing'; prog = 0;
    pcs.forEach(p => pcStates[p] = 'waiting');
    clearInterval(timer);
    const labelMap = {usb:'💾 USB로 폴더 복사', share:'🗂 공유폴더 업로드', ghost:'👻 Ghost 배포 스크립트 실행'};
    toast(labelMap[distMethod] + ' 시작', 'info');
    timer = setInterval(() => {
      prog += 3;
      const done = Math.min(Math.ceil(prog / 20), 5);
      pcs.forEach((p, i) => {
        if (i < done) pcStates[p] = 'done';
        else if (i === done && prog < 100) pcStates[p] = 'installing';
        else pcStates[p] = 'waiting';
      });
      if (prog >= 100) {
        prog = 100; clearInterval(timer);
        pcs.forEach(p => pcStates[p] = 'done');
        phase = 'connected';
        toast('🎉 5대 모두 교사 앱에 자동 연결됨', 'success');
      }
      render();
    }, 120);
    render();
  };
  window.isReset = function() {
    phase = 'idle'; prog = 0; distMethod = 'usb';
    pcs.forEach(p => pcStates[p] = 'waiting');
    clearInterval(timer); render();
  };

  render();
}

      '<div class="card"><h3>🛡 자동 업데이트 안전장치</h3><p>업데이트 도중 워치독이 끼어들지 않도록 lock 파일이 자동 관리되고, 5분 이상 지연되면 자동으로 풀려 무한 잠금 방지. 백신(V3 등) 검사도 30초 대기.</p></div>' +

      '<div class="card"><h3>📂 설치 파일 보관 위치</h3><p>교사 앱이 받은 setup.exe는 <code>C:\\Screen_Share\\설치파일\\</code>에 저장되어 수동 배포(USB)나 백업에 활용 가능. 매번 새로 받기 정책으로 옛 파일을 쓰지 않음.</p></div>' +
      '</div>' +
      '<div class="tip-box"><strong>일선 학교 호환</strong> — public GitHub Releases라 어느 학교에서든 그대로 동작합니다. 학생 PC는 인터넷 없어도 OK — 교사 PC가 받은 걸 LAN으로 뿌려주니까요.</div>' +
      '</div>';
  }

  window.updCheck = function() { phase = 'checking'; render(); setTimeout(() => { phase = 'ready'; render(); toast('🔍 v0.1.53 업데이트 확인됨 (GitHub Releases)', 'info'); }, 1200); };

  };

  render();

// 13. REMOVE — Student Program Removal & Log Management
// ═══════════════════════════════════════════════
function buildRemove(div) {
  let phase = 'idle'; // idle / removing / done
  let prog = 0, timer = null;
  let logPhase = 'none'; // none / collecting / deleting / collected / deleted
  let logProg = 0, logTimer = null;
  const pcs = ['PC-01','PC-03','PC-05','PC-07','PC-09'];
  const removedPcs = {};

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">🗑 학생 프로그램 제거</div>
        ${phase === 'idle' ? `
        <div class="is-row" style="padding-top:2px">
          <div class="is-btn full" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red))" onclick="remStart()">🗑 학생 5대 일괄 제거</div>
        </div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 6px">자동 시작 등록 해제 → 워치독 종료 → NSIS 무인 제거</div>` : phase === 'removing' ? `
        <div style="padding:6px 10px">
          <div class="prog"><div style="width:${prog}%;background:rgb(var(--c-red))"></div></div>
          <div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:3px">🗑 제거 중... ${prog}%<br>${Object.keys(removedPcs).length}/${pcs.length}대 완료</div>
        </div>` : `
        <div style="padding:6px 10px;color:rgb(var(--c-green));font-size:11px;font-weight:600">✅ 제거 완료 (5/5)</div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 2px">작업 스케줄러 · HKCU\\Run · 설치 폴더 삭제됨</div>
        <div class="is-row" style="padding-bottom:6px"><div class="is-btn" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent);color:rgb(var(--c-accent));flex:1;text-align:center" onclick="remReset()">↺ 다시 실행</div></div>`}
      </div>
      <div class="is-sec">
        <div class="is-label">제거 현황</div>
        ${pcs.map(p => {
          const s = phase === 'idle' ? '대기' : (removedPcs[p] ? '✅ 제거됨' : (phase === 'removing' ? '⚙️ 제거 중' : '대기'));
          const c = s === '✅ 제거됨' ? '#6ee7b7' : (s === '⚙️ 제거 중' ? '#fbbf24' : '#64748b');
          return `<div style="display:flex;align-items:center;gap:4px;padding:1px 10px;font-size:10px;color:${c}"><span>${s === '✅ 제거됨' ? '✅' : (s === '⚙️ 제거 중' ? '⚙️' : '⏳')}</span>${p}</div>`;
        }).join('')}
      </div>
      <div class="is-sec" style="border-top:1.5px dashed rgb(var(--c-border))">
        <div class="is-title">📋 로그 관리</div>
        <div style="padding:2px 10px;font-size:10px;color:rgb(var(--c-txt2))">5MB 회전 · 3일치 보관</div>
        <div style="padding:0 10px 2px;font-size:9px;color:rgb(var(--c-txt3))">C:\\Screen_Share\\학생로그\\student_electron_YYYYMMDD.log</div>
        ${logPhase === 'none' ? `
        <div class="is-row" style="padding-top:2px;gap:4px">
          <div class="is-btn" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue));flex:1;text-align:center" onclick="logCollect()">📥 로그 수집</div>
          <div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="logDel()">🗑 로그 삭제</div>
        </div>` : logPhase === 'collecting' ? `
        <div style="padding:6px 10px">
          <div class="prog"><div style="width:${logProg}%;background:rgb(var(--c-blue))"></div></div>
          <div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:3px">📥 로그 수집 중... ${logProg}%<br>student_electron_20260601.log · ${(logProg*0.04).toFixed(1)}MB</div>
        </div>` : logPhase === 'deleting' ? `
        <div style="padding:6px 10px">
          <div class="prog"><div style="width:${logProg}%;background:rgb(var(--c-red))"></div></div>
          <div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:3px">🗑 로그 삭제 중... ${logProg}%<br>*.log, *.1.log, *.2.log (회전 파일 모두)</div>
        </div>` : `
        <div style="padding:6px 10px;color:rgb(var(--c-green));font-size:11px;font-weight:600">✅ ${logPhase === 'collected' ? '로그 수집 완료' : '로그 삭제 완료'}</div>`}
      </div>
    `);

    let stuHtml;
    if (phase === 'removing') {
      const done = Object.keys(removedPcs).length;
      stuHtml = stuView(`<span style="font-size:28px;margin-bottom:6px">🗑️</span><div style="color:#fca5a5;font-weight:600">학생 앱 제거 중...</div><div style="font-size:10px;color:#475569;margin-top:4px">자동 시작 해제 → 워치독 종료 → 폴더 삭제<br>${done}/${pcs.length}대 완료</div>`);
    } else if (phase === 'done') {
      stuHtml = stuView(`<span style="font-size:28px;margin-bottom:6px">✅</span><div style="color:#6ee7b7;font-weight:600">제거 완료</div><div style="font-size:10px;color:#475569;margin-top:4px">설치 폴더·자동 시작·워치독 모두 정리됨</div>`);

    } else {
      stuHtml = stuEmpty();
    }

    div.innerHTML = '<h2>🗑 제거 / 📋 로그 관리</h2><div class="sub">학생 앱 원격 제거 · 학생 로그 관리</div>';
    div.innerHTML += iSection('프로그램 제거와 로그 관리를 시뮬레이션해보세요', sidebar, iStu(stuHtml),
      '<b>🗑 학생 프로그램 제거</b> — 교사 앱에서 제거 명령을 보내면 학생 PC들이 받아 자동으로 학생 앱을 깨끗하게 제거합니다. 작업 스케줄러·자동 시작 항목·설치 폴더 모두 정리됩니다. 학기 끝/교실 이동 시 일괄 정리에 활용.<br>' +
      '<b>📋 로그 관리</b> — 문제가 생기면 학생 PC의 로그 파일을 교사 앱으로 수집해 원인을 확인할 수 있습니다. 학생 로그는 5MB 단위로 회전 저장되며 3일 후 자동 삭제됩니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🗑 깨끗한 제거</h3><p>제거 시 <b>설치 폴더 + 자동 시작 등록 + 워치독</b>까지 모두 정리됩니다. 학생 PC에 흔적 거의 안 남음. 설정 파일(<code>%APPDATA%\\ScreenShareS\\</code>)은 안전을 위해 남겨둠 — 재설치 시 자동 인식.</p></div>' +
      '<div class="card"><h3>🛡 워치독 동시 종료</h3><p>제거 도중 워치독(<code>DwmHelper</code>)이 끼어들어 다시 살리지 못하도록 자동으로 함께 정리. 학생이 임의로 종료해서 살아남는 사례 없음.</p></div>' +
      '<div class="card"><h3>📋 학생 로그 위치</h3><p><code>C:\\Screen_Share\\학생로그\\student_electron_YYYYMMDD.log</code>. <b>5MB 단위 자동 회전</b>(.1.log, .2.log)·<b>3일 후 자동 삭제</b>. 하드보안관 환경에서도 부담 없이 작동.</p></div>' +
      '<div class="card"><h3>📋 교사 로그 위치</h3><p><code>C:\\Screen_Share\\교사로그\\teacher_YYYYMMDD.log</code>. 회전·자동 정리 없음 — 교사 PC는 일반 환경이라 수동 관리.</p></div>' +
      '<div class="card"><h3>📥 로그 수집</h3><p>특정 학생 PC의 로그를 교사 앱으로 끌어옴. 문제 학생만 골라 받을 수 있어 진단에 유용. 회전된 옛 로그(.1.log, .2.log)까지 함께 가져옴.</p></div>' +
      '<div class="card"><h3>🗑 로그 삭제</h3><p>학생 PC의 로그 파일 일괄 삭제. 디스크 정리·민감 정보 정리에 활용. 회전 파일(.1.log, .2.log) 포함.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>학기 끝 정리 흐름</b> — 학생 프로그램 제거 → 로그 삭제 → 학생 PC가 깨끗한 상태로 다음 학기까지 대기. 다음 학기 첫 수업 때 새 맞춤 패키지로 다시 설치하면 끝.</div></div>';
  }

  window.remStart = function() {
    if (phase !== 'idle') return;
    phase = 'removing'; prog = 0;
    clearInterval(timer);
    timer = setInterval(() => {
      prog += 4;
      const done = Math.min(Math.ceil(prog / 20), 5);
      pcs.forEach((p, i) => { if (i < done) removedPcs[p] = true; });
      if (prog >= 100) {
        prog = 100; clearInterval(timer);
        phase = 'done';
        toast('🗑 학생 5대 프로그램 제거 완료', 'warning');
      }
      render();
    }, 200);
    render();
  };
  window.remReset = function() { phase = 'idle'; prog = 0; pcs.forEach(p => delete removedPcs[p]); clearInterval(timer); render(); };
  window.logCollect = function() {
    logPhase = 'collecting'; logProg = 0;
    clearInterval(logTimer);
    logTimer = setInterval(() => { logProg += 5; if (logProg >= 100) { logProg = 100; clearInterval(logTimer); logPhase = 'collected'; toast('📥 로그 수집 완료 (에러 로그 3건)', 'info'); } render(); }, 100);
    render();
  };
  window.logDel = function() {
    logPhase = 'deleting'; logProg = 0;
    clearInterval(logTimer);
    logTimer = setInterval(() => { logProg += 8; if (logProg >= 100) { logProg = 100; clearInterval(logTimer); logPhase = 'deleted'; toast('🗑 로그 삭제 완료', 'info'); } render(); }, 80);
    render();
  };

  render();
}

// 14. SYSTEM

function buildSystem(div) {
  div.innerHTML = '<h2>⚙️ 시스템 관리 기능</h2><div class="sub">관리 메뉴 · 단축키</div>';

  const blocks = [
    { label:'📺 프로젝터 뷰', desc:'학생 화면을 보조 모니터/프로젝터에 2/4/6/9분할로 풀스크린 표시. 자동 페이지 전환 지원.', icon:'📺', click:'goToPage(\'mon-projector\')', detail:true },
    { label:'🎬 녹화 세션 관리', desc:'지난 녹화 세션 목록 보기 + 재생 + 분할 청크를 mp4로 다시 병합.', icon:'🎬', click:'toast(\'🎬 녹화 세션 관리 — 도구 메뉴에서 실행\',\'info\')' },
    { label:'📦 학생 프로그램 관리', desc:'GitHub Releases 최신 학생 setup.exe를 받아 LAN으로 원격 설치/업데이트/제거.', icon:'📦', click:'goToPage(\'dep-update\')', detail:true },
    { label:'📋 학생 로그 관리', desc:'학생 PC 로그 수집/삭제. 5MB 단위 회전 + 3일 후 자동 삭제.', icon:'📋', click:'goToPage(\'dep-remove\')', detail:true },
    { label:'⚡ 전원 관리', desc:'학생 PC를 원격 켜기(WoL)·종료·재시작. 사전에 MAC 주소 등록 필요.', icon:'⚡', click:'toast(\'⚡ 전원 관리 — 도구 메뉴에서 실행\',\'info\')' }
  ];

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">';
  blocks.forEach(b => {
    html += '<div style="background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px;padding:14px;cursor:pointer;transition:all .15s;position:relative" onclick="' + b.click + '" onmouseenter="this.style.borderColor=\'rgb(var(--c-accent))\';this.style.boxShadow=\'0 2px 12px rgba(0,0,0,.06)\'" onmouseleave="this.style.borderColor=\'\';this.style.boxShadow=\'\'">';
    if (b.detail) {
      html += '<span class="detail-link" style="position:absolute;top:10px;right:10px;font-size:10px;padding:1px 7px">→ 자세히</span>';
    }
    html += '<div style="font-size:24px;margin-bottom:6px">' + b.icon + '</div>';
    html += '<div style="font-size:13px;font-weight:700;color:rgb(var(--c-txt));margin-bottom:4px">' + b.label + '</div>';
    html += '<div style="font-size:11.5px;color:rgb(var(--c-txt2))">' + b.desc + '</div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div style="margin-top:16px">';

  // Shortcuts table
  html += '<div style="background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px;padding:14px;margin-top:12px">';
  html += '<h3 style="font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px">⌨️ 단축키</h3>';
  html += '<table style="width:100%;font-size:12px;border-collapse:collapse">';
  const sc = [
    ['F6','전송 시작/종료','글로벌'],
    ['F7','전송 일시정지/재개','WebP'],
    ['F8','녹화 시작/종료','글로벌'],
    ['F9','녹화 일시정지/재개','글로벌'],
    ['Ctrl+,','설정 열기','앱'],
    ['Ctrl+Shift+E','테마 에디터','앱'],
    ['F11','전체화면','앱'],
    ['Ctrl+Shift+T','항상 위 토글','앱']
  ];
  sc.forEach(([key, action, scope]) => {
    html += '<tr><td style="padding:4px 8px;border-bottom:1px solid rgb(var(--c-border))"><kbd>' + key + '</kbd></td><td style="padding:4px 8px;border-bottom:1px solid rgb(var(--c-border));color:rgb(var(--c-txt2))">' + action + '</td><td style="padding:4px 8px;border-bottom:1px solid rgb(var(--c-border));text-align:right"><span class="badge ' + (scope==='글로벌'?'badge-green':'badge-blue') + '" style="font-size:9px">' + scope + '</span></td></tr>';
  });
  html += '</table>';
  html += '<div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:6px">도구 → 단축키 설정에서 F2/F3/F4로 변경 가능 · 중복/충돌 감지 · 저장 후 테스트 모드 지원</div>';
  html += '</div>';

  div.innerHTML += html;
}

// ─── Init ───
buildPages();
</script>
