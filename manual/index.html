<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화면공유프로그램 — 인터랙티브 기능 가이드</title>
<style>
:root {
  --c-app-bg: 240 243 250; --c-surface: 255 255 255; --c-surface-2: 235 240 248;
  --c-border: 208 220 240; --c-border-2: 184 204 232;
  --c-accent: 234 88 12; --c-accent-dim: 194 65 12;
  --c-txt: 15 23 42; --c-txt2: 55 79 106; --c-txt3: 100 116 139;
  --c-green: 5 150 105; --c-red: 220 38 38; --c-yellow: 204 109 0;
  --c-blue: 37 99 235; --c-purple: 124 58 237;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#eef1f8;color:rgb(var(--c-txt));font-size:14px;line-height:1.7;display:flex;height:100vh;overflow:hidden;background-image:radial-gradient(circle,rgba(234,88,12,.04) 1px,transparent 1px);background-size:24px 24px}
#nav{width:280px;min-width:280px;background:rgb(var(--c-surface));border-right:1px solid rgb(var(--c-border));display:flex;flex-direction:column;overflow:hidden}
#nav-header{height:36px;display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid rgb(var(--c-border));position:relative}
#nav-header::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;background:rgb(var(--c-accent));border-radius:0 2px 2px 0;box-shadow:0 0 12px rgba(234,88,12,.6)}
#nav-header .lab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgb(var(--c-txt));flex:1;display:flex;align-items:center;gap:6px}
#nav-header .lab::before{content:'';width:6px;height:6px;border-radius:50%;background:rgb(var(--c-green));flex-shrink:0}
#nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
#nav-scroll::-webkit-scrollbar{width:4px}
#nav-scroll::-webkit-scrollbar-thumb{background:rgb(var(--c-border-2));border-radius:2px}
.nav-section{padding:14px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgb(var(--c-txt3));user-select:none;display:flex;align-items:center;gap:6px}
.nav-section:first-child{padding-top:8px}
.nav-section .sec-ico{font-size:13px;line-height:1}
.nav-item{padding:6px 16px 6px 32px;cursor:pointer;font-size:12px;color:rgb(var(--c-txt2));border-left:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:8px}
.nav-item:hover{background:rgb(var(--c-surface-2))}
.nav-item.active{background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue));border-left-color:rgb(var(--c-blue))}
.detail-link{display:inline-block;margin-left:6px;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600;background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue));text-decoration:none;border:1px solid color-mix(in srgb,rgb(var(--c-blue)) 30%,transparent);transition:all .12s;white-space:nowrap}
.detail-link:hover{background:color-mix(in srgb,rgb(var(--c-blue)) 16%,transparent)}
#content{flex:1;overflow-y:auto;padding:0}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:rgb(var(--c-border-2));border-radius:3px}
.content-inner{max-width:1000px;margin:0 auto;padding:24px 32px 60px}
.page{display:none}
.page.active{display:block}
.page h2{font-size:20px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.page .sub{font-size:12px;color:rgb(var(--c-txt3));margin-bottom:16px}
.page .desc{font-size:13px;color:rgb(var(--c-txt2));margin-bottom:16px;padding:12px 16px;background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px}

/* ─── Interactive Playground ─── */
.playground{background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:10px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.playground .pg-header{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;font-weight:700;color:rgb(var(--c-txt3));background:rgb(var(--c-surface));border-bottom:1px solid rgb(var(--c-border));text-transform:uppercase;letter-spacing:.3px}
.playground .pg-body{padding:14px;display:flex;gap:16px;flex-wrap:wrap}
.playground .pg-sidebar{flex:0 0 280px;min-width:200px;background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:6px;overflow:hidden}
.playground .pg-student{flex:1;min-width:250px;min-height:160px;background:#0f172a;border-radius:6px;overflow:hidden;position:relative}
.pg-student .ps-title{display:flex;align-items:center;gap:6px;padding:5px 10px;font-size:9px;font-weight:700;color:#64748b;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);text-transform:uppercase}
.pg-student .ps-body{display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:130px;padding:16px;text-align:center;font-size:13px;color:#94a3b8;transition:all .3s}

/* Interactive sidebar controls */
.i-side{background:rgb(var(--c-surface))}
.i-side .is-sec{padding:6px 0;border-bottom:1px solid rgb(var(--c-border))}
.i-side .is-title{padding:5px 10px 1px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgb(var(--c-txt3))}
.i-side .is-label{padding:7px 10px 2px;font-size:10px;font-weight:700;text-transform:uppercase;color:rgb(var(--c-txt2));display:flex;align-items:center;gap:4px}
.i-side .is-row{display:flex;gap:4px;padding:2px 10px;flex-wrap:wrap;align-items:center}
.i-side .is-btn{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .15s;user-select:none;border:1px solid transparent}
.i-side .is-btn:hover{filter:brightness(1.15)}
.i-side .is-btn:active{transform:translateY(0)}
.i-side .is-btn.active{box-shadow:0 0 0 1.5px var(--b)}
.i-side .is-btn.disabled{opacity:.35;cursor:not-allowed;filter:none!important}
.i-side .is-btn.sm{padding:2px 8px;font-size:9px}
.i-side .is-btn.full{width:calc(100% - 20px);margin:2px 10px;display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:11px;justify-content:center}
.i-side .is-chk{display:flex;align-items:center;gap:5px;font-size:10px;color:rgb(var(--c-txt2));cursor:pointer}
.i-side .is-chk input{accent-color:rgb(var(--c-accent));width:14px;height:14px;cursor:pointer;pointer-events:none}
.i-side .is-sel{padding:2px 6px;border-radius:3px;border:1px solid rgb(var(--c-border));background:rgb(var(--c-surface));color:rgb(var(--c-txt2));font-size:10px;cursor:pointer}
.i-side .is-radio{display:flex;gap:3px;align-items:center}
.i-side .is-radio label{display:flex;align-items:center;gap:3px;font-size:10px;color:rgb(var(--c-txt2));cursor:pointer}
.i-side .is-radio input{accent-color:rgb(var(--c-accent));width:12px;height:12px;margin:0;cursor:pointer}
.i-side .is-inp{width:100%;padding:5px 8px;border-radius:4px;border:1px solid rgb(var(--c-border));background:rgb(var(--c-surface-2));color:rgb(var(--c-txt));font-size:11px;font-family:inherit;resize:none}

/* Toast / Status */
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);animation:slideIn .25s ease-out;max-width:360px}
.toast.info{background:color-mix(in srgb,rgb(var(--c-blue)) 90%,transparent);color:#dbeafe;border:1px solid rgb(var(--c-blue))}
.toast.success{background:color-mix(in srgb,rgb(var(--c-green)) 90%,transparent);color:#d1fae5;border:1px solid rgb(var(--c-green))}
.toast.warning{background:color-mix(in srgb,rgb(var(--c-yellow)) 90%,transparent);color:#fef3c7;border:1px solid rgb(var(--c-yellow))}
.toast.error{background:color-mix(in srgb,rgb(var(--c-red)) 90%,transparent);color:#fee2e2;border:1px solid rgb(var(--c-red))}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Progress bar */
.prog{height:4px;background:rgb(var(--c-surface-2));border-radius:2px;overflow:hidden}
.prog div{height:100%;border-radius:2px;transition:width .5s}

/* Timer display */
.timer-display{font-family:monospace;text-align:center;padding:10px 0}
.timer-display .num{font-size:36px;font-weight:700;font-family:monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Student screen states */
.stu-idle .ps-body{color:#64748b}
.stu-streaming .ps-body{color:#22d3ee}
.stu-paused .ps-body{color:#eab308}
.stu-locked .ps-body{color:#fca5a5}
.stu-notice .ps-body{padding-top:0}

/* ─── Student desktop mockup (실제 학생 PC 바탕화면 시뮬레이션) ─── */
.stu-desktop{position:relative;width:100%;height:240px;background:linear-gradient(135deg,#1e3a5f 0%,#0f1e30 60%,#0a1422 100%);background-image:radial-gradient(circle at 22% 28%,rgba(96,165,250,.18) 0,transparent 38%),radial-gradient(circle at 78% 72%,rgba(168,85,247,.12) 0,transparent 38%);overflow:hidden}
.stu-desktop .sd-icons{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:14px}
.stu-desktop .sd-icon{display:flex;flex-direction:column;align-items:center;width:46px;color:#e2e8f0;font-size:9px;text-shadow:1px 1px 2px rgba(0,0,0,.6);text-align:center}
.stu-desktop .sd-icon span{font-size:22px;line-height:1}
.stu-desktop .sd-taskbar{position:absolute;bottom:0;left:0;right:0;height:24px;background:rgba(8,13,24,.92);backdrop-filter:blur(4px);display:flex;align-items:center;padding:0 8px;gap:6px;font-size:9px;color:#cbd5e1;border-top:1px solid rgba(255,255,255,.04)}
.stu-desktop .sd-tb-start{font-size:14px;line-height:1}
.stu-desktop .sd-tb-clock{margin-left:auto;font-family:monospace;color:#94a3b8}

/* 떠 있는 교사 화면 뷰어 (50% 기본, 우하단) */
.stu-desktop .sd-viewer{position:absolute;bottom:30px;right:8px;width:55%;background:rgba(15,23,42,.78);border:1px solid #475569;border-radius:5px;box-shadow:0 6px 20px rgba(0,0,0,.5);overflow:hidden;backdrop-filter:blur(2px)}
.stu-desktop .sd-viewer-handle{background:rgba(30,41,59,.95);padding:3px 8px;font-size:9px;color:#cbd5e1;display:flex;align-items:center;gap:6px;border-bottom:1px solid #475569;cursor:grab;font-weight:600}
.stu-desktop .sd-viewer-handle .h-grip{color:#64748b;letter-spacing:1px}
.stu-desktop .sd-viewer-handle .h-meta{margin-left:auto;font-size:8px;color:#94a3b8;font-weight:400}
.stu-desktop .sd-viewer-body{background:linear-gradient(180deg,#f8fafc 0%,#e2e8f0 100%);min-height:90px;padding:10px 12px;font-size:10px;color:#1e293b;position:relative}
.stu-desktop .sd-viewer-body .mini-title{font-size:11px;font-weight:700;color:#0f172a;margin-bottom:4px;border-bottom:1.5px solid #2563eb;padding-bottom:2px;display:inline-block}
.stu-desktop .sd-viewer-body .mini-line{font-size:9px;color:#334155;margin-top:3px;display:flex;align-items:center;gap:4px}
.stu-desktop .sd-viewer-body .mini-line::before{content:'•';color:#2563eb;font-weight:700}
.stu-desktop .sd-viewer-body .mini-cursor{position:absolute;top:42%;left:38%;font-size:14px;color:#dc2626;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}

/* 일시정지 오버레이 */
.stu-desktop .sd-viewer-pause{position:absolute;inset:0;background:rgba(15,23,42,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fde047;gap:2px;backdrop-filter:blur(1.5px)}
.stu-desktop .sd-viewer-pause .p-ico{font-size:24px}
.stu-desktop .sd-viewer-pause .p-txt{font-size:10px;font-weight:700;letter-spacing:.5px}

/* H.264 뱃지 */
.stu-desktop .sd-viewer .h264-badge{display:inline-block;margin-left:4px;padding:0 5px;border-radius:3px;font-size:8px;font-weight:700;background:#7c3aed;color:#fff}

/* 빈 상태 안내 (전송 안 함) */
.stu-desktop .sd-empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:rgba(148,163,184,.5);font-style:italic;text-align:center}

/* ─── Detail Cards ─── */
.detail-section{margin-top:12px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.card-grid{grid-template-columns:1fr}}
.card{background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.card h3{font-size:13px;font-weight:700;color:rgb(var(--c-txt));margin-bottom:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card p,.card li{font-size:12px;color:rgb(var(--c-txt2));line-height:1.6}
.card ul{padding-left:15px}
.card li{margin-top:2px}
.tip-box{background:color-mix(in srgb,rgb(var(--c-blue)) 6%,transparent);border-left:3px solid rgb(var(--c-blue));border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-size:12px;color:rgb(var(--c-txt2))}
.tip-box strong{color:rgb(var(--c-blue))}
.warn-box{background:color-mix(in srgb,rgb(var(--c-yellow)) 8%,transparent);border-left:3px solid rgb(var(--c-yellow));border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-size:12px;color:rgb(var(--c-txt2))}
.warn-box strong{color:rgb(var(--c-yellow))}
.step-list{list-style:none;padding:0}
.step-list li{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:12.5px;color:rgb(var(--c-txt2))}
.step-num{width:22px;height:22px;background:rgb(var(--c-accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;vertical-align:middle;margin-left:3px}
.badge-blue{background:color-mix(in srgb,rgb(var(--c-blue)) 12%,transparent);color:rgb(var(--c-blue))}
.badge-green{background:color-mix(in srgb,rgb(var(--c-green)) 12%,transparent);color:rgb(var(--c-green))}
.badge-purple{background:color-mix(in srgb,rgb(var(--c-purple)) 12%,transparent);color:rgb(var(--c-purple))}
.badge-red{background:color-mix(in srgb,rgb(var(--c-red)) 12%,transparent);color:rgb(var(--c-red))}
kbd{background:rgb(var(--c-surface-2));border:1px solid rgb(var(--c-border));border-radius:3px;padding:1px 5px;font-family:monospace;font-size:11px;color:rgb(var(--c-txt));vertical-align:middle}
</style>
</head>
<body>

<nav id="nav">
  <div id="nav-header"><div class="lab"><span></span>인터랙티브 가이드</div></div>
  <div id="nav-scroll"></div>
</nav>

<div id="content"><div class="content-inner" id="pages"></div></div>

<script>
// ─── Toast ───
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── 뷰어 모달 ───
let viewerIdx = 0;
const viewerPcs = ['PC-01','PC-02','PC-03','PC-04','PC-05','PC-07','PC-09'];
function showViewer(pcName) {
  closeViewer();
  viewerIdx = viewerPcs.indexOf(pcName);
  if (viewerIdx < 0) viewerIdx = 0;
  const overlay = document.createElement('div');
  overlay.id = 'viewer-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:9998;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s';
  overlay.onclick = function(e) { if (e.target === overlay) closeViewer(); };
  const vw = document.createElement('div');
  vw.style.cssText = 'background:#1e293b;border-radius:12px;width:800px;max-width:92vw;max-height:94vh;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:scaleIn .2s';
  const desktop = stuDesktop('streaming-webp', { size: 55 });
  vw.innerHTML =
    '<div style="display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid rgba(255,255,255,.08);background:#0f172a;border-radius:12px 12px 0 0">' +
      '<span style="font-size:14px;font-weight:700;color:#cbd5e1">🖥 ' + pcName + ' · 원격 뷰어</span>' +
      '<span style="font-size:9px;color:#22d3ee;margin-left:6px;display:flex;align-items:center;gap:4px"><span style="width:5px;height:5px;border-radius:50%;background:#22d3ee"></span>연결됨</span>' +
      '<span style="margin-left:auto;display:flex;gap:4px">' +
        '<button onclick="closeViewer()" style="background:rgba(239,68,68,.15);border:none;color:#fca5a5;padding:3px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600">✕ 닫기</button>' +
      '</span>' +
    '</div>' +
    '<div style="flex:1;padding:10px;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:240px">' +
      '<div style="height:260px">' + desktop + '</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-top:1px solid rgba(255,255,255,.08);background:#0f172a;border-radius:0 0 12px 12px;flex-wrap:wrap">' +
      '<span style="display:flex;gap:3px">' +
        '<button style="background:rgba(59,130,246,.2);border:none;color:#93c5fd;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600" onclick="toast(\'🖱 ' + pcName + ' 원격 마우스 제어 시작됨\',\'info\')">🖱 마우스</button>' +
        '<button style="background:rgba(255,255,255,.06);border:none;color:#94a3b8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px" onclick="toast(\'⌨ ' + pcName + ' 원격 키보드 입력 활성화됨\',\'info\')">⌨ 키보드</button>' +
        '<button style="background:rgba(255,255,255,.06);border:none;color:#94a3b8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px" onclick="toast(\'🔒 ' + pcName + ' 화면 잠금\',\'info\')">🔒 잠금</button>' +
        '<button style="background:rgba(255,255,255,.06);border:none;color:#94a3b8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px" onclick="toast(\'📷 ' + pcName + ' 화면 캡처 완료\',\'success\')">📷 캡처</button>' +
        '<button style="background:rgba(255,255,255,.06);border:none;color:#94a3b8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px" onclick="toast(\'📋 ' + pcName + ' 클립보드 읽기 완료\',\'success\')">📋 클립보드</button>' +
        '<button style="background:rgba(255,255,255,.06);border:none;color:#94a3b8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px" onclick="toast(\'📺 ' + pcName + ' 화면 중계 시작\',\'info\')">📺 중계</button>' +
      '</span>' +
      '<span style="margin-left:auto;font-size:10px;color:#64748b;display:flex;gap:6px">' +
        '<span onclick="navViewer(-1)" style="cursor:pointer;color:#94a3b8;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.04);font-size:13px;line-height:1">◀</span>' +
        '<span style="color:#475569;font-size:10px">' + (viewerIdx + 1) + '/' + viewerPcs.length + '</span>' +
        '<span onclick="navViewer(1)" style="cursor:pointer;color:#94a3b8;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.04);font-size:13px;line-height:1">▶</span>' +
      '</span>' +
    '</div>';
  overlay.appendChild(vw);
  document.body.appendChild(overlay);
}
function closeViewer() {
  const o = document.getElementById('viewer-overlay');
  if (o) { o.style.transition = 'opacity .15s'; o.style.opacity = '0'; setTimeout(() => o.remove(), 160); }
}
function navViewer(dir) {
  viewerIdx = (viewerIdx + dir + viewerPcs.length) % viewerPcs.length;
  showViewer(viewerPcs[viewerIdx]);
}

// ─── Student view helper ───
function stuView(html) {
  return '<div class="ps-title"><span>👤 학생 화면</span></div><div class="ps-body">' + html + '</div>';
}
function stuEmpty() { return stuView('<span style="font-size:28px;margin-bottom:6px">🖥️</span><div>PC-01 · 대기 중</div>'); }

// 학생 PC 바탕화면 시뮬레이션 — 전송 시작/종료, 모드 비교, 뷰어 강제 등에서 사용
// state: 'empty' | 'streaming-webp' | 'streaming-h264' | 'paused'
// opts.size: 뷰어 창 폭 % (기본 55). 뷰어 강제 페이지에서 30~80 변경.
// opts.locked: 강제 고정 표시(🔒 + 크기%) on/off. 기본 false.
function stuDesktop(state, opts) {
  opts = opts || {};
  const size = opts.size || 55;
  const locked = !!opts.locked;

  const icons = [
    {ico:'📁',label:'문서'},
    {ico:'🌐',label:'Chrome'},
    {ico:'📝',label:'한글'},
  ].map(i => '<div class="sd-icon"><span>' + i.ico + '</span>' + i.label + '</div>').join('');

  const taskbar = '<div class="sd-taskbar"><span class="sd-tb-start">⊞</span><span>📁</span><span>🌐</span><span class="sd-tb-clock">14:32</span></div>';

  let viewer = '';
  let hint = '';
  if (state === 'empty') {
    hint = '<div class="sd-empty-hint">교사가 전송 시작하면<br>여기에 작은 뷰어 창이 나타납니다</div>';
  } else {
    const isH264 = state === 'streaming-h264';
    const isPaused = state === 'paused';
    const modeMeta = isH264
      ? '<span class="h264-badge">H.264</span> 24fps · 1280×720'
      : '10fps · 1280×720';
    // locked일 때는 grip 자리에 자물쇠 + 핸들 우측에 'N% 고정'으로 강조
    const gripHtml = locked
      ? '<span class="h-grip" style="color:#fca5a5">🔒</span>'
      : '<span class="h-grip">⠿</span>';
    const lockMeta = locked ? '<b style="color:#fca5a5">' + size + '% 고정</b> · ' : '';
    const handle = '<div class="sd-viewer-handle">' + gripHtml + '<span>📺 교사 화면</span><span class="h-meta">' + lockMeta + modeMeta + '</span></div>';
    const slide = `
      <div class="mini-title">오늘의 수업</div>
      <div class="mini-line">화면 공유 시작</div>
      <div class="mini-line">학생 PC 모니터링</div>
      <div class="mini-line">실습 자료 배포</div>
      <div class="mini-cursor">➤</div>
    `;
    const pauseOverlay = isPaused ? '<div class="sd-viewer-pause"><div class="p-ico">⏸️</div><div class="p-txt">일시정지</div></div>' : '';
    viewer = '<div class="sd-viewer" style="width:' + size + '%">' + handle + '<div class="sd-viewer-body">' + slide + pauseOverlay + '</div></div>';
  }

  return '<div class="ps-title"><span>👨‍🎓 학생 PC 바탕화면</span></div>' +
    '<div class="stu-desktop">' +
    '<div class="sd-icons">' + icons + '</div>' +
    hint + viewer + taskbar +
    '</div>';
}

      { id:'comm-float', label:'📱 플로팅 바', build: buildCommFloat },
      { id:'comm-inbox', label:'📨 받은 메시지', build: buildCommInbox },
      { id:'comm-msg', label:'💬 메시지 / 코드 전송', build: buildCommMsg }
    ]},
    { id:'file', label:'📁 파일', pages:[
      { id:'file-deploy', label:'📤 파일 배포', build: buildFileDeploy },
      { id:'file-collect', label:'📥 파일 회수', build: buildFileCollect },
      { id:'file-exec', label:'▶ 파일 실행', build: buildFileExec },
      { id:'file-mgmt', label:'🗑 파일 관리', build: buildFileMgmt }
    ]},
    { id:'timer', label:'⏱️ 타이머', pages:[
      { id:'timer-main', label:'카운트다운 / 스톱워치', build: buildTimer }
    ]},
    { id:'deploy', label:'📦 설치 / 배포', pages:[
      { id:'dep-start', label:'🚀 처음 셋업 (요약)', build: buildStart },
      { id:'dep-install-teacher', label:'교사 PC 설치 (GitHub)', build: buildInstallTeacher },
      { id:'dep-install-student', label:'학생 PC 설치 (맞춤 패키지)', build: buildInstallStudent },
      { id:'dep-update', label:'업데이트', build: buildUpdate },
      { id:'dep-remove', label:'제거 / 로그 관리', build: buildRemove }
    ]},
    { id:'system', label:'⚙️ 시스템', pages:[
      { id:'sys-main', label:'관리 / 전원 / 단축키', build: buildSystem }
    ]}
  ];

  let first = true;
  sections.forEach(sec => {
    // 섹션 헤더 (논클릭, 그룹 시각 구분)
    const header = document.createElement('div');
    header.className = 'nav-section';
    const parts = sec.label.split(' ');
    const ico = parts[0];
    const txt = parts.slice(1).join(' ');
    header.innerHTML = '<span class="sec-ico">' + ico + '</span><span>' + txt + '</span>';
    nav.appendChild(header);

    sec.pages.forEach((pg) => {
      const a = document.createElement('div');
      a.className = 'nav-item' + (first ? ' active' : '');
      a.dataset.p = pg.id;
      a.innerHTML = pg.label;
      a.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        a.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const el = document.getElementById('page-' + pg.id);
        if (el) { el.classList.add('active'); document.getElementById('content').scrollTop = 0; }
      });
      nav.appendChild(a);

      const div = document.createElement('div');
      div.className = 'page' + (first ? ' active' : '');
      div.id = 'page-' + pg.id;
      pg.build(div);
      pages.appendChild(div);

      first = false;
    });
  });
}

function buildStreamMain(div) {
  let streaming = false, paused = false, mode = 'webp';
  const pg = div;

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">화면 전송</div>

          <div class="is-radio"><label><input type="radio" name="st-mode" value="h264" ${mode==='h264'?'checked':''} ${streaming?'disabled':''}> H.264 (영상·시연용)</label></div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-row" style="padding-top:6px">
          ${streaming
            ? '<div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 10%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="stStop()">⏹ ' + (mode==='h264'?'H.264 ':'') + '종료 <span style="font-size:8px;opacity:.6">F6</span></div>'

          ${streaming && mode==='webp'
            ? (paused
              ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="stResume()">▶ 재개 <span style="font-size:8px;opacity:.6">F7</span></div>'

      '<div class="card"><h3>🟣 H.264 모드</h3><p>영상·애니메이션 시연에 적합. 더 부드러움. <a href="#" class="detail-link" onclick="goToPage(\'st-mode\');return false;">→ 자세히</a></p></div>' +
      '<div class="card"><h3>🎯 선택 전송</h3><p>특정 학생들만 골라서 전송합니다. 사이드바의 <b>선택 전송</b> 체크박스를 켠 뒤 우측 패널에서 PC를 선택. 비선택 학생의 뷰어 창은 그대로 유지(끄지 않음).</p></div>' +
      '<div class="card"><h3>🖥 모니터 선택</h3><p>듀얼 모니터 환경이면 <b>설정 메뉴 → 모니터</b> 항목에서 캡처할 화면을 지정합니다. 한 번 정해두면 다음 실행에도 유지.</p></div>' +
      '<div class="card"><h3>🔒 뷰어 강제 고정</h3><p>학생이 뷰어 창 크기를 임의로 못 바꾸게 30~80% 사이로 고정. <a href="#" class="detail-link" onclick="goToPage(\'st-lock\');return false;">→ 자세히</a></p></div>' +
      '</div>' +
      '<div class="tip-box"><b>화질 설정</b> — <b>설정 메뉴 → 화면 전송 품질</b>에서 FPS, 해상도 비율, WebP/H.264 품질을 각각 조절할 수 있습니다.</div>' +
      '<div class="tip-box"><b>자동 녹화</b> — 설정에서 "전송 시작 시 녹화 자동 시작"을 켜 두면 별도 조작 없이 수업 녹화가 함께 시작됩니다.</div></div>');

    // Bind radio
    pg.querySelectorAll('input[name="st-mode"]').forEach(r => r.addEventListener('change', function() {
      if (!streaming) mode = this.value;
    }));
    pg.querySelector('#st-sel')?.addEventListener('change', function() {
      toast(this.checked ? '🎯 선택 전송 모드 (특정 학생만 전송)' : '📡 전체 전송 모드', 'info');
    });
  }

  // Expose functions globally for onclick
  window.stStart = function() { streaming = true; paused = false; render(); toast('📡 전송 시작됨', 'success'); };
  window.stStop = function() { streaming = false; paused = false; render(); toast('⏹ 전송 종료됨', 'info'); };
  window.stPause = function() { paused = true; render(); toast('⏸ 일시정지됨', 'warning'); };
  window.stResume = function() { paused = false; render(); toast('▶ 재개됨', 'success'); };

  render();
}

// 2. STREAM MODE — WebP / H.264 comparison
// ═══════════════════════════════════════════════
function buildStreamMode(div) {
  let mode = 'webp', streaming = false;
  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">전송 방식</div>
        <div class="is-row" style="padding:8px 10px">
          <div class="is-radio"><label><input type="radio" name="sm-mode" value="webp" ${mode==='webp'?'checked':''} ${streaming?'disabled':''}> WebP (PPT·문서용)</label></div>
          <div class="is-radio"><label><input type="radio" name="sm-mode" value="h264" ${mode==='h264'?'checked':''} ${streaming?'disabled':''}> H.264 (영상·시연용)</label></div>
        </div>
        <div class="is-row" style="padding-bottom:8px;gap:6px">
          ${streaming
            ? '<div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 10%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="smStop()">⏹ 전송 종료</div>'
            : '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 12%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="smStart()">▶ 전송 시작</div>'}
        </div>
        <div style="font-size:10px;color:rgb(var(--c-txt3));padding:0 10px 6px;line-height:1.6">
          ${mode === 'webp'
            ? '✓ CPU 부하 낮음<br>✓ 안정적<br>✓ <b>일시정지 가능</b>'
            : '✓ 고프레임 부드러움<br>✓ 영상/시연 최적<br>⚠ 일시정지 불가'}
        </div>
      </div>
      <div class="is-sec">
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:4px 10px 6px;line-height:1.5">${streaming ? '🔒 전송 중에는 방식 변경 불가. 먼저 ⏹ 종료하세요.' : '⚠ 전송 중에는 방식 변경 불가. 종료 후 다시 시작해야 함.'}</div>
      </div>
    `);
    const stu = !streaming ? stuDesktop('empty') : stuDesktop(mode === 'webp' ? 'streaming-webp' : 'streaming-h264');
    div.innerHTML = '<h2>🔄 WebP / H.264 모드</h2><div class="sub">전송 방식 비교</div>';
    div.innerHTML += iSection('방식을 바꿔보면 학생 화면이 어떻게 표시되는지 확인할 수 있습니다', sidebar, iStu(stu),
      '두 방식은 <b>화면을 어떻게 인코딩해서 학생에게 보낼지</b>의 차이입니다. 수업 내용에 맞춰 선택하세요.<br><b>🟠 WebP (기본)</b> — 화면을 이미지로 연속 캡처. PPT·문서·코드 등 정지 화면 위주에 적합. <b>일시정지/재개 지원</b>.<br><b>🟣 H.264</b> — 영상 인코딩. 영상 재생·애니메이션·드로잉 시연처럼 움직임 많은 화면에 적합. 일시정지는 미지원.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🤔 언제 어느 걸 쓸까?</h3><p><b>평소 수업(PPT·문서·웹 강의)</b> → 🟠 WebP. CPU 여유 있고 안정적.<br><b>유튜브 영상·태블릿 드로잉 시연·게임 화면</b> → 🟣 H.264. 움직임이 끊겨 보이지 않음.</p></div>' +
      '<div class="card"><h3>⏸ 일시정지 차이</h3><p>WebP만 지원합니다. PPT 도중 잠깐 다른 화면 띄우고 싶을 때 유용. H.264는 영상 스트림이라 일시정지 개념이 없습니다 — 종료/재시작만 가능.</p></div>' +
      '<div class="card"><h3>🔄 전송 중 변경 불가</h3><p>방식을 바꾸려면 먼저 <b>⏹ 종료</b>하고, 라디오 버튼 선택을 바꾼 뒤 다시 <b>▶ 전송 시작</b>. 사이드바의 라디오는 전송 중에는 비활성화됩니다.</p></div>' +
      '<div class="card"><h3>📊 기본 설정값</h3><p>🟠 WebP: <b>10fps · 1280×720</b> · 적당한 품질. 🟣 H.264: <b>24fps · 1280×720</b> · 저지연 옵션 적용됨. 설정 메뉴에서 변경 가능.</p></div>' +
      '<div class="card"><h3>🛠 별도 설치 불필요</h3><p>두 방식 모두 교사 앱 안에 내장된 인코더로 동작합니다(ffmpeg 등 별도 프로그램 설치 안 해도 됨).</p></div>' +
      '<div class="card"><h3>🎯 선택 전송</h3><p>두 방식 모두 <b>특정 학생에게만 전송</b> 가능. 전 학급에 PPT를 보내면서 일부 학생에겐 영상 시연을 할 순 없습니다(한 시점에 한 방식).</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>잘 모르겠으면 WebP</b> — 대부분의 수업은 WebP로 충분합니다. 학생 PC 부하도 적고, 일시정지·재개가 편합니다. 영상 시연이 끊겨 보일 때만 H.264로 바꿔보세요.</div></div>';
    div.querySelectorAll('input[name="sm-mode"]').forEach(r => r.addEventListener('change', function() {
      if (streaming) return;  // 전송 중에는 모드 변경 무시
      mode = this.value; render();
    }));
  }
  window.smStart = function() { streaming = true; render(); toast('📡 ' + (mode === 'webp' ? 'WebP' : 'H.264') + ' 모드로 전송 시작', 'success'); };
  window.smStop  = function() { streaming = false; render(); toast('⏹ 전송 종료', 'info'); };
  render();
}

// 3. VIEWER LOCK
// ═══════════════════════════════════════════════
function buildViewerLock(div) {
  let enabled = false, size = 50;
  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">뷰어 강제</div>
        <div class="is-row" style="padding:6px 10px;gap:8px">
          <div class="is-chk" onclick="document.getElementById('vl-chk').click()">
            <input type="checkbox" id="vl-chk" ${enabled?'checked':''}>
            강제
          </div>
          <span style="font-size:10px;color:rgb(var(--c-txt2))">크기</span>
          <select class="is-sel" id="vl-sel">
            <option ${size===30?'selected':''}>30%</option>
            <option ${size===40?'selected':''}>40%</option>
            <option ${size===50?'selected':''}>50%</option>
            <option ${size===60?'selected':''}>60%</option>
            <option ${size===70?'selected':''}>70%</option>
            <option ${size===80?'selected':''}>80%</option>
          </select>
        </div>
        <div style="font-size:10px;color:rgb(var(--c-txt3));padding:0 10px 6px">
          ${enabled ? '🔒 강제 중 · ' + size + '% 고정' : '🔓 해제됨 · 학생 자유 조절'}
        </div>
      </div>
    `);
    // 강제 ON이면 그 크기로 고정, OFF면 학생 기본 크기(50%)로 표시
    const stu = stuDesktop('streaming-webp', { size: enabled ? size : 50, locked: enabled });
    div.innerHTML = '<h2>🔒 뷰어 강제 (크기 고정)</h2><div class="sub">뷰어 강제 고정</div>';
    div.innerHTML += iSection('체크와 크기를 바꾸면 학생 PC의 뷰어 창 크기가 그대로 바뀝니다', sidebar, iStu(stu),
      '<b>왜 이 기능이 있나?</b> 학생이 자기 작업하느라 뷰어를 너무 작게 줄여 안 보거나, 반대로 너무 크게 키워 화면을 가리는 일을 막기 위해서. 체크박스를 켜면 모든 학생의 뷰어가 지정 크기로 <b>강제 고정</b>되고 학생은 임의로 못 바꿉니다. 해제하면 <b>기본값(50% · 투명도 100%)으로 복원</b>되며, 그 뒤로는 학생이 다시 자유롭게 조절할 수 있습니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🤔 언제 쓰나?</h3><p>학생이 뷰어 창을 줄여서 수업 화면을 안 보는 경우(딴짓), 또는 너무 키워서 자기 작업이 안 보이는 경우. 잠시 강제 켜서 통제하다가 해제하는 식으로 사용합니다.</p></div>' +
      '<div class="card"><h3>📏 30~80% 범위</h3><p>학생 PC 해상도 기준 가로 폭의 비율입니다. <b>보통 50%</b>면 적당하고, PPT를 크게 보여주려면 70~80%, 학생 작업이 많은 시간엔 30~40%로 작게.</p></div>' +
      '<div class="card"><h3>🔓 해제 시 기본값으로</h3><p>체크를 끄면 학생 뷰어가 <b>기본값(50% · 투명도 100%)</b>으로 돌아갑니다. 학생이 강제 전에 쓰던 크기를 기억하지는 않습니다. 해제 직후 학생이 다시 자기 원하는 크기로 끌어서 조절하면 됩니다.</p></div>' +
      '<div class="card"><h3>🪟 위치는 강제 X</h3><p>크기만 고정합니다. 학생이 뷰어 창을 우하단·좌상단 등으로 끌어 옮기는 건 여전히 가능. 위치까지 통제할 필요는 거의 없습니다.</p></div>' +
      '<div class="card"><h3>🎯 전 학생 일괄 적용</h3><p>강제 설정은 <b>접속한 모든 학생</b>에게 동시에 적용됩니다. 특정 학생만 강제하는 기능은 없습니다.</p></div>' +
      '<div class="card"><h3>💡 강제 중에도 투명도 제한</h3><p>강제 켜진 동안엔 뷰어 투명도가 100%로 고정됩니다(흐릿하게 만들지 못함). 해제하면 학생이 다시 투명도를 조절할 수 있습니다.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>꿀팁</b> — 영상 시연하거나 중요한 PPT 페이지 설명할 때만 잠깐 80%로 강제해서 모든 학생이 크게 보게 한 뒤, 학생 실습 시간엔 해제해서 학생 자유에 맡기는 식으로 쓰면 좋습니다.</div></div>';
    const chk = div.querySelector('#vl-chk');
    const sel = div.querySelector('#vl-sel');
    if (chk) chk.addEventListener('change', function() {
      enabled = this.checked;
      render();
      toast(enabled
        ? '🔒 뷰어 강제 켜짐 — 모든 학생 ' + size + '% 고정'
        : '🔓 뷰어 강제 해제 — 기본값 50%·투명도 100%로 복원', 'info');
    });
    if (sel) sel.addEventListener('change', function() {
      size = parseInt(this.value);
      if (enabled) { render(); toast('📐 강제 크기 ' + size + '%로 변경', 'info'); }
    });
  }
  render();
}

          '<div style="color:#cbd5e1;font-weight:600;margin-bottom:4px">📂 저장 위치 (기본값)</div>' +
          '<code style="display:block;color:#fbbf24;font-size:9px">C:\\Screen_Share\\</code>' +
          '<div style="margin-top:5px;color:#94a3b8">└ <code style="color:#a78bfa">teacher_rec\\</code> <span style="color:#64748b">(녹화 중 mkv 청크)</span></div>' +

        '</div>' +

        '<div style="font-size:10px;color:#94a3b8">누적 ' + (elapsed * 1.2).toFixed(0) + 'MB</div>' +

    } else {
      recBody = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:16px;gap:4px">' +
        '<div style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:12px;color:#fca5a5">' +

      '</div>';
    }
    const stu = '<div class="ps-title"><span>🎬 교사 PC · 녹화 상태</span></div><div style="background:#0f172a;height:240px">' + recBody + '</div>';

    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>📂 저장 위치</h3><p><b>녹화 중:</b> <code>C:\\Screen_Share\\teacher_rec\\</code> (mkv 청크)<br><b>완료 후:</b> <code>C:\\Screen_Share\\teacher-mp4\\YYYY-MM-DD\\session_*.mp4</code><br>기본 폴더는 설정 메뉴에서 변경 가능.</p></div>' +
      '<div class="card"><h3>🎤 마이크 / 시스템 사운드</h3><p>마이크 ON/OFF, 음량 ×1~×5, 시스템 오디오와 혼합 녹음 지원. <a href="#" class="detail-link" onclick="goToPage(\'rec-audio\');return false;">→ 자세히</a></p></div>' +
      '<div class="card"><h3>🤖 자동 녹화</h3><p>설정 메뉴에서 <b>"전송 시작 시 녹화 자동 시작"</b>을 켜두면 <kbd>F6</kbd>(전송 시작)만 눌러도 녹화가 함께 시작됩니다. 별도 조작 불필요.</p></div>' +
      '<div class="card"><h3>💾 파일 형식</h3><p>녹화 중에는 mkv 청크로 분할 저장 → 종료 시 ffmpeg로 한 개의 <b>mp4</b>로 자동 병합. 원본 mkv 청크는 그대로 남아 있어 백업/복구용으로도 활용 가능.</p></div>' +
      '<div class="card"><h3>🔇 학생은 녹화 사실 모름</h3><p>녹화한다는 표시가 학생 화면에 뜨지 않습니다. 마이크 음성도 <b>녹화 파일에만</b> 들어가고 학생 PC에선 들리지 않습니다(녹화와 화면 전송은 분리된 별도 기능).</p></div>' +
      '<div class="card"><h3>📊 예상 용량 <span style="font-size:9px;color:rgb(var(--c-txt3));font-weight:400">참고</span></h3><p>기본 화질 기준 분당 약 <b>40~85MB</b>(마이크 ON 여부·화면 변화량에 따라 변동). 1시간 수업 = 약 2~5GB.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>일시정지의 진짜 의미</b> — mkv 청크는 계속 같은 세션 아래 모이고, 재개 후 종료해도 <b>한 mp4 파일</b>로 합쳐집니다. 즉 일시정지는 "잠깐 안 찍히는 구간"을 만드는 기능이지 파일을 끊는 기능이 아닙니다.</div></div>';
    div.querySelector('#rec-auto')?.addEventListener('change', function() { autoRec = this.checked; toast(autoRec ? '🤖 전송 시 자동 녹화 켜짐' : '🤖 자동 녹화 꺼짐', 'info'); });
  }

  function formatTime(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return m + ':' + sec;
  }

  window.recStart = function() { recording = true; paused = false; elapsed = 0; clearInterval(timer); timer = setInterval(() => { if (!paused) elapsed++; render(); }, 1000); render(); toast('⏺ 녹화 시작됨', 'success'); };
  window.recStop = function() { recording = false; clearInterval(timer); render(); toast('⏹ 녹화 종료됨 · MP4 병합 중', 'info'); };
  window.recPause = function() { paused = true; render(); toast('⏸ 녹화 일시정지', 'warning'); };
  window.recResume = function() { paused = false; render(); toast('▶ 녹화 재개', 'success'); };
  render();
}

        ${micOn ? '<div class="is-row" style="gap:3px"><span style="font-size:9px;color:rgb(var(--c-txt3))">음량</span>' + ['×1','×1.5','×2','×3','×5'].map(g => '<div class="is-btn sm ' + (gain===g?'active':'') + '" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ' + (gain===g?'12':'4') + '%,transparent);color:rgb(var(--c-blue))" onclick="setGain(\'' + g + '\')">' + g + '</div>').join('') + '</div>' : ''}

// ═══════════════════════════════════════════════
function buildSeatLayout(div) {
  // 데모 프리셋 3개
  const presets = {
    '1실 25석': { rows: 5, cols: 5, front: 'top',    pcs: ['PC-01','PC-02','PC-03','PC-04','PC-05','PC-06','PC-07','PC-08','PC-09','PC-10','PC-11','PC-12','PC-13','PC-14','PC-15','PC-16','PC-17','PC-18','PC-19','PC-20','PC-21','PC-22','PC-23','PC-24','PC-25'] },
    '2실 30석': { rows: 6, cols: 5, front: 'top',    pcs: ['PC-A1','PC-A2','PC-A3','PC-A4','PC-A5','PC-B1','PC-B2','PC-B3','PC-B4','PC-B5','PC-C1','PC-C2','PC-C3','PC-C4','PC-C5','PC-D1','PC-D2','PC-D3','PC-D4','PC-D5','PC-E1','PC-E2','PC-E3','PC-E4','PC-E5','PC-F1','PC-F2','PC-F3','PC-F4','PC-F5'] },
    '랩실 18석': { rows: 3, cols: 6, front: 'bottom', pcs: ['L-01','L-02','L-03','L-04','L-05','L-06','L-07','L-08','L-09','L-10','L-11','L-12','L-13','L-14','L-15','L-16','L-17','L-18'] },
  };
  let activeName = '1실 25석';
  let viewMode = 'layout'; // 'layout' 또는 'edit' (편집 모달 모양)

  function render() {
    const p = presets[activeName];

    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">💺 좌석 프리셋</div>
        ${Object.keys(presets).map(name => {
          const pr = presets[name];
          const active = name === activeName;
          return '<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid rgb(var(--c-border));cursor:pointer;' + (active ? 'background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent)' : '') + '" onclick="seatSetActive(\'' + name + '\')">' +
            '<span style="font-size:13px">' + (active ? '🟠' : '⚪') + '</span>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:11px;font-weight:600;color:' + (active ? 'rgb(var(--c-accent))' : 'rgb(var(--c-txt))') + '">' + name + '</div>' +
              '<div style="font-size:9px;color:rgb(var(--c-txt3))">' + pr.rows + '×' + pr.cols + ' · ' + pr.pcs.length + '대</div>' +
            '</div>' +
          '</div>';
        }).join('')}
        <div class="is-row" style="padding:5px 10px"><div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent);color:rgb(var(--c-accent))" onclick="toast('➕ 새 프리셋 생성 모달','info')">➕ 새 프리셋</div></div>
      </div>
      <div class="is-sec">
        <div class="is-label">📐 행 × 열</div>
        <div class="is-row" style="gap:6px;padding-bottom:4px">
          <input type="number" value="${p.rows}" min="1" max="10" class="is-inp" style="width:50px;text-align:center;padding:3px 6px" disabled>
          <span style="font-size:10px;color:rgb(var(--c-txt3));align-self:center">×</span>
          <input type="number" value="${p.cols}" min="1" max="10" class="is-inp" style="width:50px;text-align:center;padding:3px 6px" disabled>
        </div>
        <div class="is-label">📋 칠판 위치</div>
        <div class="is-row" style="gap:3px;padding-bottom:4px">
          ${['top','bottom','left','right'].map(pos => {
            const labels = {top:'⬆ 위', bottom:'⬇ 아래', left:'⬅ 왼쪽', right:'➡ 오른쪽'};
            const active = pos === p.front;
            return '<div class="is-btn sm ' + (active ? 'active' : '') + '" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ' + (active ? '14' : '4') + '%,transparent);color:rgb(var(--c-blue))" onclick="toast(\'편집 모달에서 변경 가능: ' + labels[pos] + '\',\'info\')">' + labels[pos] + '</div>';
          }).join('')}
        </div>
      </div>
      <div class="is-sec">
        <div class="is-label" style="padding-bottom:2px">🗃 CSV</div>
        <div class="is-row" style="padding-bottom:6px;gap:4px">
          <div class="is-btn sm" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1" onclick="toast('📥 ' + '${activeName}' + '_이름.csv 다운로드','success')">📥 내보내기</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) 10%,transparent);color:rgb(var(--c-purple));flex:1" onclick="toast('📤 CSV 가져오기 — 학번/이름 양식','info')">📤 가져오기</div>
        </div>
      </div>
    `);

    // 우측 패널: 좌석 그리드 + 칠판
    const cellSize = Math.min(28, Math.floor(180 / Math.max(p.rows, p.cols)));
    const cellGap = 4;
    const blackboard = '<div style="background:linear-gradient(180deg,#1e293b,#0f172a);border:1px solid #475569;color:#86efac;font-size:10px;font-weight:700;text-align:center;padding:5px;border-radius:3px;letter-spacing:1px">📋 칠판</div>';

    const seats = [];
    let pcIdx = 0;
    for (let r = 0; r < p.rows; r++) {
      const row = [];
      for (let c = 0; c < p.cols; c++) {
        const pcName = p.pcs[pcIdx++];
        if (pcName) {
          row.push('<div style="width:' + cellSize + 'px;height:' + Math.round(cellSize*0.75) + 'px;background:#1e293b;border:1px solid #475569;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#94a3b8;font-weight:600">' + pcName + '</div>');
        } else {
          row.push('<div style="width:' + cellSize + 'px;height:' + Math.round(cellSize*0.75) + 'px;border:1px dashed #334155;border-radius:3px"></div>');
        }
      }
      seats.push('<div style="display:flex;gap:' + cellGap + 'px">' + row.join('') + '</div>');
    }
    const seatGrid = '<div style="display:flex;flex-direction:column;gap:' + cellGap + 'px">' + seats.join('') + '</div>';

    let layout;
    if (p.front === 'top') {
      layout = blackboard + '<div style="margin-top:10px">' + seatGrid + '</div>';
    } else if (p.front === 'bottom') {
      layout = seatGrid + '<div style="margin-top:10px">' + blackboard + '</div>';
    } else if (p.front === 'left') {
      layout = '<div style="display:flex;gap:10px;align-items:center"><div style="writing-mode:vertical-rl;transform:rotate(180deg)">' + blackboard + '</div>' + seatGrid + '</div>';
    } else {
      layout = '<div style="display:flex;gap:10px;align-items:center">' + seatGrid + '<div style="writing-mode:vertical-rl">' + blackboard + '</div></div>';
    }

    const stu = '<div class="ps-title"><span>🖥 교사 앱 우측 패널 · 좌석 배치 모드</span></div>' +
      '<div style="background:#0f172a;height:280px;overflow:hidden;display:flex;flex-direction:column">' +
        '<div style="padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:9px;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)">' +
          '<span style="color:#64748b">썸네일</span>' +
          '<span style="background:rgba(34,197,94,.15);color:#86efac;padding:1px 6px;border-radius:3px;font-weight:700">좌석 ✓</span>' +
          '<span style="margin-left:auto">' + activeName + ' · ' + p.pcs.length + '대</span>' +
        '</div>' +
        '<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:14px">' + layout + '</div>' +
        '<div style="padding:5px 10px;font-size:9px;color:#64748b;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)">실제 좌석 위치에 학생 PC 썸네일이 동일하게 표시됨</div>' +
      '</div>';

    div.innerHTML = '<h2>💺 실습실 배치</h2><div class="sub">교실 자리 그대로 학생 화면 보기</div>';
    div.innerHTML += iSection('프리셋을 바꿔보면 우측 좌석 배치도 따라 바뀝니다', sidebar, iStu(stu),
      '<b>좌석 배치 모드</b>는 학생 PC를 자동 정렬이 아니라 <b>실제 교실 자리 그대로</b> 화면에 배치합니다. 누가 어디 앉았는지 한눈에 보여서 화면 살피기·도와주기·메시지 받기가 직관적이 됩니다. <b>여러 실습실을 프리셋으로 저장</b>해 두면 수업 시작할 때 프리셋만 선택하면 끝.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>💺 자동 정렬과 뭐가 다른가?</h3><p>자동 정렬은 접속 순서·이름 순으로 그리드에 쭉 놓는 방식. 좌석 배치 모드는 <b>실제 책상 위치에 PC를 배치</b>해서 학생이 앉은 자리와 화면 위치가 1:1로 맞습니다.</p></div>' +
      '<div class="card"><h3>📋 다중 프리셋</h3><p>실습실마다 다른 좌석 배치를 저장하고 이름 붙여 관리. 한 교사 PC로 여러 실(1실/2실/랩실 등)을 운영할 때 유용. 프리셋 선택 한 번으로 그날 수업 배치 완료.</p></div>' +
      '<div class="card"><h3>📐 행 × 열 + 칠판 위치</h3><p>편집 모달에서 <b>행/열 수</b>와 <b>칠판 위치</b>(위/아래/좌/우)를 지정합니다. 칠판 위치 기준으로 학생 시점이 그려지므로 정확히 맞춰야 좌석 인식이 자연스러움.</p></div>' +
      '<div class="card"><h3>🪑 PC 배치 (드래그)</h3><p>편집 모달 우측의 <b>미배치 PC 목록</b>에서 좌석으로 드래그해 자리를 지정. 좌석에 놓인 PC를 미배치로 다시 끌어내려면 우측으로 드래그.</p></div>' +
      '<div class="card"><h3>📥 CSV 내보내기</h3><p><b>현재 배치 + 학생 이름</b>을 csv로 저장. 파일명 예: <code>1실 25석_이름.csv</code>. 학교 양식 제출, 출석부 작성, 백업에 활용.</p></div>' +
      '<div class="card"><h3>📤 CSV 가져오기</h3><p>학번·이름 양식 csv를 불러와 한 번에 자리 배정. 학기 초 명단 그대로 좌석 만들기에 가장 빠른 방법. 기존 좌석 위에 덮어쓰기 안 함 — 미배치 PC 옆에 이름이 매칭됨.</p></div>' +
      '<div class="card"><h3>🎯 모니터링 연동</h3><p>좌석 배치 모드를 켜면 <b>학생 화면 모니터링 페이지의 썸네일</b>이 실제 자리 위치에 그대로 표시됩니다. 더블클릭/우클릭/메시지 배지 등 모든 동작은 똑같이 작동.</p></div>' +
      '<div class="card"><h3>🔄 모드 전환</h3><p>우측 패널 상단의 <b>썸네일 / 좌석</b> 토글로 언제든 전환. 자동 정렬이 편한 시간엔 썸네일, 자리 파악이 중요한 시간엔 좌석 모드.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>학기 초 셋업 흐름</b> — 학교 명단 csv 준비 → 📤 가져오기 → 행/열·칠판 위치 맞추기 → 미배치 PC를 좌석으로 드래그 → 프리셋 이름 짓고 저장. 다음 수업부턴 프리셋 선택만으로 끝.</div></div>';
  }

  window.seatSetActive = function(name) { activeName = name; render(); toast('💺 ' + name + ' 프리셋 적용', 'success'); };
  render();
}

// ═══════════════════════════════════════════════
// 6-C. PROJECTOR — 프로젝터 뷰
// ═══════════════════════════════════════════════
function buildProjector(div) {
  let split = 4;             // 2 | 4 | 6 | 9
  let autoOn = false;
  let interval = 5;          // 초
  let page = 0;
  let timer = null;
  const pcs = ['PC-01','PC-02','PC-03','PC-04','PC-05','PC-06','PC-07','PC-08','PC-09','PC-10','PC-11','PC-12','PC-13','PC-14','PC-15','PC-16','PC-17','PC-18','PC-19','PC-20'];

  function totalPages() { return Math.max(1, Math.ceil(pcs.length / split)); }

  function render() {
    if (page >= totalPages()) page = 0;

    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">📺 프로젝터 뷰</div>
        <div style="font-size:10px;color:rgb(var(--c-txt2));padding:2px 10px 4px">학생 화면을 분할 그리드로 풀스크린 표시. 보조 모니터(프로젝터)에 띄워 모두에게 같은 화면을 보여줍니다.</div>
      </div>
      <div class="is-sec">
        <div class="is-label">🔲 분할</div>
        <div class="is-row" style="gap:3px">
          ${[2,4,6,9].map(s => '<div class="is-btn sm ' + (split===s?'active':'') + '" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ' + (split===s?'14':'4') + '%,transparent);color:rgb(var(--c-blue));flex:1;text-align:center" onclick="projSplit(' + s + ')">' + s + '분할</div>').join('')}
        </div>
      </div>
      <div class="is-sec">
        <div class="is-label">📄 페이지 ${page+1} / ${totalPages()}</div>
        <div class="is-row" style="gap:4px;padding-bottom:4px">
          <div class="is-btn sm" style="--b:rgb(var(--c-txt2));background:color-mix(in srgb,rgb(var(--c-txt2)) 8%,transparent);color:rgb(var(--c-txt2));flex:1;text-align:center" onclick="projPrev()">◀ 이전</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-txt2));background:color-mix(in srgb,rgb(var(--c-txt2)) 8%,transparent);color:rgb(var(--c-txt2));flex:1;text-align:center" onclick="projNext()">다음 ▶</div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-label">🔄 자동 전환</div>
        <div class="is-row" style="padding-bottom:4px">
          <div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) ${autoOn?'14':'6'}%,transparent);color:rgb(var(--c-accent))" onclick="projAuto()">${autoOn ? '⏹ 자동 중지' : '▶ 자동 시작'}</div>
        </div>
        <div class="is-row" style="gap:3px;padding-bottom:4px">
          <span style="font-size:10px;color:rgb(var(--c-txt3));align-self:center">간격</span>
          ${[3,5,10,15].map(s => '<div class="is-btn sm ' + (interval===s?'active':'') + '" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) ' + (interval===s?'14':'4') + '%,transparent);color:rgb(var(--c-purple))" onclick="projInterval(' + s + ')">' + s + 's</div>').join('')}
        </div>
        ${totalPages() <= 1 ? '<div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 4px">⚠ 페이지가 1장이라 자동 전환 불필요</div>' : ''}
      </div>
    `);

    // 프로젝터 화면 시뮬레이션 — split에 따라 그리드 행/열 계산
    const cols = split === 2 ? 2 : split === 4 ? 2 : split === 6 ? 3 : 3;
    const rows = split === 2 ? 1 : split === 4 ? 2 : split === 6 ? 2 : 3;
    const start = page * split;
    const tiles = [];
    for (let i = 0; i < split; i++) {
      const idx = start + i;
      const pc = pcs[idx];
      if (pc) {
        tiles.push('<div style="background:linear-gradient(135deg,#1e3a5f,#0f1e30);border:1px solid #475569;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#94a3b8;position:relative;overflow:hidden">' +
          '<div style="font-size:22px;color:#60a5fa">📺</div>' +
          '<div style="font-size:9px;font-weight:700;color:#cbd5e1;margin-top:2px">' + pc + '</div>' +
          '<div style="position:absolute;top:3px;right:5px;width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 4px rgba(34,197,94,.6)"></div>' +
        '</div>');
      } else {
        tiles.push('<div style="background:#0f172a;border:1px dashed #334155;border-radius:4px"></div>');
      }
    }

    const stu = '<div class="ps-title"><span>📽 프로젝터 화면 (보조 모니터)</span></div>' +
      '<div style="background:#000;height:260px;display:flex;flex-direction:column;padding:8px">' +
        '<div style="display:flex;align-items:center;gap:6px;font-size:9px;color:#86efac;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.08)">' +
          '<span style="background:rgba(34,197,94,.15);padding:1px 6px;border-radius:3px;font-weight:700">' + split + '분할</span>' +
          '<span style="color:#94a3b8">' + Math.min(start+1, pcs.length) + '~' + Math.min(start+split, pcs.length) + ' / 총 ' + pcs.length + '대</span>' +
          (autoOn ? '<span style="margin-left:auto;color:#fbbf24;font-weight:700">🔄 자동 ' + interval + 's</span>' : '<span style="margin-left:auto;color:#64748b">페이지 ' + (page+1) + '/' + totalPages() + '</span>') +
        '</div>' +
        '<div style="flex:1;display:grid;gap:6px;padding-top:6px;grid-template-columns:repeat(' + cols + ',1fr);grid-template-rows:repeat(' + rows + ',1fr)">' + tiles.join('') + '</div>' +
      '</div>';

    div.innerHTML = '<h2>📺 프로젝터 뷰</h2><div class="sub">학생 화면을 분할로 모두에게 보여주기</div>';
    div.innerHTML += iSection('분할·페이지·자동 전환을 바꿔보면 프로젝터 화면이 실시간으로 변합니다', sidebar, iStu(stu),
      '<b>📺 프로젝터 뷰</b>는 학생 화면을 <b>2/4/6/9분할 그리드</b>로 풀스크린 표시합니다. 보조 모니터(프로젝터/외부 모니터)에 띄워서 전 학생이 같은 분할 화면을 보게 할 수 있습니다. <b>발표·시연·자랑할 때</b>: 잘한 학생 화면을 모두가 볼 수 있게. <b>모니터링용</b>: 교사 PC 모니터를 가리지 않고 별도 화면으로 학생 진행 상황 한눈에. 학생이 많으면 <b>자동 페이지 전환</b>으로 돌아가며 표시.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🔲 4가지 분할 모드</h3><p><b>2분할</b> 큰 화면 자세히 / <b>4분할</b> 균형, 가장 자주 사용 / <b>6분할</b> 학생 많을 때 / <b>9분할</b> 한 화면에 최대. 분할이 커질수록 학생 화면이 작아지지만 한 번에 더 많이 보임.</p></div>' +
      '<div class="card"><h3>📄 페이지 자동 계산</h3><p>학생 수 ÷ 분할 = 페이지 수. 예: 20명 학생을 4분할로 보면 <b>5페이지</b>. ◀ 이전 / 다음 ▶ 버튼으로 수동 이동.</p></div>' +
      '<div class="card"><h3>🔄 자동 페이지 전환</h3><p>지정 간격(3s/5s/10s/15s)으로 페이지가 자동으로 넘어갑니다. 4분할 + 5초로 20명을 보면 약 25초마다 한 바퀴 돌음. 수업 진행하면서 학생 상황 살피기에 최적.</p></div>' +
      '<div class="card"><h3>🖥 보조 모니터 활용</h3><p>이상적으로는 교사 PC에 <b>외부 모니터/프로젝터</b>를 연결해 프로젝터 뷰를 그 화면에 띄움. 교사 본인은 메인 모니터에서 평소 작업, 학생들은 프로젝터로 보는 구조.</p></div>' +
      '<div class="card"><h3>🎯 발표·시연용</h3><p>잘한 학생 결과물을 발표시킬 때 2분할로 큰 화면. 작품 비교·평가에 활용. 중계와 다른 점: 중계는 학생 PC에 띄워주는 것, 프로젝터 뷰는 교사 측 보조 모니터에 띄우는 것.</p></div>' +
      '<div class="card"><h3>👀 모니터링과의 차이</h3><p>썸네일 모드는 교사 앱 우측 패널 안. 프로젝터 뷰는 <b>별도 풀스크린 창</b>으로 외부 모니터에 띄우는 용도. 시선이 분산되지 않고 강의 흐름 유지.</p></div>' +
      '<div class="card"><h3>🟢 접속 상태 표시</h3><p>각 분할 우상단의 작은 초록 점은 <b>접속 상태</b>를 보여줍니다. 학생 PC가 꺼지거나 끊기면 회색으로 변해 즉시 인지 가능.</p></div>' +
      '<div class="card"><h3>⌨ 풀스크린 토글</h3><p>프로젝터 창을 띄운 뒤 <kbd>F11</kbd>로 풀스크린 ON/OFF. 발표 시작 전에 풀스크린으로 만들고 시작.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>가장 흔한 사용 패턴</b> — 평소 메인 화면은 PPT, 보조 모니터에 프로젝터 뷰(4분할 + 자동 10s) → 강의하면서 곁눈으로 학생 상황 확인. 누가 집중 안 하는지 5분만에 다 보임.</div></div>';
  }

  window.projSplit = function(s) {
    split = s; page = 0; render();
    if (totalPages() <= 1 && autoOn) { autoOn = false; clearInterval(timer); }
  };
  window.projPrev = function() { page = (page - 1 + totalPages()) % totalPages(); render(); };
  window.projNext = function() { page = (page + 1) % totalPages(); render(); };
  window.projAuto = function() {
    if (totalPages() <= 1) { toast('⚠ 페이지가 1장이라 자동 전환 불필요', 'warning'); return; }
    autoOn = !autoOn;
    clearInterval(timer);
    if (autoOn) {
      timer = setInterval(() => { page = (page + 1) % totalPages(); render(); }, interval * 1000);
      toast('🔄 자동 전환 시작 (' + interval + '초 간격)', 'success');
    } else {
      toast('⏹ 자동 전환 중지', 'info');
    }
    render();
  };
  window.projInterval = function(s) {
    interval = s;
    if (autoOn) {
      clearInterval(timer);
      timer = setInterval(() => { page = (page + 1) % totalPages(); render(); }, interval * 1000);
    }
    render();
  };
  render();
}

// 7. MODE / LOCK
// ═══════════════════════════════════════════════
function buildModeLock(div) {
  let mode = 'free', locked = false;
  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">모드</div>
        <div class="is-row" style="padding-top:4px">
          <div class="is-btn ${mode==='free'?'active':''}" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) ${mode==='free'?'14':'6'}%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="setMode(\'free\')">🟢 자유</div>
          <div class="is-btn ${mode==='focus'?'active':''}" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) ${mode==='focus'?'14':'6'}%,transparent);color:rgb(var(--c-purple));flex:1;text-align:center" onclick="setMode(\'focus\')">🟣 집중</div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-title">잠금</div>
        <div class="is-row" style="padding:6px 10px">
          <div class="is-btn ${locked?'active':''}" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) ${locked?'14':'6'}%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="doLock()">${locked ? '🔒 잠김' : '🔒 전체 잠금'}</div>
          <div class="is-btn ${!locked?'active':''}" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) ${!locked?'14':'6'}%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="doUnlock()">🔓 전체 해제</div>
        </div>
      </div>
    `);
    let stu;
    if (locked) stu = stuLocked();
    else if (mode === 'focus') stu = stuFocus();
    else stu = stuFree();
    div.innerHTML = '<h2>🟢 모드 설정 / 🔒 전체 잠금</h2><div class="sub">수업 통제 — 모드 · 잠금</div>';
    div.innerHTML += iSection('모드와 잠금을 직접 제어해보세요', sidebar, iStu(stu),
      '<b>🟢 자유</b> — 학생이 모든 프로그램을 자유롭게 사용. <b>🟣 집중</b> — 허용한 프로그램만 실행 가능, 나머지는 자동 종료. <b>🔒 전체 잠금</b> — 학생 화면을 검게 가리고 안내 메시지 표시. 모든 모드는 전체 학생에게 동시 적용되며, 개별 PC 통제는 우측 패널에서 우클릭으로 가능합니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🟢 자유 모드</h3><p>기본 상태. 학생이 모든 프로그램을 자유롭게 사용. 실습/자습 시간에 적합.</p></div>' +
      '<div class="card"><h3>🟣 집중 모드</h3><p>설정에서 허용한 프로그램(예: 한글, 코딩 IDE)만 실행 가능. 다른 프로그램은 즉시 종료됩니다. 시험·평가 시간에 유용.</p></div>' +
      '<div class="card"><h3>🔒 전체 잠금</h3><p>학생 화면을 검게 잠그고 메시지를 함께 표시합니다 (예: "5분 휴식"). 주목 시킬 때 가장 강력한 방법. 해제하면 원래 상태로 복원.</p></div>' +
      '<div class="card"><h3>🛡 90초 자동 해제 안전망</h3><p>교사 앱이 비정상 종료되거나 LAN 끊김 등으로 <b>90초 이상 학생-교사 연결이 끊기면 잠금/집중이 자동 해제</b>됩니다. 교사 PC 다운 시 학생이 영구 잠긴 채 방치되는 사고를 막아줍니다.</p></div>' +
      '<div class="card"><h3>🎯 개별 PC 통제</h3><p>우측 패널에서 PC를 <b>우클릭</b> → 해당 PC만 잠금/집중/해제. 산만한 학생 한 명만 잠시 잠그는 등 세밀한 통제 가능.</p></div>' +
      '<div class="card"><h3>🔁 재접속 시 자동 동기</h3><p>학생 PC가 켜지거나 LAN 재연결될 때 교사가 켜둔 잠금/모드가 <b>자동으로 다시 적용</b>됩니다. 학생이 재부팅으로 잠금을 회피할 수 없음.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>실전 사용 흐름</b> — 평소엔 🟢 자유 → 강의 설명할 때 🔒 잠금으로 주목 → 실습 들어가면 🟢 자유 / 시험 시작 🟣 집중. 학생이 산만하면 우클릭으로 그 PC만 잠시 잠그기.</div></div>';
  }
  window.setMode = function(m) { mode = m; locked = false; render(); toast(m === 'free' ? '🟢 자유 모드 전환' : '🟣 집중 모드 전환', 'info'); };
  window.doLock = function() { locked = true; render(); toast('🔒 전체 잠금! 학생 화면이 잠겼습니다', 'error'); };
  window.doUnlock = function() { locked = false; render(); toast('🔓 전체 해제! 학생 화면이 복원되었습니다', 'success'); };
  render();
}

// ═══════════════════════════════════════════════
// 7-A. COMM — Notice
// ═══════════════════════════════════════════════
function buildCommNotice(div) {
  let noticeText = '5분 휴식', noticeDur = '5s', noticeSent = false;
  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-label">📢 공지 전송</div>
        <div class="is-row" style="gap:3px">
          ${['3s','5s','10s','상시'].map(t =>
            '<div class="is-btn sm" style="--b:rgb(var(--c-txt2));background:' + (noticeDur===t ? 'rgb(var(--c-accent));color:#fff' : 'color-mix(in srgb,rgb(var(--c-txt2)) 8%,transparent);color:rgb(var(--c-txt2))') + '" onclick="setNoticeDur(\'' + t + '\')">' + t + '</div>'
          ).join('')}
        </div>
        <div class="is-row"><textarea class="is-inp" rows="2" id="notice-text">${noticeText}</textarea></div>
        <div class="is-row"><div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent);color:rgb(var(--c-accent))" onclick="sendNotice()">📢 공지 전송</div></div>
      </div>

    let stu;
    if (noticeSent) {
      stu = '<div class="ps-title"><span>📢 공지</span></div>' +
        '<div style="position:relative;height:240px;background:linear-gradient(135deg,#1e3a5f 0%,#0f1e30 60%,#0a1422 100%);overflow:hidden">' +
          '<div style="background:linear-gradient(90deg,#1d4ed8,#2563eb);padding:8px 14px;font-size:13px;font-weight:600;color:#fff;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.3)">📢 ' + noticeText + '</div>' +
          '<div style="display:flex;flex-direction:column;gap:14px;position:absolute;top:60px;left:14px">' +
            '<div class="sd-icon"><span>📁</span>문서</div>' +
            '<div class="sd-icon"><span>🌐</span>Chrome</div>' +
            '<div class="sd-icon"><span>📝</span>한글</div>' +
          '</div>' +
          '<div style="position:absolute;bottom:0;left:0;right:0;height:24px;background:rgba(8,13,24,.92);display:flex;align-items:center;padding:0 8px;gap:6px;font-size:9px;color:#cbd5e1;border-top:1px solid rgba(255,255,255,.04)">' +
            '<span style="font-size:14px">⊞</span>' +
            '<span style="margin-left:auto;font-family:monospace;color:#94a3b8">14:32</span>' +
          '</div>' +
        '</div>';
    } else {
      stu = stuView('<span style="font-size:28px;margin-bottom:6px">📢</span><div style="color:#94a3b8;font-weight:600">공지를 입력하고 전송해보세요</div>');
    }
    div.innerHTML = '<h2>📢 공지 전송</h2><div class="sub">학생들에게 한 줄 공지 보내기</div>';
    div.innerHTML += iSection('공지 내용과 표시 시간을 선택하고 전송해보세요', sidebar, iStu(stu),
      '<b>📢 공지</b> — 학생 화면 <b>상단에 파란 배너</b>로 메시지가 표시됩니다. 표시 시간(<b>3s/5s/10s/상시</b>)을 선택할 수 있습니다. 상시 공지는 학생이 직접 닫을 때까지 유지됩니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>📢 공지 배너</h3><p>학생 화면 상단에 한 줄 메시지 배너로 표시. <b>3초/5초/10초/상시</b> 중 선택. 짧은 알림("5분 휴식")부터 상시("시험 중") 안내까지 활용.</p></div>' +
      '<div class="card"><h3>🔔 공지 도착 알림</h3><p>공지가 전송되면 학생 앱에서 <b>짧은 알림음</b>이 함께 울려 학생이 바로 인지할 수 있습니다.</p></div>' +
      '<div class="card"><h3>📱 플로팅 바와의 차이</h3><p>공지는 <b>일방적 전달</b>(교사→학생). 플로팅 바는 <b>양방향 소통</b>(학생→교사)이 목적. <a href="#" class="detail-link" onclick="goToPage(\'comm-float\');return false;">→ 플로팅 바 보기</a></p></div>' +
      '<div class="card"><h3>🛡 상시 공지 닫기</h3><p>상시로 설정된 공지는 학생이 우측 <b>✕ 버튼</b>을 눌러 직접 닫을 수 있습니다. 다시 공지를 보내면 기존 공지는 자동 교체.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>운영 팁</b> — 짧은 타이머 공지는 수업 전환 알림("5분 후 종료"), 상시 공지는 시험·평가 중 규칙 안내("계산기 사용 가능")에 활용하세요.</div></div>';
    div.querySelector('#notice-text')?.addEventListener('input', function() { noticeText = this.value; noticeSent = false; });
  }
  window.setNoticeDur = function(d) { noticeDur = d; render(); toast('⏱ 표시 시간: ' + d, 'info'); };
  window.sendNotice = function() { noticeSent = true; render(); toast('📢 "' + noticeText + '" 공지 전송됨', 'success'); };
  render();
}

// ═══════════════════════════════════════════════
// 7-B. COMM — Floating Bar
// ═══════════════════════════════════════════════
function buildCommFloat(div) {
  let floatOn = true;
  let btnState = {msg:true, done:true, help:false, sos:false};
  const btnIcons = { msg:'💬', done:'✅', help:'✋', sos:'🆘' };
  const btnLabels = { msg:'메시지', done:'완료', help:'도움', sos:'이상' };

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-label">📱 플로팅 바</div>
        <div class="is-row"><div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) ${floatOn?'14':'6'}%,transparent);color:rgb(var(--c-accent))" onclick="toggleFloat()">📱 학생 플로팅 바 ${floatOn ? '<span style="background:rgba(234,88,12,.2);padding:1px 7px;border-radius:8px;font-size:8px;margin-left:4px">ON</span>' : '<span style="opacity:.5;margin-left:4px">OFF</span>'}</div></div>
        ${floatOn ? `
        <div style="padding:0 10px 4px"><div style="font-size:9px;color:rgb(var(--c-txt3));margin-bottom:3px">표시할 버튼</div>
        <div class="is-row" style="gap:3px">` +
          Object.entries(btnIcons).map(([k,ico]) =>
            '<div class="is-btn sm ' + (btnState[k]?'active':'') + '" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ' + (btnState[k]?'14':'4') + '%,transparent);color:' + (btnState[k]?'rgb(var(--c-blue))':'rgb(var(--c-txt3))') + '" onclick="toggleBtn(\'' + k + '\')">' + ico + ' ' + btnLabels[k] + '</div>'
          ).join('') + `
        </div></div>` : ''}
      </div>
    `);
    const desktop = stuDesktop('empty');
    let stu;
    if (floatOn) {
      const activeBtns = Object.entries(btnState).filter(([k,v]) => v);
      const barContent = activeBtns.length
        ? activeBtns.map(([k]) =>
            '<span style="font-size:16px;cursor:default;padding:3px 5px;border-radius:5px;line-height:1;background:rgba(15,23,42,.06)" title="' + btnLabels[k] + '"' +
            ' onmouseenter="this.style.background=\'rgba(15,23,42,.15)\'" onmouseleave="this.style.background=\'rgba(15,23,42,.06)\'"' +
            ' onclick="toast(\'📱 ' + btnLabels[k] + ' 버튼 클릭 — 교사에게 전송됨\',\'info\')">' + btnIcons[k] + '</span>'
          ).join('')
        : '<span style="font-size:9px;color:#475569;padding:3px 2px">(버튼 없음)</span>';
      const floatBar = '<div style="position:absolute;bottom:30px;right:10px;display:flex;gap:4px;background:rgba(240,243,250,.92);backdrop-filter:blur(6px);border-radius:10px;padding:5px 7px;border:1px solid rgba(255,255,255,.2);box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:10;align-items:center">' + barContent + '</div>';
      stu = '<div style="position:relative">' + desktop.replace(/<\/div>\s*$/, floatBar + '</div>') + '</div>';
    } else {
      stu = stuView('<span style="font-size:28px;margin-bottom:6px">📵</span><div style="color:#94a3b8;font-weight:600">플로팅 바 숨김</div>');
    }
    div.innerHTML = '<h2>📱 플로팅 바</h2><div class="sub">학생 화면의 플로팅 바 제어</div>';
    div.innerHTML += iSection('플로팅 바를 켜고 끄고, 버튼을 개별 토글해보세요', sidebar, iStu(stu),
      '<b>📱 플로팅 바</b> — 학생 화면 <b>우하단에 작은 반투명 바</b>로 떠 있어, 학생이 💬 메시지·✅ 완료·✋ 도움·🆘 이상 등을 교사에게 보낼 수 있습니다. 각 버튼은 개별로 켜고 끌 수 있어 수업 상황에 맞춰 조절 가능합니다.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🪟 플로팅 바 위치</h3><p>학생 화면 <b>우하단</b>에 고정. 항상 최상위에 떠 있어 다른 창에 가려지지 않음. 모든 버튼을 끄면 바 자체가 사라집니다.</p></div>' +
      '<div class="card"><h3>🚫 스팸 방지 쿨다운</h3><p>같은 버튼 연달아 누르기 방지: <b>메시지·이상 30초</b>, <b>완료·도움 60초</b>. 전송 실패 시엔 쿨다운이 안 걸려 즉시 재시도 가능.</p></div>' +
      '<div class="card"><h3>📷 메시지에 이미지 첨부</h3><p>💬 메시지 모달에서 <b>Ctrl+V로 클립보드 이미지</b> 첨부 가능. 자동 압축(최대 7MB)되어 교사에게 전송. 화면 캡처·과제 결과 등을 빠르게 보내기 좋음.</p></div>' +
      '<div class="card"><h3>📬 교사가 확인하는 방법</h3><p>받은 메시지·알림은 사이드바 <b>📨 받은 메시지 보기</b> 모달에서 확인. 우선순위 🆘 &gt; ✋ &gt; 💬 &gt; ✅ 순 정렬. <a href="#" class="detail-link" onclick="goToPage(\'comm-inbox\');return false;">→ 자세히</a></p></div>' +
      '<div class="card"><h3>🆕 신규 설치 기본값</h3><p>새로 설치한 학생에겐 <b>💬 메시지만</b> 기본 활성화. 선생님이 수업에 맞게 버튼을 추가/제거할 수 있습니다.</p></div>' +
      '<div class="card"><h3>🔒 90초 안전망</h3><p>잠금·집중 상태에서 90초 이상 연결 끊김 → 자동 해제. 플로팅 바와는 별개로 동작하는 안전장치.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>운영 팁</b> — 평소엔 💬 메시지만 켜고, 시험 시간엔 🆘 이상만 켜는 식으로 상황별 토글. 모든 버튼을 끄면 플로팅 바가 사라져 학생 화면이 깔끔해집니다.</div></div>';
  }
  window.toggleFloat = function() { floatOn = !floatOn; render(); toast(floatOn ? '📱 플로팅 바 표시' : '📵 플로팅 바 숨김', floatOn ? 'success' : 'info'); };
  window.toggleBtn = function(k) { btnState[k] = !btnState[k]; render(); };
  render();
}

  let tab = 'msg', unreadOnly = true, count = 3;

    { pc:'PC-01', type:'💬', text:'과제 어디에 제출하나요?', time:'12:34', read:false, prio:3 },

    { pc:'PC-02', type:'💬', text:'선생님 이거 맞나요?', time:'11:50', read:false, prio:3 },
    { pc:'PC-07', type:'✋', text:'도와주세요!', time:'11:45', read:false, prio:2 },
    { pc:'PC-04', type:'💬', text:'오류가 나요', time:'11:30', read:true, prio:3 },

  const notifs = [
    { pc:'PC-01', type:'✅', text:'과제 제출 완료', time:'12:35', read:false },
    { pc:'PC-03', type:'🆘', text:'이상 신고', time:'12:30', read:false },
    { pc:'PC-05', type:'✅', text:'실습 완료', time:'12:15', read:true },
    { pc:'PC-07', type:'✋', text:'도움 요청', time:'11:45', read:false },

  const typeColors = {'🆘':'rgba(239,68,68,.2)', '✋':'rgba(234,179,8,.2)', '✅':'rgba(34,197,94,.2)', '💬':'rgba(59,130,246,.2)'};

  function render() {
    const items = (tab === 'msg' ? msgs : notifs);
    const filtered = unreadOnly ? items.filter(m => !m.read) : items;
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-label">📨 받은 메시지</div>
        <div class="is-row"><div class="is-btn full" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red));display:flex;align-items:center" onclick="toast('📨 받은 메시지 모달이 열렸습니다','info')">📨 받은 메시지 보기 <span style="margin-left:auto;background:rgba(220,38,38,.2);padding:1px 8px;border-radius:8px;font-size:9px">${count}</span></div></div>
      </div>
      <div class="is-sec">
        <div class="is-label">탭 선택</div>
        <div class="is-row" style="gap:3px">
          <div class="is-btn sm" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ${tab==='msg'?'14':'4'}%,transparent);color:${tab==='msg'?'rgb(var(--c-blue))':'rgb(var(--c-txt3))'}" onclick="setInboxTab('msg')">💬 메시지</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) ${tab==='notif'?'14':'4'}%,transparent);color:${tab==='notif'?'rgb(var(--c-purple))':'rgb(var(--c-txt3))'}" onclick="setInboxTab('notif')">🔔 알림</div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-label">필터 / 동작</div>
        <div class="is-chk"><input type="checkbox" ${unreadOnly?'checked':''} onclick="toggleUnreadOnly()"> <span style="font-size:10px">미확인만 보기</span></div>
        <div class="is-row" style="gap:3px;padding-top:4px">
          <div class="is-btn sm" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 8%,transparent);color:rgb(var(--c-green))" onclick="markAllRead()">📖 모두 읽음</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red))" onclick="deleteRead()">🗑 읽은 것 삭제</div>
        </div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:4px 10px 0">우선순위: 🆘 &gt; ✋ &gt; 💬 &gt; ✅</div>

    const msgRows = filtered.map(m => {
      const isSos = m.type === '🆘';
      return '<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.04);' +

        '<span style="font-size:9px;color:#64748b;cursor:default;padding:0 2px;opacity:.4">✕</span>' +
        '</div>';
    }).join('');

      '<div class="card"><h3>🗑 메시지 관리</h3><p><b>✕ 개별 삭제</b>(confirm), <b>📖 모두 읽음</b> 일괄 처리, <b>🗑 읽은 것 삭제</b>로 정리. 모든 삭제는 확인 대화상자 후 진행.</p></div>' +
      '<div class="card"><h3>🖥 PC별 필터</h3><p>특정 PC의 메시지만 골라보기. 학생 한 명이 보낸 메시지를 연속으로 확인할 때 유용. (미구현 — 우측 상단 PC 선택 드롭다운)</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>운영 흐름</b> — 플로팅 바에서 학생이 보낸 메시지는 실시간으로 교사 앱 사이드바 📨 아이콘에 배지(미확인 개수)로 표시됩니다. 클릭하면 모달이 열리고, 탭과 필터로 원하는 메시지를 빠르게 찾아 확인·대응하세요.</div></div>';
  }
  window.setInboxTab = function(t) { tab = t; render(); };
  window.toggleUnreadOnly = function() { unreadOnly = !unreadOnly; render(); };
  window.markAllRead = function() {
    msgs.forEach(m => m.read = true);
    notifs.forEach(n => n.read = true);
    count = 0;
    render();
    toast('📖 모든 메시지를 읽음 처리했습니다', 'success');
  };
  window.deleteRead = function() {
    const before = msgs.length + notifs.length;
    const src = tab === 'msg' ? msgs : notifs;
    for (let i = src.length - 1; i >= 0; i--) { if (src[i].read) src.splice(i, 1); }
    const after = msgs.length + notifs.length;
    render();
    toast('🗑 읽은 메시지 ' + (before - after) + '개 삭제됨', 'info');
  };
  render();
}

function buildCommMsg(div) {
  let sendType = 'msg'; // 'msg' | 'code' | 'image'
  let sent = false, msgText = '과제 제출은 4시까지입니다';
  const codeText = 'def hello():\n    print("Hello, World!")';

  function render() {
    const sidebar = iSide(`

          <div class="is-btn sm" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) ${sendType==='code'?'14':'4'}%,transparent);color:${sendType==='code'?'rgb(var(--c-purple))':'rgb(var(--c-txt3))'}" onclick="setSendType('code')">💻 코드</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) ${sendType==='image'?'14':'4'}%,transparent);color:${sendType==='image'?'rgb(var(--c-green))':'rgb(var(--c-txt3))'}" onclick="setSendType('image')">🖼 이미지</div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-label">${sendType === 'msg' ? '💬 메시지 내용' : sendType === 'code' ? '💻 코드 내용' : '🖼 이미지'}</div>
        ${sendType === 'image'
          ? '<div style="padding:4px 10px"><div style="width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;border:1px dashed rgba(255,255,255,.2)">🖼️</div><div style="font-size:9px;color:rgb(var(--c-txt3));margin-top:3px;text-align:center">sample_chart.png · 320KB</div></div>'
          : '<div class="is-row"><textarea class="is-inp" rows="3" id="send-text">' + (sendType === 'msg' ? msgText : codeText) + '</textarea></div>'}
        <div class="is-row" style="padding-bottom:6px"><div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent);color:rgb(var(--c-accent))" onclick="doSend()">📤 전송</div></div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 4px">Ctrl+V로 클립보드 이미지도 첨부 가능</div>
      </div>
    `);

    // 학생 화면에 표시되는 팝업
    function popupWindow(inner) {
      return '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;background:#1e293b;border-radius:10px;border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:10;overflow:hidden">' +
        '<div style="display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.06);background:#0f172a">' +

          '<span style="margin-left:auto;color:#64748b;font-size:11px;cursor:default;padding:0 4px">✕</span>' +

          '<span style="padding:3px 10px;border-radius:4px;background:rgba(59,130,246,.15);color:#93c5fd;font-size:9px;font-weight:600;cursor:default;display:flex;align-items:center;gap:3px">📋 복사</span>' +
          '<span style="padding:3px 10px;border-radius:4px;background:rgba(255,255,255,.06);color:#94a3b8;font-size:9px;cursor:default;margin-left:auto">✕ 닫기</span>' +

      popupContent = '<pre style="background:#0f172a;padding:8px;border-radius:5px;font-family:monospace;font-size:10px;color:#a78bfa;overflow-x:auto;margin:0;line-height:1.5">' + codeText.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>';
    } else if (sendType === 'image') {
      popupContent = '<div style="text-align:center"><div style="width:100%;height:120px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:4px">🖼️</div><div style="font-size:9px;color:#64748b">sample_chart.png · 320KB</div></div>';
    } else {
      popupContent = '<div style="margin-bottom:4px"><span style="background:rgba(34,197,94,.12);color:#86efac;padding:0 5px;border-radius:3px;font-size:8px;font-weight:700">PC-01</span></div>' +
        '<div style="font-size:11px;color:#e2e8f0;line-height:1.5">' + msgText + '</div>';
    }

    let stu;
    if (sent) {
      // 학생 바탕화면 + 중앙 팝업

    div.innerHTML = '<h2>📨 메시지 / 💻 코드 / 🖼 이미지 전송</h2><div class="sub">학생에게 다양한 콘텐츠 보내기</div>';

      '<b>💬 메시지</b> — 일반 텍스트 메시지를 학생 화면에 팝업으로 표시. 학생은 팝업을 확인하고 닫을 수 있습니다.<br>' +
      '<b>💻 코드 전송</b> — 코드 스니펫을 학생 화면에 <b>구문 강조된 팝업</b>으로 띄워줍니다. 학생은 📋 복사 버튼으로 코드를 그대로 가져갈 수 있습니다. PPT에 안 들어가는 긴 코드 공유에 유용.<br>' +
      '<b>🖼 이미지 전송</b> — 이미지를 학생 화면에 팝업으로 표시. 화면 캡처·차트·과제 예시 등을 빠르게 공유. <b>Ctrl+V</b>로 클립보드 이미지도 첨부 가능 (자동 압축).'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>💬 메시지 팝업</h3><p>학생 화면 중앙에 팝업으로 표시. 발신자(PC명)와 메시지 내용이 함께 보이며, 하단의 <b>✕ 닫기</b> 버튼으로 확인 후 닫을 수 있습니다.</p></div>' +
      '<div class="card"><h3>💻 코드 스니펫 팝업</h3><p>구문 강조된 코드가 팝업에 표시. 학생은 <b>📋 복사</b> 버튼으로 코드를 클립보드에 바로 복사 가능. Python, JS 등 주요 언어 구문 강조 지원.</p></div>' +
      '<div class="card"><h3>🖼 이미지 팝업</h3><p>이미지가 팝업에 표시. 파일명과 크기가 함께 보입니다. 학생은 이미지를 보고 <b>📁 폴더 열기</b>로 저장 위치에 접근 가능.</p></div>' +
      '<div class="card"><h3>🖼 Ctrl+V 이미지 첨부</h3><p>전송 textarea에 <b>Ctrl+V</b>로 클립보드 이미지 붙여넣기. 자동 압축(품질 단계별 JPEG, 1280/1920 리사이즈, 8MB 이하). 이미지 단독 또는 텍스트+이미지 동시 전송 가능.</p></div>' +
      '<div class="card"><h3>📁 학생 저장 위치</h3><p>학생이 받은 이미지·파일은 <code>%USERPROFILE%\\Downloads\\ScreenShare\\</code>에 저장되어 팝업에서 <b>📁 폴더 열기</b>로 접근 가능.</p></div>' +
      '<div class="card"><h3>🔔 교사 알림 확인</h3><p>학생이 보낸 메시지는 교사 앱 사이드바 <b>📨 받은 메시지 보기</b>에서 확인. <a href="#" class="detail-link" onclick="goToPage(\'comm-inbox\');return false;">→ 자세히</a></p></div>' +
      '</div>' +
      '<div class="tip-box"><b>잘 안 보는 학생 깨우기</b> — 화면 구석 알림으로는 무시하기 쉬운 학생들에게 코드/이미지 전송은 <b>풀스크린 팝업</b>으로 강제 표시되어 집중을 유도하기 좋습니다. 시험 시작 안내나 중요한 공지에 활용하세요.</div></div>';

  render();
}

    const sidebar = iSide(`

    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>📄 파일 추가 방식</h3><p>드래그 앤 드롭 또는 클릭으로 파일 선택. 폴더 통째로 추가 가능. ZIP 내부 파일 목록을 바로 확인할 수 있어 필요한 파일만 골라 전송.</p></div>' +
      '<div class="card"><h3>📦 ZIP 압축 해제</h3><p>ZIP 파일에 압축 해제 옵션 제공. 해제 후 어떤 파일을 실행/열지 선택 가능. ZIP이 아닌 파일은 전송 후 실행/열기 체크박스로 제어.</p></div>' +
      '<div class="card"><h3>🎯 대상 학생 선택</h3><p>전체 또는 개별 PC 선택. 학생 목록 체크박스로 골라 배포. 3탭 구조: 📄파일 → 👥학생선택 → 📊배포현황.</p></div>' +
      '<div class="card"><h3>💾 저장 경로 프리셋</h3><p>다운로드·바탕화면·문서·C:\\temp 중 선택하거나 직접 입력. 환경변수(%USERPROFILE% 등) 사용 가능.</p></div>' +
      '<div class="card"><h3>▶ 전송 후 자동 실행</h3><p>.exe/.msi/.bat 등 실행 파일은 체크 시 학생 PC에서 자동 실행. 일반 파일(.hwp/.pdf 등)은 연결 프로그램으로 열림. 실패 시 10회/10초 재시도.</p></div>' +
      '<div class="card"><h3>📊 실시간 진행률</h3><p>PC별 파일 전송 상태 실시간 표시. 완료/진행중/실패/대기 4단계 + 진행률 막대. 실패 건은 개별/일괄 재시도 가능.</p></div>' +
      '<div class="card"><h3>🔄 자동 완료 감지</h3><p>모든 대상 PC의 모든 파일이 done/launched 상태가 되면 배포가 자동 완료 처리. 배포 취소도 가능.</p></div>' +
      '<div class="card"><h3>📂 저장 위치</h3><p>학생 PC: <code>%USERPROFILE%\\Downloads\\ScreenShare\\</code> (기본값). 설정에서 변경 가능.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>실전 팁</b> — 수업 시작 전 실습코드.zip + 참고자료.hwp를 전체 학생에게 배포 후 자동 열기 옵션으로 학생 PC에서 바로 자료 열람. 시간 절약 + 학생 착오 방지.</div></div>';
  }

  window.deployTarget = function(m) { targetMode = m; render(); };
  window.deployStart = function() {
    phase = 'deploying'; prog = 0;
    pcs.forEach(p => pcStatus[p] = 'wait');
    clearInterval(timer);
    timer = setInterval(() => {
      prog += 4;
      const done = Math.min(Math.ceil(prog / 20), 5);
      pcs.forEach((p, i) => {
        if (i < done) pcStatus[p] = 'done';
        else if (i === done && prog < 100) pcStatus[p] = 'active';
        else if (i > done) pcStatus[p] = 'wait';
      });
      if (prog >= 100) {
        prog = 100; clearInterval(timer); phase = 'done';
        pcs.forEach(p => pcStatus[p] = 'done');
        toast('📤 배포 완료! 5대 전송 성공', 'success');
      }
      render();
    }, 150);
    render();
  };
  window.deployReset = function() { phase = 'idle'; prog = 0; clearInterval(timer); render(); };
  render();
}

  window.collAddTime = function(n) { deadlineMin += n; render(); };
  window.collSetDeadline = function(n) { deadlineMin = n; render(); };
  window.collSetMax = function(n) { maxSize = n; render(); };
  window.collStart = function() {
    phase = 'collecting'; prog = 0;
    clearInterval(timer);
    timer = setInterval(() => {

      if (prog >= 100) { prog = 100; clearInterval(timer); phase = 'done'; toast('📥 회수 완료! 5개 파일 제출됨', 'success'); }

    }, 200);
    render(); toast('📥 회수 시작 — 학생 PC에 업로드 창 표시됨', 'info');
  };
  window.collStop = function() {
    clearInterval(timer); phase = 'done';
    toast('⏹ 회수 종료 — 학생 업로드 창 닫힘', 'info');
    render();
  };
  window.collReset = function() { phase = 'idle'; prog = 0; deadlineMin = 5; clearInterval(timer); render(); };
  render();
}
