<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화면공유프로그램 — 인터랙티브 기능 가이드</title>
<style>
:root {
  --c-app-bg: 240 243 250; --c-surface: 255 255 255; --c-surface-2: 235 240 248;
  --c-border: 208 220 240; --c-border-2: 184 204 232;
  --c-accent: 234 88 12; --c-accent-dim: 194 65 12;
  --c-txt: 15 23 42; --c-txt2: 55 79 106; --c-txt3: 100 116 139;
  --c-green: 5 150 105; --c-red: 220 38 38; --c-yellow: 204 109 0;
  --c-blue: 37 99 235; --c-purple: 124 58 237;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#eef1f8;color:rgb(var(--c-txt));font-size:14px;line-height:1.7;display:flex;height:100vh;overflow:hidden;background-image:radial-gradient(circle,rgba(234,88,12,.04) 1px,transparent 1px);background-size:24px 24px}
#nav{width:280px;min-width:280px;background:rgb(var(--c-surface));border-right:1px solid rgb(var(--c-border));display:flex;flex-direction:column;overflow:hidden}
#nav-header{height:36px;display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid rgb(var(--c-border));position:relative}
#nav-header::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;background:rgb(var(--c-accent));border-radius:0 2px 2px 0;box-shadow:0 0 12px rgba(234,88,12,.6)}
#nav-header .lab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgb(var(--c-txt));flex:1;display:flex;align-items:center;gap:6px}
#nav-header .lab::before{content:'';width:6px;height:6px;border-radius:50%;background:rgb(var(--c-green));flex-shrink:0}
#nav-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
#nav-scroll::-webkit-scrollbar{width:4px}
#nav-scroll::-webkit-scrollbar-thumb{background:rgb(var(--c-border-2));border-radius:2px}
.nav-item{padding:6px 16px 6px 24px;cursor:pointer;font-size:12px;color:rgb(var(--c-txt2));border-left:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:8px}
.nav-item:hover{background:rgb(var(--c-surface-2))}
.nav-item.active{background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue));border-left-color:rgb(var(--c-blue))}
.nav-item .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:0}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:rgb(var(--c-border-2));border-radius:3px}
.content-inner{max-width:1000px;margin:0 auto;padding:24px 32px 60px}
.page{display:none}
.page.active{display:block}
.page h2{font-size:20px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.page .sub{font-size:12px;color:rgb(var(--c-txt3));margin-bottom:16px}
.page .desc{font-size:13px;color:rgb(var(--c-txt2));margin-bottom:16px;padding:12px 16px;background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px}

/* ─── Interactive Playground ─── */
.playground{background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:10px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.playground .pg-header{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;font-weight:700;color:rgb(var(--c-txt3));background:rgb(var(--c-surface));border-bottom:1px solid rgb(var(--c-border));text-transform:uppercase;letter-spacing:.3px}
.playground .pg-body{padding:14px;display:flex;gap:16px;flex-wrap:wrap}
.playground .pg-sidebar{flex:0 0 280px;min-width:200px;background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:6px;overflow:hidden}
.playground .pg-student{flex:1;min-width:250px;min-height:160px;background:#0f172a;border-radius:6px;overflow:hidden;position:relative}
.pg-student .ps-title{display:flex;align-items:center;gap:6px;padding:5px 10px;font-size:9px;font-weight:700;color:#64748b;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);text-transform:uppercase}
.pg-student .ps-body{display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:130px;padding:16px;text-align:center;font-size:13px;color:#94a3b8;transition:all .3s}

/* Interactive sidebar controls */
.i-side{background:rgb(var(--c-surface))}
.i-side .is-sec{padding:6px 0;border-bottom:1px solid rgb(var(--c-border))}
.i-side .is-title{padding:5px 10px 1px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgb(var(--c-txt3))}
.i-side .is-label{padding:7px 10px 2px;font-size:10px;font-weight:700;text-transform:uppercase;color:rgb(var(--c-txt2));display:flex;align-items:center;gap:4px}
.i-side .is-row{display:flex;gap:4px;padding:2px 10px;flex-wrap:wrap;align-items:center}
.i-side .is-btn{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .15s;user-select:none;border:1px solid transparent}
.i-side .is-btn:hover{filter:brightness(1.15)}
.i-side .is-btn:active{transform:translateY(0)}
.i-side .is-btn.active{box-shadow:0 0 0 1.5px var(--b)}
.i-side .is-btn.disabled{opacity:.35;cursor:not-allowed;filter:none!important}
.i-side .is-btn.sm{padding:2px 8px;font-size:9px}
.i-side .is-btn.full{width:calc(100% - 20px);margin:2px 10px;display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:11px;justify-content:center}
.i-side .is-chk{display:flex;align-items:center;gap:5px;font-size:10px;color:rgb(var(--c-txt2));cursor:pointer}
.i-side .is-chk input{accent-color:rgb(var(--c-accent));width:14px;height:14px;cursor:pointer;pointer-events:none}
.i-side .is-sel{padding:2px 6px;border-radius:3px;border:1px solid rgb(var(--c-border));background:rgb(var(--c-surface));color:rgb(var(--c-txt2));font-size:10px;cursor:pointer}
.i-side .is-radio{display:flex;gap:3px;align-items:center}
.i-side .is-radio label{display:flex;align-items:center;gap:3px;font-size:10px;color:rgb(var(--c-txt2));cursor:pointer}
.i-side .is-radio input{accent-color:rgb(var(--c-accent));width:12px;height:12px;margin:0;cursor:pointer}
.i-side .is-inp{width:100%;padding:5px 8px;border-radius:4px;border:1px solid rgb(var(--c-border));background:rgb(var(--c-surface-2));color:rgb(var(--c-txt));font-size:11px;font-family:inherit;resize:none}

/* Toast / Status */
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);animation:slideIn .25s ease-out;max-width:360px}
.toast.info{background:color-mix(in srgb,rgb(var(--c-blue)) 90%,transparent);color:#dbeafe;border:1px solid rgb(var(--c-blue))}
.toast.success{background:color-mix(in srgb,rgb(var(--c-green)) 90%,transparent);color:#d1fae5;border:1px solid rgb(var(--c-green))}
.toast.warning{background:color-mix(in srgb,rgb(var(--c-yellow)) 90%,transparent);color:#fef3c7;border:1px solid rgb(var(--c-yellow))}
.toast.error{background:color-mix(in srgb,rgb(var(--c-red)) 90%,transparent);color:#fee2e2;border:1px solid rgb(var(--c-red))}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Progress bar */
.prog{height:4px;background:rgb(var(--c-surface-2));border-radius:2px;overflow:hidden}
.prog div{height:100%;border-radius:2px;transition:width .5s}

/* Timer display */
.timer-display{font-family:monospace;text-align:center;padding:10px 0}
.timer-display .num{font-size:36px;font-weight:700;font-family:monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Student screen states */
.stu-idle .ps-body{color:#64748b}
.stu-streaming .ps-body{color:#22d3ee}
.stu-paused .ps-body{color:#eab308}
.stu-locked .ps-body{color:#fca5a5}
.stu-notice .ps-body{padding-top:0}

/* ─── Detail Cards ─── */
.detail-section{margin-top:12px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.card-grid{grid-template-columns:1fr}}
.card{background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.card h3{font-size:13px;font-weight:700;color:rgb(var(--c-txt));margin-bottom:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card p,.card li{font-size:12px;color:rgb(var(--c-txt2));line-height:1.6}
.card ul{padding-left:15px}
.card li{margin-top:2px}
.tip-box{background:color-mix(in srgb,rgb(var(--c-blue)) 6%,transparent);border-left:3px solid rgb(var(--c-blue));border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-size:12px;color:rgb(var(--c-txt2))}
.tip-box strong{color:rgb(var(--c-blue))}
.warn-box{background:color-mix(in srgb,rgb(var(--c-yellow)) 8%,transparent);border-left:3px solid rgb(var(--c-yellow));border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-size:12px;color:rgb(var(--c-txt2))}
.warn-box strong{color:rgb(var(--c-yellow))}
.step-list{list-style:none;padding:0}
.step-list li{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:12.5px;color:rgb(var(--c-txt2))}
.step-num{width:22px;height:22px;background:rgb(var(--c-accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;vertical-align:middle;margin-left:3px}
.badge-blue{background:color-mix(in srgb,rgb(var(--c-blue)) 12%,transparent);color:rgb(var(--c-blue))}
.badge-green{background:color-mix(in srgb,rgb(var(--c-green)) 12%,transparent);color:rgb(var(--c-green))}
.badge-purple{background:color-mix(in srgb,rgb(var(--c-purple)) 12%,transparent);color:rgb(var(--c-purple))}
.badge-red{background:color-mix(in srgb,rgb(var(--c-red)) 12%,transparent);color:rgb(var(--c-red))}
kbd{background:rgb(var(--c-surface-2));border:1px solid rgb(var(--c-border));border-radius:3px;padding:1px 5px;font-family:monospace;font-size:11px;color:rgb(var(--c-txt));vertical-align:middle}
</style>
</head>
<body>

<nav id="nav">
  <div id="nav-header"><div class="lab"><span></span>인터랙티브 가이드</div></div>
  <div id="nav-scroll"></div>
</nav>

<div id="content"><div class="content-inner" id="pages"></div></div>

<script>
// ─── Toast ───
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── Student view helper ───
function stuView(html) {
  return '<div class="ps-title"><span>👤 학생 화면</span></div><div class="ps-body">' + html + '</div>';
}
function stuEmpty() { return stuView('<span style="font-size:28px;margin-bottom:6px">🖥️</span><div>PC-01 · 대기 중</div>'); }
function stuLocked() { return stuView('<span style="font-size:36px;margin-bottom:8px">🔒</span><div style="font-size:15px;font-weight:700;color:#fff">화면이 잠겼습니다</div><div style="font-size:11px;margin-top:4px;color:#94a3b8">교사가 화면을 잠갔습니다</div>'); }
function stuStreaming() { return stuView('<span style="font-size:28px;margin-bottom:6px">📺</span><div style="color:#22d3ee;font-weight:600">교사 화면 수신 중</div><div style="font-size:10px;color:#475569;margin-top:4px">WebP · 10fps · 1280×720</div>'); }
function stuPaused() { return stuView('<span style="font-size:28px;margin-bottom:6px">⏸️</span><div style="color:#eab308;font-weight:600">전송 일시정지</div><div style="font-size:10px;color:#475569;margin-top:4px">화면이 멈췄습니다</div>'); }
function stuFocus() { return stuView('<span style="font-size:28px;margin-bottom:6px">🟣</span><div style="color:#a78bfa;font-weight:600">집중 모드</div><div style="font-size:10px;color:#475569;margin-top:4px">허용된 프로그램만 사용 가능</div>'); }
function stuFree() { return stuView('<span style="font-size:28px;margin-bottom:6px">🟢</span><div style="color:#6ee7b7;font-weight:600">자유 모드</div>'); }
function stuNotice(text) { return '<div class="ps-title"><span>📢 공지</span></div><div style="background:linear-gradient(90deg,#1d4ed8,#2563eb);padding:7px 14px;text-align:center;font-size:13px;font-weight:600;color:#fff">📢 ' + text + '</div><div class="ps-body" style="flex:1">(데스크톱 화면)</div>'; }
function stuTimer(time) { return '<div class="ps-title"><span>⏱️ 타이머</span></div><div class="ps-body"><div style="background:#1e293b;padding:4px 18px;border-radius:0 0 8px 8px;margin-top:-16px"><span style="font-family:monospace;font-size:22px;font-weight:700;color:#fbbf24">' + time + '</span></div></div>'; }

// ─── Page Data ───
function buildPages() {
  const nav = document.getElementById('nav-scroll');
  const pages = document.getElementById('pages');
  const sections = [
    { id:'stream', label:'📡 화면 전송', pages:[
      { id:'st-start', label:'시작하기', build: buildStart },
      { id:'st-main', label:'전송 시작 / 종료', build: buildStreamMain },
      { id:'st-mode', label:'WebP / H.264 모드', build: buildStreamMode },
      { id:'st-lock', label:'뷰어 강제', build: buildViewerLock }
    ]},
    { id:'record', label:'🎬 녹화', pages:[
      { id:'rec-main', label:'녹화 제어', build: buildRecordMain },
      { id:'rec-audio', label:'마이크 설정', build: buildRecordAudio }
    ]},
    { id:'monitor', label:'👀 모니터링', pages:[
      { id:'mon-main', label:'학생 화면 모니터링', build: buildMonitor }
    ]},
    { id:'mode', label:'🟢 모드 / 잠금', pages:[
      { id:'mode-main', label:'모드 및 잠금', build: buildModeLock }
    ]},
    { id:'comm', label:'💬 소통', pages:[
      { id:'comm-main', label:'공지 / 플로팅 바', build: buildComm },
      { id:'comm-msg', label:'메시지 / 코드 전송', build: buildCommMsg }
    ]},
    { id:'file', label:'📁 파일', pages:[
      { id:'file-main', label:'배포 / 회수', build: buildFile }
    ]},
    { id:'timer', label:'⏱️ 타이머', pages:[
      { id:'timer-main', label:'카운트다운 / 스톱워치', build: buildTimer }
    ]},
    { id:'deploy', label:'📦 설치 / 업데이트', pages:[
      { id:'dep-install-teacher', label:'교사 PC 설치 (GitHub)', build: buildInstallTeacher },
      { id:'dep-install-student', label:'학생 PC 설치 (맞춤 패키지)', build: buildInstallStudent },
      { id:'dep-update', label:'업데이트', build: buildUpdate },
      { id:'dep-remove', label:'제거 / 로그 관리', build: buildRemove }
    ]},
    { id:'system', label:'⚙️ 시스템', pages:[
      { id:'sys-main', label:'관리 / 전원 / 단축키', build: buildSystem }
    ]}
  ];

  let first = true;
  sections.forEach(sec => {
    sec.pages.forEach((pg, i) => {
      const a = document.createElement('div');
      a.className = 'nav-item' + (first ? ' active' : '');
      a.dataset.p = pg.id;
      a.innerHTML = '<span class="ico">' + (i === 0 ? sec.label.split(' ')[0] : '·') + '</span>' + pg.label;
      a.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        a.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const el = document.getElementById('page-' + pg.id);
        if (el) { el.classList.add('active'); document.getElementById('content').scrollTop = 0; }
      });
      nav.appendChild(a);

      const div = document.createElement('div');
      div.className = 'page' + (first ? ' active' : '');
      div.id = 'page-' + pg.id;
      pg.build(div);
      pages.appendChild(div);

      first = false;
    });
  });
}

// ─── Interactive Section Builder Helpers ───
function iSide(html) { return '<div class="pg-sidebar i-side">' + html + '</div>'; }
function iStu(html) { return '<div class="pg-student">' + html + '</div>'; }
function iSection(title, sidebar, stu, desc) {
  let h = '<div class="playground"><div class="pg-header"><span>🎮</span> ' + title + '</div><div class="pg-body">' + sidebar + stu + '</div></div>';
  if (desc) h += '<div class="desc">' + desc + '</div>';
  return h;
}
function iLive(html) { return '<div class="fade-in">' + html + '</div>'; }

// ═══════════════════════════════════════════════
// 0. START — Getting Started
// ═══════════════════════════════════════════════
function buildStart(div) {
  div.innerHTML = '<h2>🚀 시작하기</h2><div class="sub">화면 전송</div>';

  const steps = [
    '<b>설정</b>에서 실습실 이름, 포트 번호를 입력하고 저장합니다.',
    '학생 PC에 <b>학생 프로그램</b>이 설치되어 있어야 접속됩니다. (도구 → 학생 프로그램 관리에서 GitHub 최신 버전 받아 배포 가능)',
    '학생이 앱을 실행하면 우측 화면에 <b>PC 이름</b>과 <b>상태</b>가 표시됩니다.',
    '상단 타이틀에 <b>접속 인원 수</b>가 실시간으로 표시됩니다.'
  ];

  div.innerHTML += `
    <div class="playground"><div class="pg-header"><span>🎮</span> 시작 전 확인사항</div><div class="pg-body" style="flex-direction:column;gap:0">
      <ol class="step-list">${steps.map((s,i) => '<li><div class="step-num">' + (i+1) + '</div><span>' + s + '</span></li>').join('')}</ol>
      <div class="tip-box" style="margin-top:12px"><strong>Tip</strong> — 학생이 보이지 않으면 방화벽에서 해당 포트(기본 9000)가 열려 있는지 확인하세요.</div>
      <div class="tip-box"><strong>GitHub 자동 배포</strong> — <b>도구 → 학생 프로그램 관리</b>에서 GitHub Releases의 최신 버전을 받아 학생 PC에 LAN으로 원격 배포할 수 있습니다.</div>
    </div></div>`;

  div.innerHTML += `
    <div class="detail-section">
      <div class="card-grid">
        <div class="card">
          <h3>🔌 포트 설정</h3>
          <p>기본 포트 <b>9000</b>. 설정에서 변경 가능. 학생과 동일한 포트여야 접속됩니다. 방화벽 예외 등록 필요.</p>
        </div>
        <div class="card">
          <h3>🖥 학생 접속</h3>
          <p>학생 앱이 실행되면 교사 앱 우측 패널에 PC 이름/상태가 표시됩니다. 접속 시 자동 상태 동기화.</p>
        </div>
        <div class="card">
          <h3>📦 학생 배포</h3>
          <p><b>도구 → 학생 프로그램 관리</b>에서 GitHub 최신 설치파일을 받아 원격 설치/업데이트/제거 가능. 항상 새로 받기(캐시 없음).</p>
        </div>
        <div class="card">
          <h3>🔒 단일 인스턴스</h3>
          <p>교사 앱은 하나의 인스턴스만 실행됩니다. 두 번째 실행 시 기존 창이 포그라운드로 올라옵니다.</p>
        </div>
        <div class="card">
          <h3>🛡️ 방화벽</h3>
          <p>기본 포트 9000(WebP), H.264 동적 포트. Hyper-V <code>excludedportrange</code> 충돌 시 포트 변경 필요.</p>
        </div>
        <div class="card">

// 1. STREAM MAIN — Start/Stop + Pause/Resume
// ═══════════════════════════════════════════════
function buildStreamMain(div) {
  let streaming = false, paused = false, mode = 'webp';
  const pg = div;

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">화면 전송</div>
        <div class="is-label">방식</div>
        <div class="is-row">
          <div class="is-radio"><label><input type="radio" name="st-mode" value="webp" ${mode==='webp'?'checked':''} ${streaming?'disabled':''}> WebP (PPT·문서용)</label></div>
          <div class="is-radio"><label><input type="radio" name="st-mode" value="h264" ${mode==='h264'?'checked':''} ${streaming?'disabled':''}> H.264 (영상·시연용)</label></div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-row" style="padding-top:6px">
          ${streaming
            ? '<div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 10%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="stStop()">⏹ ' + (mode==='h264'?'H.264 ':'') + '종료 <span style="font-size:8px;opacity:.6">F6</span></div>'
            : '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="stStart()">▶ 전송 시작 <span style="font-size:8px;opacity:.6">F6</span></div>'}
          ${streaming && mode==='webp'
            ? (paused
              ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="stResume()">▶ 재개 <span style="font-size:8px;opacity:.6">F7</span></div>'
              : '<div class="is-btn" style="--b:rgb(var(--c-yellow));background:color-mix(in srgb,rgb(var(--c-yellow)) 10%,transparent);color:rgb(var(--c-yellow));flex:1;text-align:center" onclick="stPause()">⏸ 일시정지 <span style="font-size:8px;opacity:.6">F7</span></div>')
            : ''}
        </div>
        ${streaming && mode==='h264' ? '<div style="font-size:9px;color:rgb(var(--c-txt3));padding:2px 10px 4px">※ H.264: 일시정지 미지원</div>' : ''}
        ${!streaming ? '<div class="is-row"><div class="is-chk" onclick="event.stopPropagation()"><input type="checkbox" id="st-sel"> 선택 전송</div></div>' : ''}
      </div>
    `);

    let stu;
    if (!streaming) stu = stuEmpty();
    else if (paused) stu = stuPaused();
    else stu = stuStreaming();

    pg.innerHTML = '';
    pg.insertAdjacentHTML('beforeend', '<h2>📡 전송 시작 / 종료 / 일시정지</h2><div class="sub">화면 전송</div>');
    pg.insertAdjacentHTML('beforeend', iSection('클릭해서 직접 제어해보세요', sidebar, iStu(stu),
      '<b>▶ 전송 시작</b> — 모든 학생에게 교사 화면을 전송합니다. <b>⏸ 일시정지</b>(WebP 전용)로 화면을 멈출 수 있고 <b>▶ 재개</b>로 이어서 전송합니다. <kbd>F6</kbd> 시작/종료, <kbd>F7</kbd> 일시정지/재개.'
    ));
    pg.insertAdjacentHTML('beforeend', '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🟠 WebP 모드 <span class="badge badge-blue">기본</span></h3><p>JPEG/WebP 이미지를 연속 전송합니다. PPT·문서 위주 수업에 적합합니다. 일시정지/재개 기능을 지원합니다.</p></div>' +
      '<div class="card"><h3>🟣 H.264 모드 <span class="badge badge-purple">고급</span></h3><p>ffmpeg 기반 영상 스트리밍으로 더 부드럽습니다. 영상·시연 위주 수업에 적합합니다. 고프레임·저지연.</p></div>' +
      '<div class="card"><h3>▶ 전송 / ⏸ 일시정지</h3><p>사이드바 <b>전송 시작</b> 버튼으로 교사 화면을 전송합니다. WebP 모드에선 버튼 하나로 일시정지/재개를 전환할 수 있습니다.</p></div>' +
      '<div class="card"><h3>🎯 선택 전송 <span class="badge badge-green">v0.1.44+</span></h3><p>특정 학생만 선택하여 교사 화면을 전송합니다. WebP/H.264 모두 선택 전송 가능. 비선택 학생은 상태 유지.</p></div>' +
      '<div class="card"><h3>🖥 모니터 선택</h3><p>듀얼 모니터 사용 시 드롭다운에서 캡처할 화면을 선택할 수 있습니다. 설정 메뉴에서 기본 모니터 지정 가능.</p></div>' +
      '<div class="card"><h3>🔒 뷰어 강제</h3><p>사이드바에서 학생 뷰어 창의 크기를 30~80%로 강제 고정. 해제 시 학생 개인이 설정했던 크기로 복원됩니다.</p></div>' +
      '</div>' +
      '<div class="tip-box"><b>화질 설정</b> — 설정 메뉴의 <b>화면 전송 품질</b>에서 FPS, 해상도 비율, WebP/H.264 품질을 각각 조절할 수 있습니다.</div>' +
      '<div class="tip-box"><b>자동 녹화</b> — 설정에서 전송 시작 시 녹화를 자동으로 시작하도록 설정할 수 있습니다. 별도 조작 불필요.</div></div>');

    // Bind radio
    pg.querySelectorAll('input[name="st-mode"]').forEach(r => r.addEventListener('change', function() {
      if (!streaming) mode = this.value;
    }));
    pg.querySelector('#st-sel')?.addEventListener('change', function() {
      toast(this.checked ? '🎯 선택 전송 모드 (특정 학생만 전송)' : '📡 전체 전송 모드', 'info');
    });
  }

  // Expose functions globally for onclick
  window.stStart = function() { streaming = true; paused = false; render(); toast('📡 전송 시작됨', 'success'); };
  window.stStop = function() { streaming = false; paused = false; render(); toast('⏹ 전송 종료됨', 'info'); };
  window.stPause = function() { paused = true; render(); toast('⏸ 일시정지됨', 'warning'); };
  window.stResume = function() { paused = false; render(); toast('▶ 재개됨', 'success'); };

  render();
}

// 2. STREAM MODE — WebP / H.264 comparison
// ═══════════════════════════════════════════════
function buildStreamMode(div) {
  let mode = 'webp';
  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">전송 방식</div>
        <div class="is-row" style="padding:8px 10px">
          <div class="is-radio"><label><input type="radio" name="sm-mode" value="webp" ${mode==='webp'?'checked':''}> WebP (PPT·문서용)</label></div>
          <div class="is-radio"><label><input type="radio" name="sm-mode" value="h264" ${mode==='h264'?'checked':''}> H.264 (영상·시연용)</label></div>
        </div>
        <div class="is-row" style="padding-bottom:8px;gap:6px">
          <div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 12%,transparent);color:rgb(var(--c-green));display:flex;align-items:center;gap:4px" onclick="toast('📡 '+(mode==='webp'?'WebP':'H.264')+' 모드로 전송 시작','success')">▶ 전송 시작</div>
        </div>
        <div style="font-size:10px;color:rgb(var(--c-txt3));padding:0 10px 6px">
          ${mode === 'webp'
            ? '✓ CPU 부하 낮음 · 안정적 · 일시정지 가능'
            : '✓ 고프레임 · 부드러움 · ffmpeg 필요'}
        </div>
      </div>
    `);
    const stu = stuView(`
      <span style="font-size:28px;margin-bottom:6px">${mode === 'webp' ? '🟠' : '🟣'}</span>
      <div style="font-weight:600;color:${mode === 'webp' ? '#fbbf24' : '#c4b5fd'}">${mode === 'webp' ? 'WebP 모드' : 'H.264 모드'}</div>
      <div style="font-size:10px;color:#475569;margin-top:4px">${mode === 'webp' ? 'JPEG/WebP · 10fps · 안정적 전송' : 'H.264 · 24fps · 부드러운 스트리밍'}</div>
    `);
    div.innerHTML = '<h2>🔄 WebP / H.264 모드</h2><div class="sub">화면 전송</div>';
    div.innerHTML += iSection('전송 방식을 선택해보세요', sidebar, iStu(stu),
      '<b>🟠 WebP (기본)</b> — 이미지 연속 캡처 방식. CPU 부하 낮고 안정적. PPT/문서에 적합. 일시정지 기능 지원.<br><b>🟣 H.264</b> — ffmpeg 실시간 인코딩. 고프레임 부드러운 화면. 영상/시연에 적합. 전송 중 모드 변경 불가.'
    );
    div.querySelectorAll('input[name="sm-mode"]').forEach(r => r.addEventListener('change', function() {
      mode = this.value; render();
    }));
  }
  render();
}

      : '<span style="font-size:28px;margin-bottom:6px">🔓</span><div style="color:#6ee7b7;font-weight:600">뷰어 자유 조절</div><div style="font-size:10px;color:#475569;margin-top:4px">학생이 크기 변경 가능</div>'
    );
    div.innerHTML = '<h2>🔒 뷰어 강제 (크기 고정)</h2><div class="sub">화면 전송</div>';
    div.innerHTML += iSection('강제 체크박스와 크기를 변경해보세요', sidebar, iStu(stu),
      '체크박스를 켜면 모든 학생의 뷰어 창 크기가 지정된 비율로 고정됩니다. 해제 시 학생 개인이 설정했던 크기로 복원됩니다. 30~80% 범위에서 선택 가능합니다.'
    );
    const chk = div.querySelector('#vl-chk');
    const sel = div.querySelector('#vl-sel');
    if (chk) chk.addEventListener('change', function() { enabled = this.checked; render(); toast(enabled ? '🔒 뷰어 강제 켜짐 (' + size + '%)' : '🔓 뷰어 강제 해제됨', 'info'); });
    if (sel) sel.addEventListener('change', function() { size = parseInt(this.value); if (enabled) render(); });
  }
  render();
}

// 4. RECORD MAIN
// ═══════════════════════════════════════════════
function buildRecordMain(div) {
  let recording = false, paused = false, autoRec = false;
  let elapsed = 0, timer = null;

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">녹화</div>
        <div class="is-row" style="gap:4px">
          ${!recording
            ? '<div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 10%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="recStart()">⏺ 녹화 시작 <span style="font-size:8px;opacity:.6">F8</span></div>'
            : '<div class="is-btn" style="--b:rgb(var(--c-txt3));background:color-mix(in srgb,rgb(var(--c-txt3)) 10%,transparent);color:rgb(var(--c-txt3));flex:1;text-align:center" onclick="recStop()">⏹ 종료 <span style="font-size:8px;opacity:.6">F8</span></div>'}
          ${recording
            ? (paused
              ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="recResume()">▶ 재개 <span style="font-size:8px;opacity:.6">F9</span></div>'
              : '<div class="is-btn" style="--b:rgb(var(--c-yellow));background:color-mix(in srgb,rgb(var(--c-yellow)) 10%,transparent);color:rgb(var(--c-yellow));flex:1;text-align:center" onclick="recPause()">⏸ 일시정지 <span style="font-size:8px;opacity:.6">F9</span></div>')
            : ''}
        </div>
        <div class="is-row"><div class="is-chk" onclick="event.stopPropagation()"><input type="checkbox" ${autoRec?'checked':''} id="rec-auto"> 전송 시작 시 자동 녹화</div></div>
        ${recording ? '<div style="padding:6px 10px;display:flex;align-items:center;gap:8px"><span style="width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1.5s infinite"></span><span style="font-family:monospace;font-size:13px;font-weight:700;color:#ef4444">' + formatTime(elapsed) + '</span><span style="font-size:10px;color:rgb(var(--c-txt3))">' + (elapsed * 1.2).toFixed(0) + 'MB</span></div>' : ''}
      </div>
    `);
    const stu = recording
      ? stuView('<span style="font-size:28px;margin-bottom:6px">⏺️</span><div style="color:#ef4444;font-weight:600;display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1.5s infinite"></span> 녹화 중</div><div style="font-size:10px;color:#475569;margin-top:4px">' + formatTime(elapsed) + ' · ' + (elapsed * 1.2).toFixed(0) + 'MB</div>')
      : stuEmpty();
    div.innerHTML = '<h2>🎬 녹화 시작 / 종료 / 일시정지</h2><div class="sub">녹화</div>';
    div.innerHTML += iSection('녹화 버튼을 눌러보세요', sidebar, iStu(stu),
      '<b>⏺ 녹화 시작</b> — 교사 화면을 청크 단위로 MP4 녹화합니다. <b>⏸ 일시정지/▶ 재개</b>로 제어할 수 있습니다. <kbd>F8</kbd> 시작/종료, <kbd>F9</kbd> 일시정지/재개.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>⏺ 녹화 제어</h3><p>수업 내용을 MP4로 녹화합니다. 청크 단위 저장 후 자동 병합. <kbd>F8</kbd> 시작/종료, <kbd>F9</kbd> 일시정지/재개.</p></div>' +
      '<div class="card"><h3>🎤 마이크 녹음</h3><p>마이크 on/off, 음량 조절(×1~×5), 시스템 오디오 혼합 지원. 🎙 테스트 버튼으로 3초 녹음 후 재생 가능.</p></div>' +
      '<div class="card"><h3>🤖 자동 녹화 <span class="badge badge-green">설정 가능</span></h3><p>설정에서 전송 시작 시 녹화 자동 시작 옵션. 교사가 별도로 녹화 버튼을 누를 필요 없음.</p></div>' +
      '<div class="card"><h3>💾 저장 형식</h3><p>MP4 컨테이너. 청크 단위로 저장 후 세션 종료 시 자동 병합. 예상 용량: ~85MB/분(마이크 켬 기준).</p></div>' +
      '</div></div>';
    div.querySelector('#rec-auto')?.addEventListener('change', function() { autoRec = this.checked; toast(autoRec ? '🤖 전송 시 자동 녹화 켜짐' : '🤖 자동 녹화 꺼짐', 'info'); });
  }

  function formatTime(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return m + ':' + sec;
  }

  window.recStart = function() { recording = true; paused = false; elapsed = 0; clearInterval(timer); timer = setInterval(() => { if (!paused) elapsed++; render(); }, 1000); render(); toast('⏺ 녹화 시작됨', 'success'); };
  window.recStop = function() { recording = false; clearInterval(timer); render(); toast('⏹ 녹화 종료됨 · MP4 병합 중', 'info'); };
  window.recPause = function() { paused = true; render(); toast('⏸ 녹화 일시정지', 'warning'); };
  window.recResume = function() { paused = false; render(); toast('▶ 녹화 재개', 'success'); };
  render();
}

        ${micOn ? '<div class="is-row" style="gap:3px"><span style="font-size:9px;color:rgb(var(--c-txt3))">음량</span>' + ['×1','×1.5','×2','×3','×5'].map(g => '<div class="is-btn sm ' + (gain===g?'active':'') + '" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ' + (gain===g?'12':'4') + '%,transparent);color:rgb(var(--c-blue))" onclick="setGain(\'' + g + '\')">' + g + '</div>').join('') + '</div>' : ''}
        ${micOn ? '<div class="is-row" style="gap:4px;padding-bottom:4px"><span style="font-size:9px;color:rgb(var(--c-txt3))">레벨</span><div style="flex:1;height:5px;background:rgb(var(--c-surface-2));border-radius:2px;overflow:hidden"><div style="width:52%;height:100%;background:linear-gradient(90deg,rgb(var(--c-green)),rgb(var(--c-yellow)),rgb(var(--c-red)));border-radius:2px"></div></div><span style="font-size:9px;color:rgb(var(--c-txt3))">52%</span></div>' : ''}
        ${micOn ? '<div class="is-row" style="padding-bottom:6px"><div class="is-btn sm" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) 10%,transparent);color:rgb(var(--c-purple))" onclick="toast(\'🎙 마이크 테스트 3초...\',\'info\')">🎙 테스트</div><span style="margin-left:auto;font-size:9px;color:rgb(var(--c-txt3))">💾 85MB/분</span></div>' : ''}
      </div>
    `);
    const stu = micOn
      ? stuView('<span style="font-size:28px;margin-bottom:6px">🎤</span><div style="color:#a78bfa;font-weight:600">마이크 켜짐</div><div style="font-size:10px;color:#475569;margin-top:4px">Blue Yeti · ' + gain + ' · 레벨 52%</div>')
      : stuView('<span style="font-size:28px;margin-bottom:6px">🔇</span><div style="color:#94a3b8;font-weight:600">비디오만 녹화</div><div style="font-size:10px;color:#475569;margin-top:4px">오디오 미포함</div>');
    div.innerHTML = '<h2>🎤 마이크 / 오디오 설정</h2><div class="sub">녹화</div>';
    div.innerHTML += iSection('마이크를 켜고 음량을 조절해보세요', sidebar, iStu(stu),
      '🎤 마이크를 켜면 강의 음성이 녹음에 포함됩니다. 음량(×1~×5)을 조절하고, 🎙 테스트 버튼으로 3초 녹음 후 재생하여 실제 음량을 확인할 수 있습니다.'
    );
  }
  window.micToggle = function(on) { micOn = on; render(); toast(on ? '🎤 마이크 켜짐' : '🔇 마이크 꺼짐 (비디오만)', on ? 'success' : 'info'); };
  window.setGain = function(g) { gain = g; render(); toast('🔊 음량 ' + g, 'info'); };
  render();
}

// 6. MONITOR — Student Screen Monitoring
// ═══════════════════════════════════════════════
function buildMonitor(div) {
  let thumbSize = 60, hqMode = false;
  const demoPcs = [
    { name:'PC-01', status:'수업 중', badge:'', color:'#22d3ee' },
    { name:'PC-03', status:'수업 중', badge:'💬1', color:'#22d3ee' },

        <div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid rgb(var(--c-border));cursor:pointer" onclick="toast('🔎 ${p.name} 뷰어 열기','info')">

          <div class="is-btn sm" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue))" onclick="toast('📺 프로젝터 뷰 열기','info')">📺 프로젝터</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) 8%,transparent);color:rgb(var(--c-purple))" onclick="toast('💺 실습실 배치 열기','info')">💺 배치</div>
          <div class="is-btn sm" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 8%,transparent);color:rgb(var(--c-green))" onclick="toast('📬 메시지 모달 열기','info')">📬 메시지</div>
        </div>
      </div>
    `);

    const stu = stuView(`
      <div style="width:100%;text-align:left">
        <div style="display:flex;gap:6px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.06)">
          ${demoPcs.map(p => `
          <div style="width:${Math.round(thumbSize*0.55)}px;text-align:center">
            <div style="width:100%;height:${Math.round(thumbSize*0.4)}px;background:color-mix(in srgb,${p.color} 15%,#0f172a);border-radius:3px;border:1px solid ${p.color};display:flex;align-items:center;justify-content:center;font-size:10px;color:${p.color}">📺</div>
            <div style="font-size:7px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden">${p.name}</div>
          </div>`).join('')}

        <div style="padding:4px 10px;display:flex;gap:4px;align-items:center;font-size:10px;color:#64748b">
          <span>🖱 썸네일 더블클릭 → 뷰어</span>
          <span style="margin-left:auto">${hqMode ? '📶 고해상도' : '📶 표준'}</span>

      '<b>🔍 썸네일</b> — 학생 화면 실시간 썸네일. 크기 조절 슬라이더, 고/저해상도 전환. 더블클릭 → 뷰어(별도 창). 우클릭 → 개별 제어 메뉴.<br>' +
      '<b>배지</b> — 💬메시지/✅완료/✋도움/🆘이상 배지가 PC 카드에 표시. ⚠️N 워치독 경고(3회+ 시 빨간 펄스).'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🔍 썸네일 보기</h3><p>학생들의 화면이 실시간 썸네일로 표시됩니다. 슬라이더로 크기 조절(40~120px), 고해상도/저해상도 모드 전환 가능.</p></div>' +
      '<div class="card"><h3>💺 실습실 배치 <span class="badge badge-green">v0.1.43+</span></h3><p>자동 정렬 외에 실제 교실 좌석 배치도 저장/불러오기. CSV 가져오기/내보내기. 프리셋 다중 등록.</p></div>' +
      '<div class="card"><h3>🔎 뷰어 (크게 보기)</h3><p>썸네일 더블클릭 → 별도 뷰어 창. 이전/다음 학생 이동. 원격 제어 켜면 해당 PC 마우스/키보드 직접 조작.</p></div>' +
      '<div class="card"><h3>📋 클립보드 읽기 <span class="badge badge-green">v0.1.51+</span></h3><p>뷰어 창 📋 버튼으로 학생 PC 클립보드(텍스트·이미지) 읽어오기. 자동 복사, 타임아웃 10초.</p></div>' +
      '<div class="card"><h3>🖱 원격 제어</h3><p>뷰어 창에서 원격 제어 ON → 해당 학생 PC 마우스/키보드 직접 조작. 마우스 전송률 하향 조정으로 안정성 확보.</p></div>' +
      '<div class="card"><h3>📺 중계</h3><p>특정 학생 화면을 다른 모든 학생에게 실시간 중계. 발표/과제 시연에 활용.</p></div>' +
      '<div class="card"><h3>⚡ 워치독 알림 <span class="badge badge-green">v0.1.24+</span></h3><p>학생 앱 강제 종료 시 ⚠️ 경고. 3회 이상 시 빨간 테두리+펄스. 우클릭 → 경고 해제.</p></div>' +
      '<div class="card"><h3>📬 메시지 배지</h3><p>🆘>✋>💬>✅ 순 정렬. 미확인 메시지 수가 PC 카드에 배지로 표시. 서버 rate limit(동일 pc+type 쿨다운).</p></div>' +
      '</div></div>';
  }
  window.setThumb = function(s) { thumbSize = s; render(); };
  const _render = render;
  render = function() {
    _render();
    const chk = div.querySelector('#mon-hq');
    if (chk) {
      const newChk = chk.cloneNode(true);
      chk.parentNode.replaceChild(newChk, chk);
      newChk.addEventListener('change', function() { hqMode = this.checked; render(); toast(hqMode ? '📶 고해상도 모드' : '📶 표준 모드', 'info'); });
    }
  };
  render();
}

// 7. MODE / LOCK
// ═══════════════════════════════════════════════
function buildModeLock(div) {
  let mode = 'free', locked = false;
  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">모드</div>
        <div class="is-row" style="padding-top:4px">
          <div class="is-btn ${mode==='free'?'active':''}" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) ${mode==='free'?'14':'6'}%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="setMode(\'free\')">🟢 자유</div>
          <div class="is-btn ${mode==='focus'?'active':''}" style="--b:rgb(var(--c-purple));background:color-mix(in srgb,rgb(var(--c-purple)) ${mode==='focus'?'14':'6'}%,transparent);color:rgb(var(--c-purple));flex:1;text-align:center" onclick="setMode(\'focus\')">🟣 집중</div>
        </div>
      </div>
      <div class="is-sec">
        <div class="is-title">잠금</div>
        <div class="is-row" style="padding:6px 10px">
          <div class="is-btn ${locked?'active':''}" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) ${locked?'14':'6'}%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="doLock()">${locked ? '🔒 잠김' : '🔒 전체 잠금'}</div>
          <div class="is-btn ${!locked?'active':''}" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) ${!locked?'14':'6'}%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="doUnlock()">🔓 전체 해제</div>
        </div>
      </div>
    `);
    let stu;
    if (locked) stu = stuLocked();
    else if (mode === 'focus') stu = stuFocus();
    else stu = stuFree();
    div.innerHTML = '<h2>🟢 모드 설정 / 🔒 전체 잠금</h2><div class="sub">모드 · 잠금</div>';
    div.innerHTML += iSection('모드와 잠금을 직접 제어해보세요', sidebar, iStu(stu),
      '<b>🟢 자유</b> — 제한 없음 · <b>🟣 집중</b> — 허용 프로그램만 실행 가능 · <b>🔒 전체 잠금</b> — 학생 화면 검게 잠금 + 메시지 표시'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🔴 화면 잠금</h3><p>학생 화면을 검게 잠급니다. 메시지를 함께 전송할 수 있습니다. 전체 또는 개별 PC 선택 가능. 잠금 해제 시 원래 상태로 복원.</p></div>' +
      '<div class="card"><h3>🟢 자유 모드</h3><p>제한 없음. 학생이 모든 프로그램을 자유롭게 사용할 수 있습니다. 기본 모드.</p></div>' +
      '<div class="card"><h3>🟣 집중 모드</h3><p>특정 프로그램만 허용. 허용 목록에 없는 프로그램 실행 시 차단. 90초 안전망(연결 끊김 시 자동 해제).</p></div>' +
      '<div class="card"><h3>🔒 잠금 안전장치</h3><p>잠금/집중 모드는 연결 끊김 90초 후 자동 해제(<b>lockSafetyInterval</b>). 교사 앱 사망 추정 시 학생 멈춤 방지.</p></div>' +
      '</div></div>';
  }
  window.setMode = function(m) { mode = m; locked = false; render(); toast(m === 'free' ? '🟢 자유 모드 전환' : '🟣 집중 모드 전환', 'info'); };
  window.doLock = function() { locked = true; render(); toast('🔒 전체 잠금! 학생 화면이 잠겼습니다', 'error'); };
  window.doUnlock = function() { locked = false; render(); toast('🔓 전체 해제! 학생 화면이 복원되었습니다', 'success'); };
  render();
}

// 7. COMM — Notice + Float Bar
// ═══════════════════════════════════════════════
function buildComm(div) {
  let floatOn = true, noticeText = '5분 휴식', btnState = {msg:true,done:true,help:false,sos:false};
  let noticeSent = false;

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-label">📢 공지</div>
        <div class="is-row" style="gap:3px">
          ${['3s','5s','10s','상시'].map(t => '<div class="is-btn sm" style="--b:rgb(var(--c-txt2));background:color-mix(in srgb,rgb(var(--c-txt2)) 8%,transparent);color:rgb(var(--c-txt2))" onclick="setNoticeDur(\'' + t + '\')">' + t + '</div>').join('')}
        </div>
        <div class="is-row"><textarea class="is-inp" rows="2" id="notice-text">${noticeText}</textarea></div>
        <div class="is-row"><div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent);color:rgb(var(--c-accent))" onclick="sendNotice()">📢 공지 전송</div></div>
      </div>
      <div class="is-sec">
        <div class="is-label">📱 플로팅 바</div>
        <div class="is-row"><div class="is-btn full" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) ${floatOn?'14':'6'}%,transparent);color:rgb(var(--c-accent))" onclick="toggleFloat()">📱 학생 플로팅 바 ${floatOn ? '<span style="background:rgba(234,88,12,.2);padding:1px 7px;border-radius:8px;font-size:8px;margin-left:4px">ON</span>' : '<span style="opacity:.5;margin-left:4px">OFF</span>'}</div></div>
        ${floatOn ? `
        <div style="padding:0 10px 4px"><div style="font-size:9px;color:rgb(var(--c-txt3));margin-bottom:3px">표시할 버튼</div>
        <div class="is-row" style="gap:3px">` +
          [['msg','💬 메시지'],['done','✅ 완료'],['help','✋ 도움'],['sos','🆘 이상']].map(([k,label]) =>
            '<div class="is-btn sm ' + (btnState[k]?'active':'') + '" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) ' + (btnState[k]?'14':'4') + '%,transparent);color:' + (btnState[k]?'rgb(var(--c-blue))':'rgb(var(--c-txt3))') + '" onclick="toggleBtn(\'' + k + '\')">' + label + '</div>'
          ).join('') + `
        </div></div>` : ''}
      </div>
    `);
    let stu;
    if (noticeSent) {
      stu = stuNotice(noticeText);
    } else if (floatOn) {
      stu = stuView('<div style="font-size:28px;margin-bottom:6px">📱</div><div style="color:#60a5fa;font-weight:600">플로팅 바 표시 중</div><div style="font-size:10px;color:#475569;margin-top:4px">우하단 반투명 바</div>' +
        (btnState.msg||btnState.done||btnState.help||btnState.sos
          ? '<div style="margin-top:8px;display:flex;gap:4px;background:rgba(255,255,255,.08);padding:4px 8px;border-radius:10px">' +
            Object.entries(btnState).filter(([k,v]) => v).map(([k,label]) => ({msg:'💬',done:'✅',help:'✋',sos:'🆘'})[k]).join(' ') +
            '</div>' : '<div style="margin-top:6px;font-size:10px;color:#475569">(모든 버튼 숨김)</div>')
      );
    } else {
      stu = stuView('<span style="font-size:28px;margin-bottom:6px">📵</span><div style="color:#94a3b8;font-weight:600">플로팅 바 숨김</div>');
    }
    div.innerHTML = '<h2>📢 공지 전송 / 📱 플로팅 바</h2><div class="sub">소통</div>';
    div.innerHTML += iSection('공지를 보내고 플로팅 바를 제어해보세요', sidebar, iStu(stu),
      '<b>📢 공지</b> — 학생 화면 상단에 배너 표시 (3s/5s/10s/상시). <b>📱 플로팅 바</b> — 학생 화면 우하단 반투명 버튼 바. 각 버튼을 개별적으로 켜고 끌 수 있습니다.'

// 10. TIMER
// ═══════════════════════════════════════════════
function buildTimer(div) {
  let mode = 'countdown', running = false, paused = false;
  let totalSec = 900, remaining = 900, elapsed = 0;
  let timer = null;

  function format(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return m + ':' + sec;
  }

  function render() {
    const display = mode === 'countdown' ? remaining : elapsed;
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">타이머</div>
        <div class="is-row"><div class="is-radio"><label><input type="radio" name="tm" value="countdown" ${mode==='countdown'?'checked':''}> 카운트다운</label></div><div class="is-radio"><label><input type="radio" name="tm" value="stopwatch" ${mode==='stopwatch'?'checked':''}> 스톱워치</label></div></div>
        ${mode === 'countdown' ? '<div class="is-label">⏲️ 시간</div><div class="is-row" style="gap:3px">' +
          ['+1분','+5분','+15분','+30분'].map(t => '<div class="is-btn sm" style="--b:rgb(var(--c-txt2));background:color-mix(in srgb,rgb(var(--c-txt2)) 8%,transparent);color:rgb(var(--c-txt2))" onclick="addTime(' + parseInt(t) + ')">' + t + '</div>').join('') +
          '<div class="is-btn sm" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red))" onclick="resetTime()">↺</div></div>' : ''}
        ${mode === 'countdown' ? '<div class="is-row"><input type="text" placeholder="mm:ss" value="' + format(totalSec) + '" style="width:70px;padding:3px 6px;border-radius:3px;border:1px solid rgb(var(--c-border));background:rgb(var(--c-surface));color:rgb(var(--c-txt));font-size:11px;font-family:monospace" id="tm-inp"></div>' : ''}
        <div class="is-label">▶ 제어</div>
        <div class="is-row" style="padding-bottom:6px">
          ${!running
            ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="startTimer()">▶ 시작</div>'
            : '<div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 10%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="stopTimer()">⏹ 종료</div>'}
          ${running
            ? (paused
              ? '<div class="is-btn" style="--b:rgb(var(--c-green));background:color-mix(in srgb,rgb(var(--c-green)) 10%,transparent);color:rgb(var(--c-green));flex:1;text-align:center" onclick="resumeTimer()">▶ 재개</div>'
              : '<div class="is-btn" style="--b:rgb(var(--c-yellow));background:color-mix(in srgb,rgb(var(--c-yellow)) 10%,transparent);color:rgb(var(--c-yellow));flex:1;text-align:center" onclick="pauseTimer()">⏸ 일시정지</div>')
            : ''}
        </div>
        <div class="timer-display"><div class="num" style="color:${display <= 60 && mode === 'countdown' ? '#ef4444' : 'rgb(var(--c-accent))'}">${format(display)}</div></div>
        ${running && mode === 'countdown' && display <= 60 ? '<div style="text-align:center;font-size:10px;color:#ef4444;animation:blink 1s infinite">⚠️ 1분 미만</div>' : ''}
      </div>
    `);
    const stu = running
      ? stuTimer(format(display))
      : stuView('<span style="font-size:28px;margin-bottom:6px">⏱️</span><div style="color:#94a3b8;font-weight:600">타이머 대기 중</div>');
    div.innerHTML = '<h2>⏱️ 타이머 (카운트다운 / 스톱워치)</h2><div class="sub">타이머</div>';
    div.innerHTML += iSection('타이머를 직접 실행해보세요', sidebar, iStu(stu),
      '<b>카운트다운</b> — 지정 시간에서 감소. 0 도달 시 학생 전체화면 종료 모달 표시(5분 후 자동 해제).<br><b>스톱워치</b> — 0에서 증가. 실습 시간 측정에 활용.'
    );
    div.querySelectorAll('input[name="tm"]').forEach(r => r.addEventListener('change', function() { mode = this.value; if (!running) render(); }));
    div.querySelector('#tm-inp')?.addEventListener('change', function() {
      const parts = this.value.split(':');
      if (parts.length === 2) { totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]); remaining = totalSec; if (!running) render(); }
    });
  }

  window.addTime = function(m) { totalSec += m * 60; remaining = totalSec; render(); };
  window.resetTime = function() { totalSec = 900; remaining = 900; render(); };
  window.startTimer = function() { if (mode === 'countdown' && remaining <= 0) return; running = true; paused = false; clearInterval(timer); timer = setInterval(() => { if (!paused) { if (mode === 'countdown') { remaining--; if (remaining <= 0) { remaining = 0; clearInterval(timer); running = false; toast('⏰ 시간 종료! 학생 모달 표시됨', 'error'); } } else { elapsed++; } render(); } }, 1000); render(); toast('▶ 타이머 시작', 'success'); };
  window.stopTimer = function() { running = false; clearInterval(timer); if (mode === 'countdown') remaining = totalSec; else elapsed = 0; render(); toast('⏹ 타이머 종료', 'info'); };
  window.pauseTimer = function() { paused = true; render(); toast('⏸ 타이머 일시정지', 'warning'); };
  window.resumeTimer = function() { paused = false; render(); toast('▶ 타이머 재개', 'success'); };
  render();
}

  };
  window.isMethod = function(m) { distMethod = m; render(); };
  window.isDistribute = function() {
    phase = 'installing'; prog = 0;

      prog += 3;

        if (i < done) pcStates[p] = 'done';
        else if (i === done && prog < 100) pcStates[p] = 'installing';
        else pcStates[p] = 'waiting';
      });
      if (prog >= 100) {
        prog = 100; clearInterval(timer);
        pcs.forEach(p => pcStates[p] = 'done');

  };

    phase = 'idle'; prog = 0; distMethod = 'usb';
    pcs.forEach(p => pcStates[p] = 'waiting');
    clearInterval(timer); render();
  };

  render();
}

    deployPhase = 'deploying'; deployProg = 0;
    clearInterval(deployTimer);
    deployTimer = setInterval(() => { deployProg += 3; if (deployProg >= 100) { deployProg = 100; clearInterval(deployTimer); deployPhase = 'done'; toast('✅ 학생 5대 모두 v0.2.58 업데이트 완료', 'success'); } render(); }, 120);
    render();
  };

  render();
}

// ═══════════════════════════════════════════════
// 13. REMOVE — Student Program Removal & Log Management
// ═══════════════════════════════════════════════
function buildRemove(div) {
  let phase = 'idle'; // idle / removing / done
  let prog = 0, timer = null;
  let logPhase = 'none'; // none / collecting / deleting / collected / deleted
  let logProg = 0, logTimer = null;
  const pcs = ['PC-01','PC-03','PC-05','PC-07','PC-09'];
  const removedPcs = {};

  function render() {
    const sidebar = iSide(`
      <div class="is-sec">
        <div class="is-title">🗑 학생 프로그램 제거</div>
        ${phase === 'idle' ? `
        <div class="is-row" style="padding-top:2px">
          <div class="is-btn full" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red))" onclick="remStart()">🗑 S_UNINSTALL 전송 (5대)</div>
        </div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 6px">① install.lock 생성 → ② uninstallService(schtasks+reg) → ③ uninstaller 찾기 → ④ spawn silent(/S) → ⑤ app.quit</div>` : phase === 'removing' ? `
        <div style="padding:6px 10px">
          <div class="prog"><div style="width:${prog}%;background:rgb(var(--c-red))"></div></div>
          <div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:3px">🗑 제거 중... ${prog}%<br>${Object.keys(removedPcs).length}/${pcs.length}대 완료</div>
        </div>` : `
        <div style="padding:6px 10px;color:rgb(var(--c-green));font-size:11px;font-weight:600">✅ 제거 완료 (5/5)</div>
        <div style="font-size:9px;color:rgb(var(--c-txt3));padding:0 10px 2px">작업 스케줄러 · HKCU\\Run · 설치 폴더 삭제됨</div>
        <div class="is-row" style="padding-bottom:6px"><div class="is-btn" style="--b:rgb(var(--c-accent));background:color-mix(in srgb,rgb(var(--c-accent)) 8%,transparent);color:rgb(var(--c-accent));flex:1;text-align:center" onclick="remReset()">↺ 다시 실행</div></div>`}
      </div>
      <div class="is-sec">
        <div class="is-label">제거 현황</div>
        ${pcs.map(p => {
          const s = phase === 'idle' ? '대기' : (removedPcs[p] ? '✅ 제거됨' : (phase === 'removing' ? '⚙️ 제거 중' : '대기'));
          const c = s === '✅ 제거됨' ? '#6ee7b7' : (s === '⚙️ 제거 중' ? '#fbbf24' : '#64748b');
          return `<div style="display:flex;align-items:center;gap:4px;padding:1px 10px;font-size:10px;color:${c}"><span>${s === '✅ 제거됨' ? '✅' : (s === '⚙️ 제거 중' ? '⚙️' : '⏳')}</span>${p}</div>`;
        }).join('')}
      </div>
      <div class="is-sec" style="border-top:1.5px dashed rgb(var(--c-border))">
        <div class="is-title">📋 로그 관리</div>
        <div style="padding:2px 10px;font-size:10px;color:rgb(var(--c-txt2))">5MB 회전 · 3일치 보관</div>
        <div style="padding:0 10px 2px;font-size:9px;color:rgb(var(--c-txt3))">C:\\Screen_Share\\학생로그\\student_electron_YYYYMMDD.log</div>
        ${logPhase === 'none' ? `
        <div class="is-row" style="padding-top:2px;gap:4px">
          <div class="is-btn" style="--b:rgb(var(--c-blue));background:color-mix(in srgb,rgb(var(--c-blue)) 8%,transparent);color:rgb(var(--c-blue));flex:1;text-align:center" onclick="logCollect()">📥 로그 수집</div>
          <div class="is-btn" style="--b:rgb(var(--c-red));background:color-mix(in srgb,rgb(var(--c-red)) 8%,transparent);color:rgb(var(--c-red));flex:1;text-align:center" onclick="logDel()">🗑 로그 삭제</div>
        </div>` : logPhase === 'collecting' ? `
        <div style="padding:6px 10px">
          <div class="prog"><div style="width:${logProg}%;background:rgb(var(--c-blue))"></div></div>
          <div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:3px">📥 로그 수집 중... ${logProg}%<br>student_electron_20260601.log · ${(logProg*0.04).toFixed(1)}MB</div>
        </div>` : logPhase === 'deleting' ? `
        <div style="padding:6px 10px">
          <div class="prog"><div style="width:${logProg}%;background:rgb(var(--c-red))"></div></div>
          <div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:3px">🗑 로그 삭제 중... ${logProg}%<br>*.log, *.1.log, *.2.log (회전 파일 모두)</div>
        </div>` : `
        <div style="padding:6px 10px;color:rgb(var(--c-green));font-size:11px;font-weight:600">✅ ${logPhase === 'collected' ? '로그 수집 완료' : '로그 삭제 완료'}</div>`}
      </div>
    `);

    let stuHtml;
    if (phase === 'removing') {
      const done = Object.keys(removedPcs).length;
      stuHtml = stuView(`<span style="font-size:28px;margin-bottom:6px">🗑️</span><div style="color:#fca5a5;font-weight:600">프로그램 제거 중...</div><div style="font-size:10px;color:#475569;margin-top:4px">install.lock → uninstallService → Uninstall ScreenShareS.exe /S<br>${done}/${pcs.length}대 완료</div>`);
    } else if (phase === 'done') {
      stuHtml = stuView(`<span style="font-size:28px;margin-bottom:6px">🗑️</span><div style="color:#6ee7b7;font-weight:600">제거 완료</div><div style="font-size:10px;color:#475569;margin-top:4px">%LOCALAPPDATA%\\Programs\\ScreenShareS\\ (제거됨)<br>작업 스케줄러 · HKCU\\Run · watchdog 종료</div>`);
    } else if (logPhase === 'collecting' || logPhase === 'deleting') {
      stuHtml = stuView(`<span style="font-size:28px;margin-bottom:6px">📋</span><div style="color:#60a5fa;font-weight:600">${logPhase === 'collecting' ? '로그 수집 중...' : '로그 삭제 중...'}</div><div style="font-size:10px;color:#475569;margin-top:4px">${logPhase === 'collecting' ? 'student_electron_20260601.log → .1.log → .2.log' : 'C:\\Screen_Share\\학생로그\\ 파일 정리 중'}</div>`);
    } else {
      stuHtml = stuEmpty();
    }

    div.innerHTML = '<h2>🗑 제거 / 📋 로그 관리</h2><div class="sub">설치 / 업데이트</div>';
    div.innerHTML += iSection('프로그램 제거와 로그 관리를 시뮬레이션해보세요', sidebar, iStu(stuHtml),
      '<b>🗑 학생 프로그램 제거</b> — 교사가 S_UNINSTALL 전송 → 학생 handleUninstall: ① install.lock 생성(%APPDATA%\\ScreenShareS\\) → ② uninstallService() (schtasks /delete + HKCU\\Run 삭제) → ③ uninstaller 탐색(\\"Uninstall ScreenShareS.exe\\" > uninstall.exe > Uninstall.exe) → ④ spawn detached(/S silent) → ⑤ _isQuitting=true → 1s 후 app.quit. NSIS customUnInit: DwmHelper/ScreenShareS/WinDisplaySvc kill + install.lock 생성. customUnInstall: schtasks /delete + install.lock/update.lock 삭제.<br>' +
      '<b>📋 로그 관리</b> — 학생: <code>C:\\Screen_Share\\학생로그\\student_electron_YYYYMMDD.log</code> (5MB 회전, 3일 보관). 교사: <code>C:\\Screen_Share\\교사로그\\teacher_YYYYMMDD.log</code> (회전 없음). 로그 수집/삭제는 도구 메뉴에서 가능.'
    );
    div.innerHTML += '<div class="detail-section"><div class="card-grid">' +
      '<div class="card"><h3>🗑 NSIS CustomUnInstall</h3><p><b>customUnInit</b>(제거 전): DwmHelper/ScreenShareS/WinDisplaySvc 강제종료 + install.lock 생성. <b>customUnInstall</b>(제거 후): schtasks /delete /tn ScreenShareS + install.lock/update.lock 삭제. %APPDATA%\\ScreenShareS\\ 폴더(설정/로그)는 보존.</p></div>' +
      '<div class="card"><h3>🔍 Uninstaller 탐색</h3><p>순서: <code>$INSTDIR\\Uninstall ScreenShareS.exe</code> → <code>$INSTDIR\\uninstall.exe</code> → <code>$INSTDIR\\Uninstall.exe</code>. $INSTDIR = %LOCALAPPDATA%\\Programs\\ScreenShareS\\.</p></div>' +
      '<div class="card"><h3>📋 로그 파일</h3><p>학생: <code>C:\\Screen_Share\\학생로그\\student_electron_<YYYYMMDD>.log</code>. 5MB 초과 시 <code>.1.log</code>, <code>.2.log</code> 회전. 3일 경과 로그는 cleanupOldLogs()에서 자동 삭제(KEEP_DAYS=3). 교사: <code>C:\\Screen_Share\\교사로그\\teacher_<YYYYMMDD>.log</code> (회전/정리 없음).</p></div>' +
      '<div class="card"><h3>🛡️ 보안 구조</h3><p>SystemComponent=1(설정 앱 숨김) · 트레이 우클릭 종료 차단 · overlay before-input-event(F5/F11/F12/Ctrl+R/Shift+I 차단) · webPreferences devTools=false(prod) · watchdog 상호감시 · update.lock/install.lock stale 5분 자동 해제.</p></div>' +
      '</div></div>';
  }

  window.remStart = function() {
    if (phase !== 'idle') return;
    phase = 'removing'; prog = 0;
    clearInterval(timer);
    timer = setInterval(() => {
      prog += 4;
      const done = Math.min(Math.ceil(prog / 20), 5);
      pcs.forEach((p, i) => { if (i < done) removedPcs[p] = true; });
      if (prog >= 100) {
        prog = 100; clearInterval(timer);
        phase = 'done';
        toast('🗑 학생 5대 프로그램 제거 완료', 'warning');
      }
      render();
    }, 200);
    render();
  };
  window.remReset = function() { phase = 'idle'; prog = 0; pcs.forEach(p => delete removedPcs[p]); clearInterval(timer); render(); };
  window.logCollect = function() {
    logPhase = 'collecting'; logProg = 0;
    clearInterval(logTimer);
    logTimer = setInterval(() => { logProg += 5; if (logProg >= 100) { logProg = 100; clearInterval(logTimer); logPhase = 'collected'; toast('📥 로그 수집 완료 (에러 로그 3건)', 'info'); } render(); }, 100);
    render();
  };
  window.logDel = function() {
    logPhase = 'deleting'; logProg = 0;
    clearInterval(logTimer);
    logTimer = setInterval(() => { logProg += 8; if (logProg >= 100) { logProg = 100; clearInterval(logTimer); logPhase = 'deleted'; toast('🗑 로그 삭제 완료', 'info'); } render(); }, 80);
    render();
  };

  render();
}

// ═══════════════════════════════════════════════
// 14. SYSTEM
// ═══════════════════════════════════════════════
function buildSystem(div) {
  div.innerHTML = '<h2>⚙️ 시스템 관리 기능</h2><div class="sub">시스템</div>';

  const blocks = [
    { label:'📺 프로젝터 뷰', desc:'학생 화면을 프로젝터에 2/4/6/9분할 전체화면. 자동 페이지 전환 지원.', icon:'📺', click:'toast(\'📺 프로젝터 뷰 열기 (2/4/6/9분할)\',\'info\')' },
    { label:'🎬 녹화 세션 관리', desc:'녹화 세션 목록, 청크→MP4 병합, 재생.', icon:'🎬', click:'toast(\'🎬 녹화 세션 관리 열기\',\'info\')' },
    { label:'📦 학생 프로그램 관리', desc:'GitHub Releases에서 최신 설치파일 다운로드 → 학생 원격 설치/업데이트/제거. 항상 새로 받기(캐시 없음).', icon:'📦', click:'toast(\'📦 학생 프로그램 관리 열기\',\'info\')' },
    { label:'📋 학생 로그 관리', desc:'학생 PC 로그 수집/삭제. 5MB 회전 + 3일치 보관.', icon:'📋', click:'toast(\'📋 로그 관리 열기\',\'info\')' },
    { label:'⚡ 전원 관리', desc:'학생 PC WoL 켜기 / 종료 / 재시작. MAC 주소 등록 필요.', icon:'⚡', click:'toast(\'⚡ 전원 관리 열기\',\'info\')' }
  ];

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">';
  blocks.forEach(b => {
    html += '<div style="background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px;padding:14px;cursor:pointer;transition:all .15s" onclick="' + b.click + '" onmouseenter="this.style.borderColor=\'rgb(var(--c-accent))\';this.style.boxShadow=\'0 2px 12px rgba(0,0,0,.06)\'" onmouseleave="this.style.borderColor=\'\';this.style.boxShadow=\'\'">';
    html += '<div style="font-size:24px;margin-bottom:6px">' + b.icon + '</div>';
    html += '<div style="font-size:13px;font-weight:700;color:rgb(var(--c-txt));margin-bottom:4px">' + b.label + '</div>';
    html += '<div style="font-size:11.5px;color:rgb(var(--c-txt2))">' + b.desc + '</div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div style="margin-top:16px">';

  // Shortcuts table
  html += '<div style="background:rgb(var(--c-surface));border:1px solid rgb(var(--c-border));border-radius:8px;padding:14px;margin-top:12px">';
  html += '<h3 style="font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px">⌨️ 단축키</h3>';
  html += '<table style="width:100%;font-size:12px;border-collapse:collapse">';
  const sc = [
    ['F6','전송 시작/종료','글로벌'],
    ['F7','전송 일시정지/재개','WebP'],
    ['F8','녹화 시작/종료','글로벌'],
    ['F9','녹화 일시정지/재개','글로벌'],
    ['Ctrl+,','설정 열기','앱'],
    ['Ctrl+Shift+E','테마 에디터','앱'],
    ['F11','전체화면','앱'],
    ['Ctrl+Shift+T','항상 위 토글','앱']
  ];
  sc.forEach(([key, action, scope]) => {
    html += '<tr><td style="padding:4px 8px;border-bottom:1px solid rgb(var(--c-border))"><kbd>' + key + '</kbd></td><td style="padding:4px 8px;border-bottom:1px solid rgb(var(--c-border));color:rgb(var(--c-txt2))">' + action + '</td><td style="padding:4px 8px;border-bottom:1px solid rgb(var(--c-border));text-align:right"><span class="badge ' + (scope==='글로벌'?'badge-green':'badge-blue') + '" style="font-size:9px">' + scope + '</span></td></tr>';
  });
  html += '</table>';
  html += '<div style="font-size:10px;color:rgb(var(--c-txt3));margin-top:6px">도구 → 단축키 설정에서 F2/F3/F4로 변경 가능 · 중복/충돌 감지 · 저장 후 테스트 모드 지원</div>';
  html += '</div>';

  div.innerHTML += html;
}

// ─── Init ───
buildPages();
